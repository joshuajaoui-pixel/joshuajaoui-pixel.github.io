{id:'narrative-techniques',name:'Narrative Techniques',time:'8 min read',content:`<p>Narrative technique refers to the methods and strategies authors use to tell their stories. The choices an author makes about perspective, structure, pacing, and voice fundamentally shape how readers experience and interpret a text. Understanding these techniques is key to analyzing fiction effectively.</p><p>Point of view determines through whose eyes the story is told. First person ("I") creates intimacy and subjectivity but limits knowledge to one character. Third person limited follows one character's perspective using "he/she." Third person omniscient knows all characters' thoughts and can shift between perspectives. Second person ("you") directly addresses the reader, creating immediacy. Each perspective controls what information the reader has access to.</p><p>Narrative structure goes beyond simple chronological order. In medias res begins in the middle of action. Non-linear narratives use flashbacks, flash-forwards, or fragmented timelines. Frame narratives (stories within stories) create distance or multiple perspectives. Circular narratives end where they began. The choice of structure creates different effects — suspense, revelation, thematic resonance, or disorientation.</p><p>Pacing and voice are equally important. Short sentences create tension and urgency; long, flowing sentences suggest reflection or calm. Dialogue reveals character and advances plot. Interior monologue shows thoughts directly. Free indirect discourse blends the narrator's voice with a character's thoughts without quotation marks. Authorial tone — whether ironic, earnest, detached, or passionate — colors every sentence and shapes the reader's emotional response.</p>`,takeaways:['Point of view (1st, 3rd limited, 3rd omniscient, 2nd person) controls reader knowledge','Non-linear structures: in medias res, flashbacks, frame narratives, circular narratives','Sentence length affects pacing: short = tension, long = reflection','Free indirect discourse blends narrator voice with character thoughts']}
]},
{id:'history',name:'History',icon:'🏛️',color:'#fdcb6e',topics:[
{id:'world-wars',name:'World War I & II',time:'10 min read',content:`<p>World War I (1914–1918) and World War II (1939–1945) were the two most devastating conflicts in human history, fundamentally reshaping global politics, borders, economies, and societies. Understanding these wars is essential to comprehending the modern world.</p><p>World War I was triggered by the assassination of Archduke Franz Ferdinand of Austria-Hungary in 1914, but its deeper causes included militarism, alliances, imperialism, and nationalism (often remembered as M.A.I.N.). The war introduced trench warfare, poison gas, tanks, and aircraft, resulting in approximately 17 million deaths. It ended with the Treaty of Versailles (1919), which imposed harsh reparations on Germany — sowing seeds for future conflict.</p><p>World War II began when Nazi Germany, led by Adolf Hitler, invaded Poland in September 1939. The war encompassed Europe, Africa, Asia, and the Pacific. Key events include the Battle of Britain, the Holocaust (systematic murder of six million Jews), the turning point at Stalingrad, D-Day (June 6, 1944), and the atomic bombings of Hiroshima and Nagasaki. The war caused an estimated 70–85 million deaths — the deadliest conflict in history.</p><p>The aftermath of WWII created the modern geopolitical order: the United Nations was established in 1945, Europe was divided into Western and Soviet spheres (leading to the Cold War), decolonization accelerated across Asia and Africa, and the United States and Soviet Union emerged as rival superpowers. The Nuremberg Trials established precedents for prosecuting war crimes and crimes against humanity.</p>`,takeaways:['WWI causes: Militarism, Alliances, Imperialism, Nationalism (M.A.I.N.)','Treaty of Versailles imposed harsh terms on Germany, contributing to WWII','WWII: 70-85 million deaths; ended with atomic bombs and Allied victory','Aftermath: United Nations, Cold War division, decolonization, Nuremberg Trials']},
{id:'ancient-civ',name:'Ancient Civilizations',time:'9 min read',content:`<p>Ancient civilizations laid the foundations for human culture, governance, technology, and thought. The earliest complex societies emerged independently in river valleys that provided fertile land for agriculture — the Nile (Egypt), Tigris-Euphrates (Mesopotamia), Indus (South Asia), and Yellow River (China).</p><p>Mesopotamia (modern-day Iraq) is often called the "cradle of civilization." The Sumerians developed the first writing system (cuneiform), the wheel, irrigation systems, and mathematical concepts including base-60 (still used in measuring time and angles). The Code of Hammurabi (c. 1754 BCE) was one of the earliest written legal codes, establishing the principle of codified justice.</p><p>Ancient Egypt thrived along the Nile for over 3,000 years, developing hieroglyphic writing, monumental architecture (pyramids, temples), advanced medicine, and a complex polytheistic religion centered on the afterlife. The construction of the Great Pyramid of Giza around 2560 BCE remains one of the most remarkable engineering achievements in history.</p><p>Ancient Greece contributed democracy (Athens), philosophy (Socrates, Plato, Aristotle), theater, the Olympic Games, and foundational works of science and mathematics. The Roman Empire expanded on Greek culture, developing an extensive legal system, engineering marvels (aqueducts, roads, the Colosseum), and a republican-then-imperial political system that influenced governance for millennia. Rome's fall in 476 CE traditionally marks the beginning of the Middle Ages in Europe.</p>`,takeaways:['First civilizations arose in river valleys: Nile, Tigris-Euphrates, Indus, Yellow River','Mesopotamia produced writing (cuneiform), the wheel, and early legal codes','Ancient Egypt: pyramids, hieroglyphics, 3,000+ years of civilization along the Nile','Greece gave us democracy and philosophy; Rome built law, engineering, and empire']},
{id:'industrial-rev',name:'Industrial Revolution',time:'8 min read',content:`<p>The Industrial Revolution, beginning in Britain around 1760 and spreading globally through the 19th century, was one of the most transformative periods in human history. It marked the transition from agrarian, handcraft economies to industrial, machine-driven manufacturing, fundamentally changing how people lived, worked, and related to one another.</p><p>Key inventions drove the revolution: the spinning jenny and power loom mechanized textile production, the steam engine (improved by James Watt) powered factories and transportation, and iron and steel production enabled construction of railways, bridges, and machinery. The factory system concentrated workers in urban centers, replacing cottage industries and guild-based craftsmanship.</p><p>The social impact was profound and mixed. Urbanization brought opportunity but also overcrowding, pollution, disease, and grueling working conditions — including widespread child labor. A new industrial working class emerged, laboring 12–16 hour days in often dangerous conditions. These conditions eventually sparked labor movements, unions, and reforms including factory acts limiting working hours and child labor.</p><p>The Industrial Revolution also reshaped global power dynamics. Britain's industrial head start made it the world's dominant economic and military power for much of the 19th century. Industrialization fueled imperial expansion as nations sought raw materials and markets. The second wave of industrialization (late 19th century) introduced electricity, petroleum, the internal combustion engine, and chemical industries, setting the stage for the modern economy.</p>`,takeaways:['Began in Britain ~1760; transitioned economies from agrarian to industrial','Key inventions: spinning jenny, steam engine, iron/steel production','Urbanization brought opportunity but also overcrowding, pollution, and harsh labor','Fueled imperial expansion and reshaped global power dynamics']},
{id:'cold-war',name:'Cold War Era',time:'9 min read',content:`<p>The Cold War (1947–1991) was a prolonged geopolitical rivalry between the United States and its Western allies (NATO) and the Soviet Union and its Eastern bloc (Warsaw Pact). Though the two superpowers never fought each other directly, the Cold War shaped global politics, economics, culture, and military strategy for nearly half a century.</p><p>The ideological divide was fundamental: the US championed liberal democracy and capitalism, while the Soviet Union promoted communist one-party rule and a command economy. Key early events included the Berlin Blockade and Airlift (1948–49), the formation of NATO (1949) and the Warsaw Pact (1955), and the Korean War (1950–53), which established the pattern of proxy conflicts.</p><p>The nuclear arms race defined the era's existential tension. Both superpowers developed thermonuclear weapons capable of mutual annihilation — a doctrine called Mutually Assured Destruction (MAD). The Cuban Missile Crisis (1962) brought the world closest to nuclear war when Soviet missiles were discovered in Cuba, resolved through intense diplomatic negotiation. The Space Race, culminating in the US Moon landing in 1969, was both a technological competition and ideological showcase.</p><p>The Cold War ended with the dissolution of the Soviet Union in 1991. Contributing factors included economic stagnation, the arms race's financial burden, nationalist movements in Soviet republics, Mikhail Gorbachev's reforms (glasnost and perestroika), and the fall of the Berlin Wall in November 1989 — a powerful symbol of communism's collapse in Eastern Europe.</p>`,takeaways:['1947–1991: US/NATO vs. Soviet Union/Warsaw Pact — ideological and geopolitical rivalry','Proxy wars (Korea, Vietnam) avoided direct superpower conflict','MAD doctrine and Cuban Missile Crisis defined nuclear tensions','Ended with Soviet dissolution in 1991; Berlin Wall fell in 1989']},
{id:'renaissance',name:'Renaissance',time:'8 min read',content:`<p>The Renaissance ("rebirth") was a cultural, artistic, intellectual, and scientific movement that began in Italy in the 14th century and spread across Europe through the 17th century. It marked a transition from the medieval period to the early modern age, characterized by renewed interest in classical Greek and Roman learning, humanism, and innovation.</p><p>Italian city-states like Florence, Venice, and Rome became centers of Renaissance culture, funded by wealthy patrons like the Medici family. Humanism — the intellectual emphasis on human potential, reason, and individual achievement — shifted focus from purely religious concerns to secular learning. Renaissance thinkers studied classical texts, promoted education in the humanities (literature, history, philosophy, art), and celebrated human creativity.</p><p>Renaissance art revolutionized visual representation. Artists developed linear perspective (creating depth on flat surfaces), chiaroscuro (use of light and shadow), and anatomical accuracy. Leonardo da Vinci combined art and science in works like the Mona Lisa and his anatomical studies. Michelangelo's Sistine Chapel ceiling and David exemplify the era's mastery of the human form. Raphael's School of Athens celebrates classical philosophy.</p><p>The Renaissance also advanced science and exploration. Copernicus proposed a heliocentric (sun-centered) model of the solar system. Galileo's telescope observations supported this view. Gutenberg's printing press (c. 1440) revolutionized information dissemination, making books affordable and accelerating the spread of ideas. The era laid groundwork for the Scientific Revolution and the Enlightenment.</p>`,takeaways:['Began in 14th-century Italy; renewed interest in classical Greek and Roman learning','Humanism emphasized human potential, reason, and secular learning','Art innovations: linear perspective, chiaroscuro, anatomical accuracy','Gutenberg\'s printing press (c. 1440) revolutionized the spread of knowledge']},
{id:'civil-rights',name:'Civil Rights Movement',time:'9 min read',content:`<p>The Civil Rights Movement in the United States (primarily 1954–1968) was a transformative struggle to end racial segregation and discrimination against Black Americans and to secure legal recognition of equal citizenship rights. While the fight for racial equality has a much longer history, this period saw decisive victories that reshaped American law and society.</p><p>Key events include the Supreme Court's Brown v. Board of Education decision (1954), which declared school segregation unconstitutional; the Montgomery Bus Boycott (1955–56), sparked by Rosa Parks' refusal to give up her seat; the sit-ins at segregated lunch counters; the Freedom Rides challenging segregated interstate buses; and the March on Washington (1963), where Martin Luther King Jr. delivered his famous "I Have a Dream" speech to over 250,000 people.</p><p>The movement employed nonviolent direct action and civil disobedience, inspired by Mahatma Gandhi's philosophy. Martin Luther King Jr. was the most prominent leader, advocating peaceful protest and racial reconciliation. Other significant figures included Malcolm X (who initially advocated Black separatism before embracing broader solidarity), Medgar Evers, Fannie Lou Hamer, John Lewis, and organizations like the NAACP, SCLC, SNCC, and CORE.</p><p>Legislative achievements were landmark: the Civil Rights Act of 1964 prohibited discrimination based on race, color, religion, sex, or national origin. The Voting Rights Act of 1965 eliminated barriers to Black voting, particularly in the South. The Fair Housing Act of 1968 prohibited housing discrimination. Despite these legal victories, the struggle for racial equality continues, with ongoing debates about systemic racism, criminal justice reform, and economic inequality.</p>`,takeaways:['Brown v. Board of Education (1954): school segregation declared unconstitutional','Strategy of nonviolent direct action and civil disobedience','Civil Rights Act (1964) prohibited discrimination; Voting Rights Act (1965) protected voting','The movement achieved legal equality; the broader struggle for justice continues']}
]},
{id:'cs',name:'Computer Science',icon:'💻',color:'#00cec9',topics:[
{id:'programming',name:'Programming Basics',time:'9 min read',content:`<p>Programming is the process of writing instructions that a computer can execute to perform specific tasks. These instructions are written in programming languages — formal languages with precise syntax and semantics. Programming is the foundation of all software, from mobile apps to operating systems to artificial intelligence.</p><p>Programs are built from fundamental constructs: variables (named storage locations for data), data types (integers, floating-point numbers, strings, booleans), operators (arithmetic, comparison, logical), and control flow structures. Sequential execution runs statements in order. Conditional statements (if/else) make decisions based on conditions. Loops (for, while) repeat actions — a for loop runs a set number of times, while a while loop continues until a condition becomes false.</p><p>Functions (also called methods or procedures) are reusable blocks of code that perform specific tasks. They take inputs (parameters), process them, and optionally return outputs. Functions promote code reuse, modularity, and readability. The concept of scope determines where variables are accessible — local variables exist within a function, while global variables are accessible throughout the program.</p><p>Programming paradigms are different approaches to organizing code. Procedural programming organizes code as a sequence of procedures/functions. Object-oriented programming (OOP) organizes code around objects that combine data (attributes) and behavior (methods), using principles like encapsulation, inheritance, and polymorphism. Functional programming treats computation as evaluation of mathematical functions, avoiding mutable state. Most modern languages support multiple paradigms.</p>`,takeaways:['Programs use variables, data types, operators, and control flow (conditionals, loops)','Functions promote code reuse and modularity; scope controls variable accessibility','OOP organizes code around objects with attributes and methods','Major paradigms: procedural, object-oriented, and functional programming']},
{id:'data-structures',name:'Data Structures',time:'9 min read',content:`<p>Data structures are specialized formats for organizing, storing, and accessing data efficiently. Choosing the right data structure for a given problem is one of the most important decisions in software development, as it directly impacts program performance, memory usage, and code clarity.</p><p>Arrays store elements in contiguous memory locations, allowing O(1) access by index but O(n) insertion/deletion in the middle. Linked lists store elements in nodes connected by pointers — insertion and deletion are O(1) if you have a reference to the location, but access is O(n) since you must traverse from the head. Stacks follow Last-In-First-Out (LIFO) order, while queues follow First-In-First-Out (FIFO).</p><p>Trees are hierarchical structures where each node has a parent (except the root) and zero or more children. Binary Search Trees (BSTs) maintain sorted order: left children are smaller, right children are larger, enabling O(log n) search, insert, and delete in balanced trees. Heaps are complete binary trees used to implement priority queues. Balanced trees (AVL, Red-Black) maintain O(log n) operations by ensuring the tree doesn't become skewed.</p><p>Hash tables (hash maps) store key-value pairs using a hash function to map keys to array indices, providing average-case O(1) lookup, insert, and delete. Collisions (two keys mapping to the same index) are handled by chaining or open addressing. Graphs consist of vertices connected by edges, representing relationships. They can be directed or undirected, weighted or unweighted, and are traversed using BFS (breadth-first) or DFS (depth-first) algorithms.</p>`,takeaways:['Arrays: O(1) access by index; Linked lists: O(1) insertion with reference','Stacks are LIFO; Queues are FIFO','Binary Search Trees enable O(log n) operations when balanced','Hash tables provide average O(1) lookup using key-value pairs']},
{id:'algorithms',name:'Algorithms',time:'9 min read',content:`<p>An algorithm is a step-by-step procedure for solving a problem or accomplishing a task. Algorithm design and analysis are central to computer science — the efficiency of an algorithm can make the difference between a program that runs in milliseconds and one that takes hours, even on the same input.</p><p>Algorithm efficiency is measured using Big O notation, which describes how runtime or space requirements grow as input size increases. O(1) is constant time (independent of input), O(log n) is logarithmic (halving input each step, like binary search), O(n) is linear, O(n log n) is typical of efficient sorting algorithms, O(n²) is quadratic (common in nested loops), and O(2ⁿ) is exponential. Understanding Big O helps predict performance and compare approaches.</p><p>Sorting algorithms arrange data in order. Bubble sort, selection sort, and insertion sort are simple but O(n²). Merge sort uses divide-and-conquer to achieve O(n log n): divide the array in half, sort each half recursively, then merge. Quick sort also averages O(n log n) by partitioning around a pivot. Searching algorithms include linear search (O(n), checking each element) and binary search (O(log n), requiring sorted data, halving the search space each step).</p><p>Advanced algorithmic techniques include dynamic programming (breaking problems into overlapping subproblems and storing results to avoid recomputation), greedy algorithms (making locally optimal choices at each step), and graph algorithms (Dijkstra's shortest path, BFS/DFS traversal, minimum spanning trees). Recursion — functions calling themselves — is a powerful technique for problems with self-similar substructure, though it requires a base case to prevent infinite loops.</p>`,takeaways:['Big O notation measures algorithm efficiency as input grows','Efficient sorts (merge, quick) are O(n log n); simple sorts are O(n²)','Binary search is O(log n) but requires sorted data','Dynamic programming stores subproblem results to avoid recomputation']},
{id:'databases',name:'Databases',time:'8 min read',content:`<p>A database is an organized collection of structured data stored electronically, designed for efficient retrieval, insertion, updating, and deletion. Databases are foundational to virtually all modern software — from websites and mobile apps to banking systems and scientific research.</p><p>Relational databases (RDBMS) organize data into tables with rows (records) and columns (fields). Tables are related through keys: a primary key uniquely identifies each row, while a foreign key references a primary key in another table, establishing relationships. SQL (Structured Query Language) is the standard language for interacting with relational databases, using commands like SELECT, INSERT, UPDATE, DELETE, and JOIN.</p><p>Database design follows normalization principles to reduce redundancy and maintain data integrity. First Normal Form (1NF) eliminates repeating groups. Second Normal Form (2NF) removes partial dependencies. Third Normal Form (3NF) removes transitive dependencies. The ACID properties (Atomicity, Consistency, Isolation, Durability) ensure reliable transaction processing — guaranteeing that database operations are completed fully or not at all.</p><p>NoSQL databases emerged to handle large-scale, unstructured, or semi-structured data. Types include document stores (MongoDB — stores JSON-like documents), key-value stores (Redis — fast caching), column-family stores (Cassandra — distributed data), and graph databases (Neo4j — relationship-heavy data). The choice between SQL and NoSQL depends on data structure, scalability needs, and consistency requirements. Many modern systems use both (polyglot persistence).</p>`,takeaways:['Relational databases use tables with primary and foreign keys; queried with SQL','Normalization (1NF, 2NF, 3NF) reduces redundancy and maintains integrity','ACID properties ensure reliable transactions: Atomicity, Consistency, Isolation, Durability','NoSQL types: document, key-value, column-family, and graph databases']},
{id:'networking',name:'Networking',time:'8 min read',content:`<p>Computer networking is the practice of connecting computers and devices to share resources and communicate. The internet — the global network of networks — is the most prominent example, enabling billions of devices to exchange data. Understanding networking fundamentals is essential for anyone working in technology.</p><p>The OSI (Open Systems Interconnection) model describes networking in seven layers: Physical (cables, signals), Data Link (MAC addresses, switches), Network (IP addresses, routing), Transport (TCP/UDP, port numbers), Session, Presentation, and Application (HTTP, DNS, SMTP). The simpler TCP/IP model condenses these into four layers: Link, Internet, Transport, and Application.</p><p>IP (Internet Protocol) addresses identify devices on a network. IPv4 uses 32-bit addresses (e.g., 192.168.1.1) while IPv6 uses 128-bit addresses to accommodate the growing number of connected devices. TCP (Transmission Control Protocol) provides reliable, ordered data delivery with error checking and retransmission. UDP (User Datagram Protocol) is faster but unreliable — suitable for streaming and gaming where speed matters more than perfection.</p><p>DNS (Domain Name System) translates human-readable domain names (like google.com) into IP addresses. HTTP/HTTPS is the protocol for web communication — HTTPS adds TLS encryption for security. Routers direct traffic between networks, switches connect devices within a network, and firewalls filter traffic based on security rules. Understanding protocols like DHCP (automatic IP assignment) and NAT (sharing one public IP among multiple devices) is fundamental to network administration.</p>`,takeaways:['OSI model: 7 layers from Physical to Application; TCP/IP model: 4 layers','TCP provides reliable delivery; UDP is faster but unreliable','DNS translates domain names to IP addresses','HTTPS adds encryption to HTTP for secure web communication']},
{id:'cybersecurity',name:'Cybersecurity',time:'8 min read',content:`<p>Cybersecurity is the practice of protecting systems, networks, and data from digital attacks, unauthorized access, and damage. As our world becomes increasingly digital and interconnected, cybersecurity has become critical for individuals, businesses, and governments. The field encompasses prevention, detection, and response to threats.</p><p>Common attack vectors include malware (viruses, worms, trojans, ransomware), phishing (deceptive emails/messages tricking users into revealing credentials), SQL injection (inserting malicious code into database queries), cross-site scripting (XSS — injecting scripts into web pages), denial-of-service attacks (overwhelming systems with traffic), and man-in-the-middle attacks (intercepting communications between two parties).</p><p>Defense strategies operate at multiple levels. Network security includes firewalls, intrusion detection systems (IDS), and VPNs. Application security involves secure coding practices, input validation, and regular patching. Data security uses encryption (converting data to unreadable form using keys), both at rest and in transit. Access control uses authentication (verifying identity — passwords, biometrics, MFA) and authorization (controlling what authenticated users can do).</p><p>The CIA triad — Confidentiality, Integrity, and Availability — is the foundational framework. Confidentiality ensures data is accessible only to authorized parties. Integrity ensures data is accurate and unaltered. Availability ensures systems and data are accessible when needed. Modern cybersecurity also emphasizes defense in depth (multiple layers of security), the principle of least privilege (minimal access rights), and zero-trust architecture (never trust, always verify).</p>`,takeaways:['Common threats: malware, phishing, SQL injection, XSS, DDoS, man-in-the-middle','CIA triad: Confidentiality, Integrity, Availability','Defense in depth: multiple layers of security at network, application, and data levels','Principle of least privilege and zero-trust architecture minimize risk']}
]},
{id:'psychology',name:'Psychology',icon:'🧠',color:'#a29bfe',topics:[
{id:'cognitive',name:'Cognitive Psychology',time:'9 min read',content:`<p>Cognitive psychology studies mental processes including perception, attention, memory, language, problem-solving, and decision-making. Emerging in the 1950s as a reaction against behaviorism's focus on observable behavior, the cognitive revolution emphasized the importance of internal mental processes that cannot be directly observed but can be scientifically studied.</p><p>Memory is one of the most extensively studied cognitive processes. The multi-store model (Atkinson & Shiffrin, 1968) proposes three stages: sensory memory (brief sensory impressions, lasting milliseconds to seconds), short-term memory (holding ~7±2 items for about 20-30 seconds without rehearsal), and long-term memory (potentially unlimited capacity and duration). Working memory (Baddeley & Hitch) refined the short-term memory concept, proposing a central executive that coordinates the phonological loop (verbal information) and visuospatial sketchpad (visual/spatial information).</p><p>Attention determines what information we consciously process from the vast amount of sensory input we receive. Selective attention (Broadbent's filter model) suggests we filter out unattended information early in processing. The cocktail party effect — hearing your name in an unattended conversation — challenges strict early filter models. Divided attention research shows that performing multiple tasks simultaneously is possible but limited, and performance typically degrades compared to single-task focus.</p><p>Cognitive biases are systematic errors in thinking that affect judgment and decision-making. Confirmation bias leads people to seek information confirming existing beliefs. The availability heuristic causes overestimation of events that come easily to mind. Anchoring bias means initial information disproportionately influences subsequent judgments. Understanding these biases is crucial for improving decision-making in everyday life, business, medicine, and policy.</p>`,takeaways:['Memory stages: sensory → short-term (7±2 items) → long-term (unlimited capacity)','Working memory has a central executive, phonological loop, and visuospatial sketchpad','Selective attention filters information; divided attention degrades performance','Cognitive biases (confirmation, availability, anchoring) systematically distort thinking']},
{id:'behavioral',name:'Behavioral Theory',time:'8 min read',content:`<p>Behavioral psychology (behaviorism) focuses on observable behavior rather than internal mental states, arguing that behavior is learned through interactions with the environment. Founded in the early 20th century, behaviorism dominated psychology for decades and produced principles still widely used in education, therapy, animal training, and behavioral economics.</p><p>Classical conditioning, discovered by Ivan Pavlov, occurs when a neutral stimulus becomes associated with an unconditioned stimulus that naturally triggers a response. In Pavlov's famous experiment, dogs learned to salivate (conditioned response) at the sound of a bell (conditioned stimulus) after it was repeatedly paired with food (unconditioned stimulus). Key concepts include acquisition, extinction (response fades when CS is presented without UCS), spontaneous recovery, generalization, and discrimination.</p><p>Operant conditioning, developed by B.F. Skinner, describes how behavior is shaped by its consequences. Positive reinforcement (adding something pleasant) increases behavior. Negative reinforcement (removing something unpleasant) also increases behavior. Positive punishment (adding something unpleasant) decreases behavior. Negative punishment (removing something pleasant) decreases behavior. Reinforcement schedules (fixed/variable ratio and interval) affect how quickly behaviors are learned and how resistant they are to extinction.</p><p>Social learning theory, proposed by Albert Bandura, bridges behaviorism and cognitive psychology by demonstrating that people learn by observing others — not just through direct experience. His Bobo doll experiment showed children imitating aggressive behavior they observed in adults. Key concepts include observational learning, modeling, self-efficacy (belief in one's ability), and reciprocal determinism (behavior, environment, and personal factors all influence each other).</p>`,takeaways:['Classical conditioning: learning through association (Pavlov\'s dogs)','Operant conditioning: behavior shaped by consequences (Skinner)','Four types: positive/negative reinforcement (increase behavior), positive/negative punishment (decrease behavior)','Social learning theory: people learn by observing others (Bandura)']},
{id:'neuroscience',name:'Neuroscience Basics',time:'9 min read',content:`<p>Neuroscience is the scientific study of the nervous system, particularly the brain. The human brain contains approximately 86 billion neurons — specialized cells that transmit information through electrical and chemical signals. Understanding brain structure and function is essential for explaining behavior, cognition, emotion, and mental health.</p><p>Neurons communicate through electrochemical signaling. When a neuron is stimulated, an electrical impulse (action potential) travels along its axon using an all-or-nothing principle. At the synapse (the junction between neurons), the signal triggers the release of neurotransmitters — chemical messengers that cross the synaptic gap and bind to receptors on the next neuron. Key neurotransmitters include dopamine (reward, motivation), serotonin (mood regulation), norepinephrine (alertness), GABA (inhibition), and acetylcholine (muscle movement, memory).</p><p>The brain is organized into specialized regions. The cerebral cortex (the outer layer) handles higher functions and is divided into four lobes: frontal (planning, decision-making, personality), parietal (sensory processing, spatial awareness), temporal (auditory processing, memory, language comprehension), and occipital (visual processing). The limbic system, including the amygdala (emotion, especially fear) and hippocampus (memory formation), processes emotion and memory.</p><p>Neuroplasticity — the brain's ability to reorganize itself by forming new neural connections — is one of neuroscience's most important discoveries. The brain changes in response to learning, experience, and injury. This underlies our ability to learn new skills, recover from brain damage, and form memories. Brain imaging technologies like fMRI (measuring blood flow changes) and EEG (measuring electrical activity) have revolutionized our understanding of brain function in living humans.</p>`,takeaways:['The brain has ~86 billion neurons that communicate via electrical and chemical signals','Key neurotransmitters: dopamine (reward), serotonin (mood), GABA (inhibition)','Four cortical lobes: frontal, parietal, temporal, occipital — each with specialized functions','Neuroplasticity allows the brain to reorganize and form new connections throughout life']},
{id:'social-psych',name:'Social Psychology',time:'8 min read',content:`<p>Social psychology studies how people's thoughts, feelings, and behaviors are influenced by the actual, imagined, or implied presence of others. It examines the powerful impact of social situations on individual behavior — often revealing that context and social forces influence behavior far more than most people expect.</p><p>Conformity is the tendency to align behavior with group norms. Solomon Asch's line experiments (1951) demonstrated that about 75% of participants conformed to an obviously wrong group answer at least once, revealing the power of social pressure. Factors increasing conformity include group size, unanimity, and public (vs. private) responses. Milgram's obedience experiments showed that 65% of participants administered apparently lethal electric shocks when ordered by an authority figure — demonstrating the disturbing power of obedience to authority.</p><p>Attribution theory examines how we explain behavior. The fundamental attribution error is the tendency to overemphasize personality and underestimate situational factors when explaining others' behavior (e.g., assuming someone who cuts you off is rude rather than having an emergency). We tend to make the opposite error for ourselves — attributing our own failures to circumstances. This self-serving bias protects self-esteem.</p><p>Group dynamics reveal how people behave differently in groups than alone. Social facilitation occurs when the presence of others improves performance on simple tasks. Social loafing occurs when individuals exert less effort in groups. Groupthink happens when the desire for harmony overrides realistic appraisal, leading to poor decisions. Deindividuation — loss of self-awareness in groups — can lead to behavior individuals would normally avoid.</p>`,takeaways:['Asch: ~75% conformed to wrong answers under group pressure','Milgram: 65% obeyed authority to administer apparently lethal shocks','Fundamental attribution error: overemphasizing personality, underestimating situation','Groups cause social facilitation, social loafing, groupthink, and deindividuation']},
{id:'developmental',name:'Developmental Psychology',time:'9 min read',content:`<p>Developmental psychology studies how people grow, change, and remain consistent across the lifespan — from prenatal development through old age. It examines physical, cognitive, emotional, and social development, seeking to understand both universal patterns and individual differences in human development.</p><p>Jean Piaget's theory of cognitive development proposes four stages: sensorimotor (0-2 years, understanding the world through senses and actions, achieving object permanence), preoperational (2-7, developing language and symbolic thinking but egocentric and lacking conservation), concrete operational (7-11, logical thinking about concrete objects, understanding conservation), and formal operational (12+, abstract and hypothetical reasoning). While the strict stage model has been refined, Piaget's core insight — that children think qualitatively differently from adults — remains influential.</p><p>Erik Erikson's psychosocial theory describes eight stages of development, each involving a crisis that shapes personality. Trust vs. mistrust (infancy), autonomy vs. shame (toddlerhood), initiative vs. guilt (preschool), industry vs. inferiority (school age), identity vs. role confusion (adolescence), intimacy vs. isolation (young adulthood), generativity vs. stagnation (middle adulthood), and integrity vs. despair (late adulthood).</p><p>Attachment theory, developed by John Bowlby and Mary Ainsworth, examines the emotional bonds between infants and caregivers. Ainsworth's Strange Situation experiment identified three main attachment styles: secure (comfortable with exploration and caregiver return), anxious-ambivalent (distressed by separation, ambivalent on return), and avoidant (indifferent to caregiver). Attachment style in infancy correlates with relationship patterns in adulthood, though the relationship is complex and influenced by later experiences.</p>`,takeaways:['Piaget: 4 cognitive stages — sensorimotor, preoperational, concrete operational, formal operational','Erikson: 8 psychosocial stages with identity crises across the lifespan','Attachment styles (secure, anxious, avoidant) form in infancy and influence later relationships','Development is influenced by both universal patterns and individual experiences']},
{id:'abnormal',name:'Abnormal Psychology',time:'9 min read',content:`<p>Abnormal psychology studies unusual patterns of behavior, emotion, and thought that may be indicators of mental disorders. Defining "abnormal" is challenging — criteria include statistical infrequency, violation of social norms, personal distress, and impairment in daily functioning. The Diagnostic and Statistical Manual (DSM-5) is the standard classification system used in the United States for diagnosing mental disorders.</p><p>Anxiety disorders are among the most common mental health conditions. Generalized anxiety disorder (GAD) involves persistent, excessive worry about various aspects of life. Panic disorder features sudden, intense episodes of fear with physical symptoms (racing heart, shortness of breath). Specific phobias are irrational fears of particular objects or situations. Social anxiety disorder involves intense fear of social judgment. OCD involves intrusive, unwanted thoughts (obsessions) and repetitive behaviors (compulsions) performed to reduce anxiety.</p><p>Mood disorders significantly affect emotional state. Major depressive disorder (MDD) involves persistent low mood, loss of interest, changes in sleep and appetite, fatigue, and difficulty concentrating. Bipolar disorder alternates between depressive episodes and manic episodes (elevated mood, increased energy, decreased need for sleep, impulsive behavior). The biopsychosocial model explains these conditions through interactions of biological (genetics, neurotransmitters), psychological (cognitive patterns), and social factors (stress, support systems).</p><p>Treatment approaches include psychotherapy (cognitive-behavioral therapy is one of the most evidence-based approaches, changing maladaptive thought patterns and behaviors), pharmacotherapy (medications like SSRIs for depression and anxiety, mood stabilizers for bipolar disorder, antipsychotics for schizophrenia), and increasingly, combined approaches. The recovery model emphasizes that people with mental health conditions can lead fulfilling lives with appropriate support and treatment.</p>`,takeaways:['Abnormality defined by: statistical rarity, norm violation, distress, and functional impairment','Anxiety disorders: GAD, panic disorder, phobias, social anxiety, OCD','Mood disorders: major depression and bipolar disorder — explained by biopsychosocial model','Treatments: CBT (evidence-based psychotherapy), medications (SSRIs, mood stabilizers), or combined']}
]}
];

      text:plain,takeaways:takeawayText,
      words:(plain+' '+takeawayText+' '+topic.name).toLowerCase().split(/\W+/).filter(w=>w.length>2)
    });
  });
});

let aiContext={subject:null,topicHistory:[],turnCount:0,lastTopicMatches:[]};
const STOP_WORDS=new Set('the and what how does why can you tell about explain this that with for from are was were has have had not but its they their which would could should will also been being more some than into other then these those each make like just know take come get give want please is it a an of to in on do me my'.split(' '));

function searchKnowledge(query){
  const words=query.toLowerCase().split(/\W+/).filter(w=>w.length>2);
  const meaningful=words.filter(w=>!STOP_WORDS.has(w));
  if(meaningful.length===0)return[];
  return KNOWLEDGE_BASE.map(kb=>{
    let score=0;
    const kbSet=new Set(kb.words);
    meaningful.forEach(w=>{
      if(kbSet.has(w))score+=2;
      for(const kw of kb.words){if(kw!==w&&(kw.includes(w)||w.includes(kw))){score+=0.5;break;}}
    });
    if(aiContext.subject&&kb.subjectId===aiContext.subject)score*=1.4;
    meaningful.forEach(w=>{if(kb.topicName.toLowerCase().includes(w))score+=5;});
    return {...kb,score};
  }).filter(kb=>kb.score>0).sort((a,b)=>b.score-a.score).slice(0,3);
}

function searchExamKnowledge(query){
  const words=query.toLowerCase().split(/\W+/).filter(w=>w.length>2&&!STOP_WORDS.has(w));
  return EXAM_KNOWLEDGE.filter(ek=>{
    const ekSet=new Set(ek.words);
    return words.filter(w=>ekSet.has(w)).length>=2;
  }).slice(0,2);
}

function detectIntent(msg){
  const l=msg.toLowerCase();
  if(/^(hi|hello|hey|yo|sup|good morning|good evening)/i.test(l))return 'greeting';
  if(/thank|thanks|thx/i.test(l))return 'thanks';
  if(/(quiz|test|question|practice).*(me|give|create|generate)/i.test(l)||/give me.*(question|quiz)/i.test(l)||/ask me/i.test(l))return 'quiz_me';
  if(/(explain|what is|what are|what does|how does|how do|tell me about|describe|define|meaning of)/i.test(l))return 'explain';
  if(/(why|reason|cause)/i.test(l))return 'why';
  if(/(compare|difference|vs|versus|between)/i.test(l))return 'compare';
  if(/(example|instance|illustrate|show me)/i.test(l))return 'example';
  if(/(list|enumerate|name all|what are the)/i.test(l))return 'list';
  if(/(formula|equation|calculate|solve)/i.test(l))return 'formula';
  if(/(summary|summarize|overview|recap)/i.test(l))return 'summary';
  if(/(help|stuck|confused|don't understand|dont understand|i don't get)/i.test(l))return 'help';
  return 'general';
}

function detectSubject(msg){
  const l=msg.toLowerCase();
  const map={
    biology:['biology','bio','cell','dna','gene','evolution','photosynthesis','ecology','mitochondria','protein','enzyme','species','chromosome','allele'],
    chemistry:['chemistry','chem','atom','molecule','bond','reaction','acid','base','ph','element','periodic','organic','ion','compound'],
    physics:['physics','newton','force','energy','wave','circuit','quantum','thermodynamic','entropy','voltage','momentum','gravity'],
    mathematics:['math','algebra','calculus','geometry','trigonometry','statistics','probability','equation','derivative','integral','matrix','vector'],
    english:['english','literature','essay','poem','poetry','shakespeare','novel','literary','metaphor','simile','irony','narrative','sonnet'],
    history:['history','war','revolution','civilization','renaissance','cold war','civil rights','ancient','medieval','empire','treaty'],
    cs:['computer','programming','algorithm','data structure','code','software','database','network','cyber','coding','binary','recursion'],
    psychology:['psychology','psych','cognitive','behavior','brain','neuron','memory','freud','piaget','conditioning','mental health','anxiety']
  };
  let best=null,bs=0;
  Object.entries(map).forEach(([sid,kws])=>{const s=kws.filter(kw=>l.includes(kw)).length;if(s>bs){bs=s;best=sid;}});
  return best;
}

function generateQuizResponse(subject){
  const sid=subject||aiContext.subject;
  const pool=sid?EXAMS[sid]:null;
  if(!pool)return "Tell me which subject you'd like to be quizzed on — Biology, Chemistry, Physics, Math, English, History, Computer Science, or Psychology!";
  const q=pool[Math.floor(Math.random()*pool.length)];
  const name=SUBJECTS.find(s=>s.id===sid)?.name||sid;
  return `<strong>📝 ${name} Quiz Question:</strong>\n\n${q.q}\n\n`+
    q.opts.map((o,i)=>`<strong>${'ABCD'[i]})</strong> ${o}`).join('\n')+
    `\n\nThink about it, then scroll down for the answer...\n\n<details style="margin-top:8px;cursor:pointer"><summary style="color:var(--pri);font-weight:600">Reveal Answer</summary>\n<div style="margin-top:8px"><strong>✅ ${'ABCD'[q.ans]}) ${q.opts[q.ans]}</strong>\n\n${q.exp}</div></details>`;
}

function getLocalAIResponse(msg){
  const intent=detectIntent(msg);
  const subject=detectSubject(msg);
  if(subject)aiContext.subject=subject;
  aiContext.turnCount++;
  // Check selected subject from dropdown
  const selSubj=document.getElementById('chatSubject');
  if(selSubj&&selSubj.value&&!aiContext.subject)aiContext.subject=selSubj.value;

  if(intent==='greeting')return "Hello! I'm your StudyPal AI tutor with deep knowledge of <strong>8 subjects and 48 topics</strong>. I can:\n\n• <strong>Explain</strong> any concept from our lessons\n• <strong>Quiz you</strong> with practice questions\n• <strong>Compare</strong> concepts side by side\n• <strong>Give examples</strong> and worked problems\n• <strong>Summarize</strong> entire topics\n\nAsk me anything — like \"explain photosynthesis\" or \"quiz me on physics\"!";
  if(intent==='thanks')return "You're welcome! Keep studying — consistency is key. What shall we tackle next?";
  if(intent==='quiz_me')return generateQuizResponse(subject);

  const kbResults=searchKnowledge(msg);
  const examResults=searchExamKnowledge(msg);

  // Keyword fallback scoring
  const lower=msg.toLowerCase();
  let bestKw=null,bestKwScore=0;
  for(const r of AI_RESPONSES){let s=0;for(const kw of r.kw){if(lower.includes(kw))s++;}if(s>bestKwScore){bestKwScore=s;bestKw=r;}}

  if(kbResults.length>0&&kbResults[0].score>3){
    const top=kbResults[0];
    aiContext.lastTopicMatches=[top];
    const sentences=top.text.split(/\.\s+/).filter(s=>s.length>20);
    const qWords=new Set(msg.toLowerCase().split(/\W+/).filter(w=>w.length>2&&!STOP_WORDS.has(w)));
    const relevant=sentences.filter(s=>{const sw=s.toLowerCase().split(/\W+/);return sw.some(w=>qWords.has(w));}).slice(0,5);
    const takeaways=top.takeaways.split('. ').map(t=>'• '+t).join('\n');
    let r='';

    if(intent==='summary'){
      r=`<strong>📚 ${top.topicName}</strong> (${top.subject})\n\n`;
      r+=(relevant.length>0?relevant:sentences.slice(0,4)).join('. ')+'.\n\n';
      r+=`<strong>Key takeaways:</strong>\n${takeaways}`;
    } else if(intent==='list'){
      r=`Key points about <strong>${top.topicName}</strong>:\n\n${takeaways}`;
    } else if(intent==='compare'&&kbResults.length>1){
      const t1=kbResults[0],t2=kbResults[1];
      r=`<strong>⚖️ ${t1.topicName} vs. ${t2.topicName}:</strong>\n\n`;
      r+=`<strong>${t1.topicName}:</strong>\n${t1.takeaways.split('. ').slice(0,2).map(t=>'• '+t).join('\n')}\n\n`;
      r+=`<strong>${t2.topicName}:</strong>\n${t2.takeaways.split('. ').slice(0,2).map(t=>'• '+t).join('\n')}`;
    } else if(intent==='example'){
      r=`From <strong>${top.topicName}</strong>:\n\n`;
      r+=(relevant.length>0?relevant:sentences.slice(1,4)).join('. ')+'.';
      if(examResults.length>0){
        r+=`\n\n<strong>📝 Worked example:</strong> ${examResults[0].q}\n<strong>Answer:</strong> ${examResults[0].answer}\n<em>${examResults[0].exp}</em>`;
      }
    } else if(intent==='formula'){
      r=`From <strong>${top.topicName}</strong>:\n\n`;
      const formulas=sentences.filter(s=>/[=×÷±²³√∫∑πΔ]|formula|equation/i.test(s));
      r+=(formulas.length>0?formulas:relevant.slice(0,3)).join('. ')+'.';
    } else if(intent==='why'){
      r=`<strong>Why?</strong> Let me explain from <strong>${top.topicName}</strong>:\n\n`;
      r+=(relevant.length>0?relevant:sentences.slice(0,4)).join('. ')+'.';
    } else {
      r=`<strong>${top.topicName}</strong> (${top.subject}):\n\n`;
      r+=(relevant.length>2?relevant:sentences.slice(0,5)).join('. ')+'.';
      r+=`\n\n<strong>Key points:</strong>\n${top.takeaways.split('. ').slice(0,3).map(t=>'• '+t).join('\n')}`;
    }

    // Add exam question as bonus
    if(examResults.length>0&&intent!=='example'){
      r+=`\n\n<strong>🧪 Test yourself:</strong> ${examResults[0].q}\n<details><summary style="color:var(--pri);font-weight:600;cursor:pointer">Show answer</summary>${examResults[0].answer} — ${examResults[0].exp}</details>`;
    }

    const followups=['Want me to quiz you on this?','Should I explain a related concept?','Any follow-up questions?','Want a deeper dive into any part?'];
    r+='\n\n'+followups[Math.floor(Math.random()*followups.length)];
    return r;
  }

  if(bestKw&&bestKwScore>0){
    let r=bestKw.r;
    if(examResults.length>0)r+=`\n\n<strong>🧪 Quick check:</strong> ${examResults[0].q}\n<details><summary style="color:var(--pri);font-weight:600;cursor:pointer">Answer</summary>${examResults[0].answer} — ${examResults[0].exp}</details>`;
    return r;
  }

  if(intent==='help')return "Let's work through this! Tell me:\n\n1. Which <strong>subject</strong>? (Biology, Chemistry, Physics, etc.)\n2. What <strong>specific concept</strong> is tricky?\n\nThe more specific, the better I can help — e.g. \"I don't understand ionic bonds\" or \"explain the quadratic formula step by step.\"";

  const subjectName=subject?SUBJECTS.find(s=>s.id===subject)?.name:null;
  if(subjectName){
    const subj=SUBJECTS.find(s=>s.id===subject);
    return `I see you're interested in <strong>${subjectName}</strong>! Here are our topics:\n\n`+
      subj.topics.map(t=>`• <strong>${t.name}</strong>`).join('\n')+
      `\n\nAsk about any of these — like "explain ${subj.topics[0].name}" or "quiz me on ${subjectName}"!`;
  }

  return "I'm your expert tutor for <strong>Biology, Chemistry, Physics, Math, English Literature, History, Computer Science, and Psychology</strong>.\n\nTry:\n• \"Explain photosynthesis\"\n• \"What is Newton's second law?\"\n• \"Quiz me on chemistry\"\n• \"Compare ionic and covalent bonds\"\n• \"Summarize the Cold War\"\n\nOr pick a subject from the dropdown!";
}

// API-based AI (when configured)
async function callAIAPI(msg){
  const sys=`You are StudyPal AI Tutor. You teach Biology, Chemistry, Physics, Mathematics, English Literature, History, Computer Science, and Psychology. Be concise, educational, encouraging. Use bullet points and bold (**term**) for key terms. Keep responses under 300 words. Format with HTML: <strong>, <em>, bullet lists.`;
  const recent=chatMessages.slice(-6).map(m=>({role:m.role==='user'?'user':'assistant',content:m.text.replace(/<[^>]+>/g,'')}));
  try{
    let url,headers,body;
    if(AI_CONFIG.provider==='openai'){
      url='https://api.openai.com/v1/chat/completions';
      headers={'Content-Type':'application/json','Authorization':'Bearer '+AI_CONFIG.apiKey};
      body=JSON.stringify({model:AI_CONFIG.model||'gpt-4o-mini',messages:[{role:'system',content:sys},...recent,{role:'user',content:msg}],max_tokens:600,temperature:0.7});
    } else if(AI_CONFIG.provider==='groq'){
      url='https://api.groq.com/openai/v1/chat/completions';
      headers={'Content-Type':'application/json','Authorization':'Bearer '+AI_CONFIG.apiKey};
      body=JSON.stringify({model:AI_CONFIG.model||'llama-3.3-70b-versatile',messages:[{role:'system',content:sys},...recent,{role:'user',content:msg}],max_tokens:600,temperature:0.7});
    } else if(AI_CONFIG.provider==='custom'){
      url=AI_CONFIG.endpoint||'https://api.openai.com/v1/chat/completions';
      headers={'Content-Type':'application/json','Authorization':'Bearer '+AI_CONFIG.apiKey};
      body=JSON.stringify({model:AI_CONFIG.model||'gpt-4o-mini',messages:[{role:'system',content:sys},...recent,{role:'user',content:msg}],max_tokens:600,temperature:0.7});
    } else throw new Error('Unknown provider');
    const resp=await fetch(url,{method:'POST',headers,body});
    if(!resp.ok)throw new Error(await resp.text());
    const data=await resp.json();
    let text=data.choices[0].message.content;
    // Convert markdown bold to HTML
    text=text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    text=text.replace(/\*(.+?)\*/g,'<em>$1</em>');
    text=text.replace(/\n/g,'<br>');
    return {text,source:'api'};
  } catch(e){
    console.error('API error:',e);
    return {text:getLocalAIResponse(msg)+'<br><br><span class="msg-source">⚠️ API call failed — using built-in AI</span>',source:'fallback'};
  }
}

async function getAIResponse(msg){
  if(AI_CONFIG.apiKey&&AI_CONFIG.provider&&AI_CONFIG.provider!=='local'){
    const r=await callAIAPI(msg);
    return r.text;
  }
  return getLocalAIResponse(msg);
}

async function sendChat(text){
  const input=document.getElementById('chatInput');
  const msg=text||input?.value?.trim();
  if(!msg)return;
  chatMessages.push({role:'user',text:msg});
  if(input)input.value='';
  renderTutorMessages(true); // show typing

  const isAsync=AI_CONFIG.apiKey&&AI_CONFIG.provider!=='local';
  if(isAsync){
    try{
      const response=await getAIResponse(msg);
      chatMessages.push({role:'bot',text:response});
      renderTutorMessages(false);
    }catch(e){
      chatMessages.push({role:'bot',text:getLocalAIResponse(msg)});
      renderTutorMessages(false);
    }
  } else {
    setTimeout(()=>{
      const response=getLocalAIResponse(msg);
      chatMessages.push({role:'bot',text:response});
      renderTutorMessages(false);
    },400+Math.random()*500);
  }
}

  // Refresh suggestions
  const sugBox=document.getElementById('chatSuggestions');
  if(sugBox&&chatMessages.length>2)sugBox.style.display='none';
}

let studyState=null; // {subject,questions,current,answers[],chatLog[],hintUsed,phase:'select'|'active'|'feedback'|'done'}

const STUDY_HINTS={};
// Generate contextual hints for each question
function getStudyHint(q){
  // Give a hint that narrows down without revealing answer
  const correct=q.opts[q.ans];
  const hints=[
    `Think about what the key term in this question really means. Focus on the core concept.`,
    `Try to eliminate options that are clearly unrelated. At least two options should stand out as less likely.`,
    `Remember the fundamental principles you learned in this subject. Which answer aligns best with them?`,
    `Consider each option carefully. One common mistake is confusing similar-sounding terms.`,
    `Break the question down: what is it really asking? Sometimes rephrasing the question helps.`
  ];
  return hints[Math.floor(Math.random()*hints.length)];
}

function getStudyEncouragement(isCorrect, q, selected){
  if(isCorrect){
    const praises=['Excellent!','Spot on!','That\'s right!','Great job!','Correct!','Nailed it!','Well done!','Perfect!'];
    return praises[Math.floor(Math.random()*praises.length)];
  } else {
    const nudges=['Not quite, but let\'s learn from this.','That\'s okay — mistakes are how we learn!','Close! Let\'s break this down.','Not this time, but you\'ll get it next time.','Let\'s look at why the correct answer works.'];
    return nudges[Math.floor(Math.random()*nudges.length)];
  }
}

function getStudyDeepExplanation(q){
  // Extended explanation beyond the basic one
  const correct=q.opts[q.ans];
  return `${q.exp}\n\nThe correct answer is <strong>${correct}</strong>. Understanding this concept will help you with related questions. If you'd like, ask me a follow-up question below to explore this further!`;
}

  const subjectMap={biology:'Biology',chemistry:'Chemistry',physics:'Physics',mathematics:'Mathematics',english:'English Literature',history:'History',cs:'Computer Science',psychology:'Psychology'};
  // Shuffle questions for variety

  studyState={
    phase:'active',
    subject,
    name:subjectMap[subject],
    questions:qs,
    current:0,
    answers:[], // {selected,correct,hintUsed}
    chatLog:[], // per-question chat: [{role,text}]
    hintUsed:false,
    showedFeedback:false
  };

function renderStudySession(el){
  const {questions,current,answers,phase,name,chatLog,hintUsed,showedFeedback}=studyState;
  const q=questions[current];
  const answered=phase==='feedback';
  const selectedIdx=answered?answers[current]?.selected:null;

  // Build progress segments
  let progressSegs='';
  for(let i=0;i<questions.length;i++){
    let cls='';

  }

  chatHTML+=chatLog.map(m=>{

      </div>`;

  }).join('');

  // Feedback section

function studySelect(i){
  if(!studyState||studyState.phase==='feedback')return;
  const q=studyState.questions[studyState.current];
  const isCorrect=i===q.ans;
  const encouragement=getStudyEncouragement(isCorrect,q,i);
  const explanation=getStudyDeepExplanation(q);

  studyState.answers[studyState.current]={selected:i,correct:isCorrect,hintUsed:studyState.hintUsed,encouragement,explanation};
  studyState.phase='feedback';

  // Add tutor feedback to chat
  let tutorMsg='';
  if(isCorrect){
    tutorMsg=`<strong>${encouragement}</strong> ${q.opts[q.ans]} is the right answer. ${q.exp} Keep this momentum going!`;
  } else {
    tutorMsg=`<strong>${encouragement}</strong> You chose "${q.opts[i]}", but the correct answer is <strong>${q.opts[q.ans]}</strong>. ${q.exp} Don't worry — now you know this for next time!`;
  }
  studyState.chatLog.push({role:'tutor',text:tutorMsg});

  renderStudy();
}

function studyHint(){
  if(!studyState||studyState.hintUsed)return;
  studyState.hintUsed=true;
  const q=studyState.questions[studyState.current];

  // Generate a helpful hint that narrows options
  const wrongOpts=q.opts.filter((_,i)=>i!==q.ans);
  const eliminateOne=wrongOpts[Math.floor(Math.random()*wrongOpts.length)];
  const hintText=`💡 <strong>Hint:</strong> You can eliminate "<em>${eliminateOne}</em>" — that one's not right. ${getStudyHint(q)} Think about what remains!`;

  studyState.chatLog.push({role:'tutor',text:hintText});
  renderStudy();
}

function studyAsk(){
  const input=document.getElementById('studyAskInput');
  if(!input)return;
  const text=input.value.trim();
  if(!text)return;
  input.value='';

  studyState.chatLog.push({role:'user',text});

  // Generate contextual response
  const q=studyState.questions[studyState.current];
  const lower=text.toLowerCase();

  // Try to match with AI tutor knowledge base first
  let response='';
  let bestScore=0;
  for(const r of AI_RESPONSES){
    let score=0;
    for(const kw of r.kw){if(lower.includes(kw))score++;}
    if(score>bestScore){bestScore=score;response=r.r;}
  }

  if(bestScore===0){
    // Generate contextual response based on the current question
    const conceptResponses=[
      `Great question! This relates to the concept of <strong>${q.opts[q.ans]}</strong>. ${q.exp} Understanding this foundation will help you connect related ideas across the subject.`,
      `That's exactly the kind of thinking that leads to deeper understanding! The key concept here is: ${q.exp} Try to connect this to other topics you've studied.`,
      `Good thinking! Let me expand on this: ${q.exp} This is a concept that comes up frequently, so understanding it well will pay off in exams and future study.`,
      `I'm glad you're digging deeper! Here's more context: ${q.exp} The important thing to remember is how this concept connects to the broader subject. Would you like to move on to the next question?`
    ];
    response=conceptResponses[Math.floor(Math.random()*conceptResponses.length)];
  }

  // Add with slight delay for realism
  studyState.chatLog.push({role:'tutor',text:response});
  renderStudy();

  // Scroll to bottom
  setTimeout(()=>{
    const session=document.querySelector('.study-session');
    if(session)session.scrollIntoView({behavior:'smooth',block:'end'});
  },100);
}

function studyNext(){

        <div style="font-size:0.8rem;color:var(--text2)">
          ${!isCorrect?`Your answer: <span style="color:var(--acc2)">${q.opts[a?.selected]||'—'}</span> · `:''}
          Correct: <span style="color:var(--acc)">${q.opts[q.ans]}</span>
        </div>
      </div>`;
    }).join('')}

    <div style="display:flex;gap:12px;margin-top:20px;flex-wrap:wrap">
      <button class="btn btn-pri" onclick="startStudySession('${studyState.subject}')">Study Again</button>
      <button class="btn btn-outline" onclick="studyState=null;renderStudy()">Choose Another Subject</button>
      <button class="btn btn-ghost" onclick="navigate('subjects')">Review Lessons</button>
    </div>
  </div>`;
}

// === EXAMS ===
function renderExams(){
  const el=document.getElementById('page-exams');
  if(examState&&examState.phase==='review'){renderExamReview(el);return;}
  if(examState&&examState.phase==='results'){renderExamResults(el);return;}
  if(examState&&examState.phase==='active'){renderExamActive(el);return;}
  const subjectMap={biology:'Biology',chemistry:'Chemistry',physics:'Physics',mathematics:'Mathematics',english:'English Literature',history:'History',cs:'Computer Science',psychology:'Psychology'};
  const icons={biology:'🧬',chemistry:'⚗️',physics:'⚡',mathematics:'📐',english:'📖',history:'🏛️',cs:'💻',psychology:'🧠'};
  el.innerHTML=`
  <div class="exam-setup">
    <h2>Mock Exams</h2>
    <p>Choose a subject and test your knowledge with 10 questions</p>
    <div class="exam-subject-grid">
      ${Object.keys(EXAMS).map(k=>`<div class="exam-subject-btn" onclick="startExam('${k}')">
        <div class="esb-icon">${icons[k]||'📝'}</div>
        <div class="esb-name">${subjectMap[k]}</div>
      </div>`).join('')}
    </div>
  </div>`;
}
function startExam(subject){
  const subjectMap={biology:'Biology',chemistry:'Chemistry',physics:'Physics',mathematics:'Mathematics',english:'English Literature',history:'History',cs:'Computer Science',psychology:'Psychology'};
  examState={phase:'active',subject,name:subjectMap[subject],questions:EXAMS[subject].map(q=>({...q,selected:null})),current:0};
  examSeconds=0;
  if(examTimer)clearInterval(examTimer);
  examTimer=setInterval(()=>{examSeconds++;updateTimer()},1000);
  renderExams();
}
function updateTimer(){
  const el=document.getElementById('examTimerDisplay');
  if(el){const m=Math.floor(examSeconds/60);const s=examSeconds%60;el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;}
}
function renderExamActive(el){
  const {questions,current,name}=examState;
  const q=questions[current];
  el.innerHTML=`
  <div class="exam-active">
    <div class="exam-top-bar">
      <div><strong>${name}</strong> <span style="color:var(--text2);font-size:0.85rem">· Question ${current+1}/${questions.length}</span></div>
      <div class="exam-timer">⏱ <span id="examTimerDisplay">00:00</span></div>
    </div>
    <div class="exam-q-nav">${questions.map((qq,i)=>`<button class="${i===current?'current':qq.selected!==null?'answered':''}" onclick="examGo(${i})">${i+1}</button>`).join('')}</div>
    <div class="exam-question" style="margin-top:20px">
      <div class="q-num">Question ${current+1} of ${questions.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="exam-options">
        ${q.opts.map((o,i)=>`<div class="exam-option ${q.selected===i?'selected':''}" onclick="examSelect(${i})">
          <div class="opt-letter">${['A','B','C','D'][i]}</div>
          <div>${o}</div>
        </div>`).join('')}
      </div>
    </div>
    <div class="exam-nav-btns">
      ${current>0?'<button class="btn btn-outline" onclick="examGo('+(current-1)+')">← Previous</button>':''}
      ${current<questions.length-1?`<button class="btn btn-pri" onclick="examGo(${current+1})">Next →</button>`
        :`<button class="btn btn-pri" onclick="submitExam()" style="background:#00cec9">Submit Exam ✓</button>`}
    </div>
  </div>`;
  updateTimer();
}
function examGo(i){examState.current=i;renderExams();}
function examSelect(i){examState.questions[examState.current].selected=i;renderExams();}
function submitExam(){
  if(examTimer)clearInterval(examTimer);
  const correct=examState.questions.filter(q=>q.selected===q.ans).length;
  const total=examState.questions.length;
  const score=Math.round((correct/total)*100);
  examState.phase='results';
  examState.score=score;
  examState.correct=correct;
  examState.time=examSeconds;
  STATE.examHistory.push({subject:examState.name,score,date:Date.now(),correct,total,time:examSeconds});
  save();
  renderExams();
}
function renderExamResults(el){
  const {score,correct,questions,name,time}=examState;
  const grade=score>=90?'A':score>=80?'B':score>=70?'C':score>=60?'D':'F';
  const gradeColor=score>=70?'var(--acc)':'var(--acc2)';
  const circumf=2*Math.PI*70;
  const offset=circumf-(score/100)*circumf;
  const m=Math.floor(time/60);const s=time%60;
  el.innerHTML=`
  <div class="exam-results">
    <h2>Exam Complete!</h2>
    <p style="color:var(--text2);margin-bottom:20px">${name}</p>
    <div class="results-circle">
      <svg width="160" height="160"><circle cx="80" cy="80" r="70" fill="none" stroke="var(--bg3)" stroke-width="8"/>
      <circle cx="80" cy="80" r="70" fill="none" stroke="${gradeColor}" stroke-width="8"
        stroke-dasharray="${circumf}" stroke-dashoffset="${offset}" stroke-linecap="round"
        style="transition:stroke-dashoffset 1s ease"/></svg>
      <div class="score-text"><div class="score-num">${score}%</div><div class="score-label">${correct}/${questions.length} correct</div></div>
    </div>
    <div class="results-grade" style="color:${gradeColor}">Grade: ${grade}</div>
    <p class="results-summary">Time: ${m}m ${s}s</p>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-pri" onclick="examState.phase='review';renderExams()">Review Answers</button>
      <button class="btn btn-outline" onclick="examState=null;renderExams()">New Exam</button>
    </div>
  </div>`;
}
function renderExamReview(el){
  const {questions,name}=examState;
  el.innerHTML=`
  <div class="back-btn" onclick="examState.phase='results';renderExams()">← Back to Results</div>
  <h2 style="margin-bottom:20px">${name} — Review</h2>
  ${questions.map((q,qi)=>{
    const isCorrect=q.selected===q.ans;
    return `<div class="card" style="margin-bottom:16px">
      <div class="q-num" style="margin-bottom:6px">Question ${qi+1} ${isCorrect?'✅':'❌'}</div>
      <div class="q-text" style="font-size:0.95rem">${q.q}</div>
      <div class="exam-options" style="margin-top:12px">
        ${q.opts.map((o,i)=>{
          let cls='';
          if(i===q.ans)cls='correct';
          else if(i===q.selected&&i!==q.ans)cls='incorrect';
          return `<div class="exam-option ${cls}" style="cursor:default">
            <div class="opt-letter">${['A','B','C','D'][i]}</div><div>${o}</div></div>`;
        }).join('')}
      </div>
      <div class="exam-explanation">${q.exp}</div>
    </div>`;
  }).join('')}
  <button class="btn btn-outline" style="width:100%;margin-top:8px" onclick="examState=null;renderExams()">Back to Exams</button>`;
}

// === PROGRESS ===
function renderProgress(){
  const el=document.getElementById('page-progress');
  const totalTopics=SUBJECTS.reduce((a,s)=>a+s.topics.length,0);
  const completedTotal=getCompletedCount();
  const overallPct=totalTopics?Math.round((completedTotal/totalTopics)*100):0;
  const circumf=2*Math.PI*80;
  const offset=circumf-(overallPct/100)*circumf;

  const achievements=[
    {icon:'📖',name:'First Lesson',desc:'Complete your first lesson',unlocked:completedTotal>=1},
    {icon:'🏅',name:'Five Down',desc:'Complete 5 lessons',unlocked:completedTotal>=5},
    {icon:'📚',name:'Scholar',desc:'Complete 10 lessons',unlocked:completedTotal>=10},
    {icon:'🎯',name:'Quiz Taker',desc:'Take your first exam',unlocked:getExamsTaken()>=1},
    {icon:'🏆',name:'Quiz Master',desc:'Score 90%+ on an exam',unlocked:STATE.examHistory.some(e=>e.score>=90)},
    {icon:'🔥',name:'5-Day Streak',desc:'Study 5 days in a row',unlocked:STATE.streak>=5},
    {icon:'⭐',name:'All-Rounder',desc:'Complete a lesson in every subject',unlocked:SUBJECTS.every(s=>s.topics.some(t=>STATE.completed[s.id+'_'+t.id]))},
    {icon:'💎',name:'Perfectionist',desc:'Score 100% on any exam',unlocked:STATE.examHistory.some(e=>e.score===100)},
  ];

  el.innerHTML=`
  <h2 style="font-size:1.4rem;margin-bottom:20px">Your Progress</h2>
  <div class="card progress-overview" style="margin-bottom:24px">
    <div class="big-circle">
      <svg width="180" height="180"><circle cx="90" cy="90" r="80" fill="none" stroke="var(--bg3)" stroke-width="10"/>
      <circle cx="90" cy="90" r="80" fill="none" stroke="var(--pri)" stroke-width="10"
        stroke-dasharray="${circumf}" stroke-dashoffset="${offset}" stroke-linecap="round"
        style="transition:stroke-dashoffset 1s ease"/></svg>
      <div class="bc-text"><div class="bc-num">${overallPct}%</div><div class="bc-label">Overall Progress</div></div>
    </div>
    <p style="color:var(--text2);font-size:0.9rem">${completedTotal} of ${totalTopics} lessons completed</p>
  </div>

  <div class="section-title">Subject Progress</div>
  <div class="card" style="margin-bottom:24px;padding:16px 20px">
    ${SUBJECTS.map(s=>{
      const pct=getSubjectProgress(s.id);
      return `<div class="progress-bar-wrap">
        <div class="pb-header"><span>${s.icon} ${s.name}</span><span>${pct}%</span></div>
        <div class="progress-bar"><div class="progress-bar-fill" style="width:${pct}%;background:${s.color}"></div></div>
      </div>`;
    }).join('')}
  </div>

  <div class="section-title">Achievements</div>
  <div class="achievements-grid" style="margin-bottom:24px">
    ${achievements.map(a=>`<div class="achievement ${a.unlocked?'':'locked'}">
      <div class="ach-icon">${a.icon}</div>
      <div class="ach-name">${a.name}</div>
      <div class="ach-desc">${a.desc}</div>
    </div>`).join('')}
  </div>

  ${STATE.examHistory.length?`<div class="section-title">Exam History</div>
  <div class="card" style="overflow-x:auto">
    <table class="exam-history-table">
      <thead><tr><th>Subject</th><th>Score</th><th>Result</th><th>Date</th></tr></thead>
      <tbody>${STATE.examHistory.slice().reverse().map(e=>{
        const d=new Date(e.date);
        const grade=e.score>=90?'A':e.score>=80?'B':e.score>=70?'C':e.score>=60?'D':'F';
        return `<tr><td>${e.subject}</td><td><strong>${e.score}%</strong></td><td><span class="badge ${e.score>=70?'badge-acc':'badge-warn'}">${grade}</span></td><td>${d.toLocaleDateString()}</td></tr>`;
      }).join('')}</tbody>
    </table>
  </div>`:''}`;
}

// === THEME ===
function toggleTheme(){
  const html=document.documentElement;
  const next=html.getAttribute('data-theme')==='dark'?'light':'dark';
  html.setAttribute('data-theme',next);
  localStorage.setItem('studypal-theme',next);
}
(function(){
  const saved=localStorage.getItem('studypal-theme');
  if(saved)document.documentElement.setAttribute('data-theme',saved);
})();

// === INIT ===
renderHome();
</script>
</body>
</html>
