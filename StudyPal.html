<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>StudyPal — Your Learning Companion</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
<style>
/* === CSS RESET & VARIABLES === */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--pri:#6C5CE7;--pri-light:#a29bfe;--pri-dark:#5a4bd1;
--acc:#00cec9;--acc2:#fd79a8;--acc3:#fdcb6e;
--bg:#f8f7ff;--bg2:#ffffff;--bg3:#eee8ff;
--text:#2d3436;--text2:#636e72;--text3:#b2bec3;
--card:#ffffff;--card-border:rgba(108,92,231,0.08);
--shadow:0 2px 16px rgba(108,92,231,0.10);
--shadow-lg:0 8px 32px rgba(108,92,231,0.15);
--radius:16px;--radius-sm:10px;--radius-xs:6px;
--nav-h:72px;--sidebar-w:260px;
--font-body:'DM Sans',sans-serif;--font-display:'Fraunces',serif;
--transition:0.3s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"]{
--bg:#0a0a1a;--bg2:#141428;--bg3:#1e1e3a;
--text:#e8e8f0;--text2:#a0a0b8;--text3:#5a5a72;
--card:#1a1a30;--card-border:rgba(108,92,231,0.15);
--shadow:0 2px 16px rgba(0,0,0,0.3);
--shadow-lg:0 8px 32px rgba(0,0,0,0.4);
}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);
line-height:1.6;overflow-x:hidden;min-height:100dvh;transition:background var(--transition),color var(--transition)}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
img{max-width:100%}
h1,h2,h3{font-family:var(--font-display);font-weight:600;line-height:1.2}

/* === LAYOUT === */
.app{display:flex;min-height:100dvh}
.sidebar{display:none;width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--card-border);
padding:24px 0;flex-shrink:0;position:fixed;top:0;left:0;height:100dvh;z-index:100;
flex-direction:column;overflow-y:auto;transition:transform var(--transition)}
.sidebar-brand{padding:0 24px 32px;display:flex;align-items:center;gap:12px}
.sidebar-brand .logo{width:40px;height:40px;background:linear-gradient(135deg,var(--pri),var(--acc));
border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff}
.sidebar-brand h2{font-size:1.25rem;color:var(--pri)}
.sidebar-nav{flex:1}
.sidebar-nav button{width:100%;display:flex;align-items:center;gap:14px;padding:14px 24px;
font-size:0.95rem;font-weight:500;color:var(--text2);transition:all var(--transition);position:relative}
.sidebar-nav button:hover{color:var(--pri);background:var(--bg3)}
.sidebar-nav button.active{color:var(--pri);background:var(--bg3);font-weight:600}
.sidebar-nav button.active::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:3px;
background:var(--pri);border-radius:0 3px 3px 0}
.sidebar-nav .nav-icon{width:22px;height:22px;flex-shrink:0}
.sidebar-footer{padding:16px 24px;border-top:1px solid var(--card-border)}
.theme-toggle{display:flex;align-items:center;gap:10px;padding:10px 0;font-size:0.9rem;color:var(--text2);cursor:pointer}
.theme-toggle .toggle-track{width:44px;height:24px;background:var(--text3);border-radius:12px;
position:relative;transition:background var(--transition);flex-shrink:0}
.theme-toggle .toggle-track::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;
background:#fff;border-radius:50%;transition:transform var(--transition)}
[data-theme="dark"] .theme-toggle .toggle-track{background:var(--pri)}
[data-theme="dark"] .theme-toggle .toggle-track::after{transform:translateX(20px)}

.main{flex:1;padding-bottom:calc(var(--nav-h) + 16px);width:100%}
.main-inner{max-width:900px;margin:0 auto;padding:20px 16px}

/* === BOTTOM NAV (mobile) === */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--bg2);
border-top:1px solid var(--card-border);display:flex;align-items:center;justify-content:space-around;
z-index:100;padding-bottom:env(safe-area-inset-bottom);backdrop-filter:blur(16px);
background:rgba(255,255,255,0.85)}
[data-theme="dark"] .bottom-nav{background:rgba(20,20,40,0.9)}
.bottom-nav button{display:flex;flex-direction:column;align-items:center;gap:4px;
padding:8px 12px;border-radius:var(--radius-sm);transition:all var(--transition);min-width:56px}
.bottom-nav button span{font-size:0.65rem;font-weight:500;color:var(--text3);transition:color var(--transition)}
.bottom-nav button svg{transition:all var(--transition)}
.bottom-nav button.active svg{color:var(--pri);transform:scale(1.1)}
.bottom-nav button.active span{color:var(--pri);font-weight:600}

/* === PAGE TRANSITIONS === */
.page{display:none;animation:fadeUp 0.35s ease forwards}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* === CARDS === */
.card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);
padding:20px;box-shadow:var(--shadow);transition:all var(--transition)}
.card:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px)}
.card-grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
.card-row{display:grid;gap:12px;grid-template-columns:repeat(2,1fr)}

/* === BUTTONS === */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;
border-radius:var(--radius-sm);font-weight:600;font-size:0.9rem;transition:all var(--transition);
min-height:44px}
.btn-pri{background:var(--pri);color:#fff;box-shadow:0 4px 16px rgba(108,92,231,0.3)}
.btn-pri:hover{background:var(--pri-dark);transform:translateY(-1px);box-shadow:0 6px 20px rgba(108,92,231,0.4)}
.btn-outline{border:2px solid var(--pri);color:var(--pri)}
.btn-outline:hover{background:var(--pri);color:#fff}
.btn-sm{padding:8px 16px;font-size:0.8rem;min-height:36px}
.btn-ghost{color:var(--pri);padding:8px 12px}
.btn-ghost:hover{background:var(--bg3)}

/* === BADGES & TAGS === */
.badge{display:inline-flex;align-items:center;padding:4px 12px;border-radius:20px;font-size:0.75rem;font-weight:600}
.badge-pri{background:var(--bg3);color:var(--pri)}
.badge-acc{background:rgba(0,206,201,0.12);color:var(--acc)}
.badge-warn{background:rgba(253,203,110,0.15);color:#e17055}

/* === HOME PAGE === */
.hero-banner{background:linear-gradient(135deg,var(--pri) 0%,#a29bfe 50%,var(--acc) 100%);
border-radius:var(--radius);padding:32px 24px;color:#fff;position:relative;overflow:hidden;margin-bottom:24px}
.hero-banner::before{content:'';position:absolute;top:-50%;right:-20%;width:300px;height:300px;
background:rgba(255,255,255,0.08);border-radius:50%}
.hero-banner::after{content:'';position:absolute;bottom:-30%;left:-10%;width:200px;height:200px;
background:rgba(255,255,255,0.05);border-radius:50%}
.hero-banner h1{font-size:1.75rem;margin-bottom:4px;position:relative;z-index:1}
.hero-banner p{opacity:0.9;font-size:0.95rem;position:relative;z-index:1}
.hero-streak{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.2);
padding:6px 14px;border-radius:20px;font-size:0.85rem;margin-top:12px;position:relative;z-index:1}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.stat-card{text-align:center;padding:16px 12px}
.stat-card .stat-num{font-family:var(--font-display);font-size:1.75rem;font-weight:700;color:var(--pri)}
.stat-card .stat-label{font-size:0.75rem;color:var(--text2);margin-top:2px}

.section-title{font-size:1.1rem;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}

/* === SUBJECTS === */
.subject-card{cursor:pointer;position:relative;overflow:hidden}
.subject-card .subj-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;
justify-content:center;font-size:24px;margin-bottom:12px}
.subject-card h3{font-size:1rem;margin-bottom:4px}
.subject-card p{font-size:0.8rem;color:var(--text2)}
.subject-card .subj-progress{height:4px;background:var(--bg3);border-radius:2px;margin-top:12px;overflow:hidden}
.subject-card .subj-progress-fill{height:100%;background:var(--pri);border-radius:2px;transition:width 0.5s ease}

.topic-list{display:flex;flex-direction:column;gap:10px}
.topic-item{display:flex;align-items:center;gap:14px;padding:16px;background:var(--card);
border:1px solid var(--card-border);border-radius:var(--radius-sm);cursor:pointer;transition:all var(--transition)}
.topic-item:hover{border-color:var(--pri);box-shadow:var(--shadow)}
.topic-item .topic-num{width:36px;height:36px;border-radius:50%;background:var(--bg3);
display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;color:var(--pri);flex-shrink:0}
.topic-item.completed .topic-num{background:var(--pri);color:#fff}
.topic-item .topic-info{flex:1}
.topic-item .topic-info h4{font-size:0.95rem;font-weight:600}
.topic-item .topic-info p{font-size:0.8rem;color:var(--text2)}
.topic-item .topic-check{color:var(--text3);font-size:1.2rem}
.topic-item.completed .topic-check{color:var(--pri)}

.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--text2);font-weight:500;
margin-bottom:16px;padding:8px 0;font-size:0.9rem;cursor:pointer;transition:color var(--transition)}
.back-btn:hover{color:var(--pri)}

/* === LESSON VIEW === */
.lesson-view{max-width:720px}
.lesson-header{margin-bottom:24px}
.lesson-header h1{font-size:1.5rem;margin-bottom:8px}
.lesson-meta{display:flex;gap:12px;flex-wrap:wrap}
.lesson-meta span{font-size:0.8rem;color:var(--text2);display:flex;align-items:center;gap:4px}
.lesson-body{font-size:0.95rem;line-height:1.8;color:var(--text)}
.lesson-body p{margin-bottom:16px}
.lesson-body h3{margin:24px 0 12px;font-size:1.1rem}
.lesson-takeaways{background:var(--bg3);border-radius:var(--radius-sm);padding:20px;margin:24px 0}
.lesson-takeaways h3{font-size:0.95rem;margin-bottom:12px;color:var(--pri)}
.lesson-takeaways li{margin-bottom:8px;padding-left:8px;font-size:0.9rem;list-style:none;position:relative}
.lesson-takeaways li::before{content:'✓';color:var(--pri);font-weight:700;position:absolute;left:-14px}

/* === AI TUTOR === */
.chat-container{display:flex;flex-direction:column;height:calc(100dvh - var(--nav-h) - 80px);max-height:700px}
.chat-header{display:flex;align-items:center;gap:12px;padding-bottom:16px;border-bottom:1px solid var(--card-border);margin-bottom:12px}
.chat-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--pri),var(--acc));
display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;flex-shrink:0}
.chat-header-info h3{font-size:1rem}
.chat-header-info p{font-size:0.8rem;color:var(--text2)}
.chat-subject-select{margin-left:auto;padding:8px 12px;border:1px solid var(--card-border);
border-radius:var(--radius-xs);background:var(--card);font-size:0.85rem}
.chat-messages{flex:1;overflow-y:auto;padding:12px 0;display:flex;flex-direction:column;gap:12px}
.chat-msg{max-width:85%;padding:12px 16px;border-radius:16px;font-size:0.9rem;line-height:1.5;
animation:fadeUp 0.3s ease}
.chat-msg.bot{align-self:flex-start;background:var(--card);border:1px solid var(--card-border);
border-bottom-left-radius:4px}
.chat-msg.user{align-self:flex-end;background:var(--pri);color:#fff;border-bottom-right-radius:4px}
.chat-msg.typing .dots{display:inline-flex;gap:4px}
.chat-msg.typing .dots span{width:8px;height:8px;border-radius:50%;background:var(--text3);
animation:typingDot 1.4s infinite}
.chat-msg.typing .dots span:nth-child(2){animation-delay:0.2s}
.chat-msg.typing .dots span:nth-child(3){animation-delay:0.4s}
@keyframes typingDot{0%,60%,100%{opacity:0.3;transform:scale(0.8)}30%{opacity:1;transform:scale(1)}}
.chat-suggestions{display:flex;flex-wrap:wrap;gap:8px;padding:12px 0}
.chat-suggestions button{padding:8px 14px;border:1px solid var(--card-border);border-radius:20px;
font-size:0.8rem;color:var(--text2);transition:all var(--transition);background:var(--card)}
.chat-suggestions button:hover{border-color:var(--pri);color:var(--pri);background:var(--bg3)}
.chat-input-row{display:flex;gap:8px;padding-top:12px;border-top:1px solid var(--card-border)}
.chat-input-row input{flex:1;padding:12px 16px;border:1px solid var(--card-border);border-radius:24px;
background:var(--card);font-size:0.9rem;outline:none;transition:border var(--transition)}
.chat-input-row input:focus{border-color:var(--pri)}
.chat-send{width:44px;height:44px;border-radius:50%;background:var(--pri);color:#fff;
display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all var(--transition)}
.chat-send:hover{background:var(--pri-dark);transform:scale(1.05)}

/* === AI SETTINGS === */
.ai-settings{margin-bottom:12px;padding:14px 16px;background:var(--bg3);border-radius:var(--radius-sm);font-size:0.85rem}
.ai-settings summary{cursor:pointer;font-weight:600;color:var(--pri);user-select:none;display:flex;align-items:center;gap:6px}
.ai-settings summary::-webkit-details-marker{display:none}
.ai-settings summary::before{content:'⚙️'}
.ai-settings .ai-form{margin-top:12px;display:flex;flex-direction:column;gap:10px}
.ai-settings label{display:flex;flex-direction:column;gap:4px;font-size:0.8rem;color:var(--text2)}
.ai-settings input,.ai-settings select{padding:10px 12px;border:1px solid var(--card-border);border-radius:var(--radius-xs);
background:var(--card);font-size:0.85rem;outline:none}
.ai-settings input:focus{border-color:var(--pri)}
.ai-status{display:inline-flex;align-items:center;gap:6px;font-size:0.75rem;padding:4px 10px;border-radius:12px;font-weight:600}
.ai-status.online{background:rgba(0,206,201,0.12);color:var(--acc)}
.ai-status.offline{background:rgba(253,121,168,0.12);color:var(--acc2)}
.ai-status.local{background:rgba(108,92,231,0.12);color:var(--pri)}
.ai-settings .save-key-btn{padding:8px 16px;border-radius:var(--radius-xs);background:var(--pri);color:#fff;
font-weight:600;font-size:0.8rem;cursor:pointer;border:none;align-self:flex-start;margin-top:4px}
.chat-msg.bot .msg-source{font-size:0.65rem;color:var(--text3);margin-top:6px;display:flex;align-items:center;gap:4px}
.chat-msg.bot code{background:var(--bg3);padding:1px 5px;border-radius:3px;font-size:0.82rem}
.chat-msg.bot strong{color:var(--pri)}
[data-theme="dark"] .chat-msg.bot strong{color:var(--pri-light)}
.chat-msg.bot ul,.chat-msg.bot ol{margin:6px 0 6px 18px}
.chat-msg.bot li{margin-bottom:3px}

/* === EXAMS === */
.exam-setup{text-align:center;padding:40px 20px}
.exam-setup h2{margin-bottom:8px}
.exam-setup p{color:var(--text2);margin-bottom:24px}
.exam-subject-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.exam-subject-btn{padding:16px;border:2px solid var(--card-border);border-radius:var(--radius-sm);
text-align:center;transition:all var(--transition);background:var(--card);cursor:pointer}
.exam-subject-btn:hover,.exam-subject-btn.selected{border-color:var(--pri);background:var(--bg3)}
.exam-subject-btn .esb-icon{font-size:28px;margin-bottom:6px}
.exam-subject-btn .esb-name{font-size:0.85rem;font-weight:600}

.exam-active{position:relative}
.exam-top-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 0;
border-bottom:1px solid var(--card-border);margin-bottom:20px;flex-wrap:wrap;gap:8px}
.exam-timer{display:flex;align-items:center;gap:6px;font-weight:600;color:var(--pri);font-size:0.95rem}
.exam-q-nav{display:flex;gap:6px;flex-wrap:wrap}
.exam-q-nav button{width:34px;height:34px;border-radius:50%;border:1px solid var(--card-border);
font-size:0.8rem;font-weight:600;display:flex;align-items:center;justify-content:center;
transition:all var(--transition);background:var(--card)}
.exam-q-nav button.current{background:var(--pri);color:#fff;border-color:var(--pri)}
.exam-q-nav button.answered{background:var(--bg3);border-color:var(--pri);color:var(--pri)}

.exam-question{margin-bottom:20px}
.exam-question .q-num{font-size:0.8rem;color:var(--text2);margin-bottom:8px}
.exam-question .q-text{font-size:1.05rem;font-weight:600;margin-bottom:20px;line-height:1.5}
.exam-options{display:flex;flex-direction:column;gap:10px}
.exam-option{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border:2px solid var(--card-border);
border-radius:var(--radius-sm);cursor:pointer;transition:all var(--transition);font-size:0.9rem}
.exam-option:hover{border-color:var(--pri-light);background:var(--bg3)}
.exam-option.selected{border-color:var(--pri);background:rgba(108,92,231,0.08)}
.exam-option.correct{border-color:var(--acc);background:rgba(0,206,201,0.08)}
.exam-option.incorrect{border-color:var(--acc2);background:rgba(253,121,168,0.08)}
.exam-option .opt-letter{width:28px;height:28px;border-radius:50%;border:2px solid var(--text3);
display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.8rem;flex-shrink:0;
transition:all var(--transition)}
.exam-option.selected .opt-letter{border-color:var(--pri);background:var(--pri);color:#fff}
.exam-option.correct .opt-letter{border-color:var(--acc);background:var(--acc);color:#fff}
.exam-option.incorrect .opt-letter{border-color:var(--acc2);background:var(--acc2);color:#fff}
.exam-nav-btns{display:flex;gap:12px;margin-top:24px}
.exam-explanation{margin-top:12px;padding:14px;background:var(--bg3);border-radius:var(--radius-xs);font-size:0.85rem;line-height:1.5;color:var(--text2)}

/* === EXAM RESULTS === */
.exam-results{text-align:center;padding:24px 0}
.results-circle{width:160px;height:160px;margin:0 auto 24px;position:relative}
.results-circle svg{transform:rotate(-90deg)}
.results-circle .score-text{position:absolute;inset:0;display:flex;flex-direction:column;
align-items:center;justify-content:center}
.results-circle .score-num{font-family:var(--font-display);font-size:2.5rem;font-weight:700;color:var(--pri)}
.results-circle .score-label{font-size:0.8rem;color:var(--text2)}
.results-grade{font-family:var(--font-display);font-size:1.5rem;font-weight:700;margin-bottom:4px}
.results-summary{color:var(--text2);font-size:0.9rem;margin-bottom:24px}

/* === PROGRESS === */
.progress-overview{text-align:center;margin-bottom:24px}
.big-circle{width:180px;height:180px;margin:0 auto 16px;position:relative}
.big-circle svg{transform:rotate(-90deg)}
.big-circle .bc-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.big-circle .bc-num{font-family:var(--font-display);font-size:2.8rem;font-weight:700;color:var(--pri)}
.big-circle .bc-label{font-size:0.8rem;color:var(--text2)}

.progress-bar-wrap{margin-bottom:12px}
.progress-bar-wrap .pb-header{display:flex;justify-content:space-between;margin-bottom:6px;font-size:0.85rem}
.progress-bar-wrap .pb-header span:first-child{font-weight:600}
.progress-bar-wrap .pb-header span:last-child{color:var(--text2)}
.progress-bar{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:4px;transition:width 0.8s ease;background:var(--pri)}

.achievements-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.achievement{text-align:center;padding:16px 12px;border-radius:var(--radius-sm);
background:var(--card);border:1px solid var(--card-border)}
.achievement.locked{opacity:0.4}
.achievement .ach-icon{font-size:2rem;margin-bottom:6px}
.achievement .ach-name{font-size:0.8rem;font-weight:600}
.achievement .ach-desc{font-size:0.7rem;color:var(--text2);margin-top:2px}

.exam-history-table{width:100%;border-collapse:collapse;font-size:0.85rem}
.exam-history-table th{text-align:left;padding:10px 12px;border-bottom:2px solid var(--card-border);
font-weight:600;color:var(--text2);font-size:0.75rem;text-transform:uppercase;letter-spacing:0.5px}
.exam-history-table td{padding:10px 12px;border-bottom:1px solid var(--card-border)}

/* === RESPONSIVE === */

/* === STUDY MODE === */
.study-session{max-width:720px}
.study-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);
padding:24px;box-shadow:var(--shadow);margin-bottom:16px}
.study-progress-bar{display:flex;gap:4px;margin-bottom:20px}
.study-progress-bar .spb-seg{flex:1;height:6px;border-radius:3px;background:var(--bg3);transition:background 0.3s}
.study-progress-bar .spb-seg.correct{background:var(--acc)}
.study-progress-bar .spb-seg.incorrect{background:var(--acc2)}
.study-progress-bar .spb-seg.current{background:var(--pri);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.study-tutor-bubble{display:flex;gap:12px;align-items:flex-start;margin:16px 0;animation:fadeUp 0.4s ease}
.study-tutor-bubble .stb-avatar{width:40px;height:40px;border-radius:50%;flex-shrink:0;
background:linear-gradient(135deg,var(--pri),var(--acc));display:flex;align-items:center;justify-content:center;
color:#fff;font-size:18px}
.study-tutor-bubble .stb-msg{flex:1;background:var(--bg3);border-radius:14px;border-top-left-radius:4px;
padding:14px 18px;font-size:0.9rem;line-height:1.6}
.study-tutor-bubble .stb-msg strong{color:var(--pri)}
.study-tutor-bubble.typing .stb-msg .dots{display:inline-flex;gap:4px}
.study-tutor-bubble.typing .stb-msg .dots span{width:8px;height:8px;border-radius:50%;background:var(--text3);animation:typingDot 1.4s infinite}
.study-tutor-bubble.typing .stb-msg .dots span:nth-child(2){animation-delay:0.2s}
.study-tutor-bubble.typing .stb-msg .dots span:nth-child(3){animation-delay:0.4s}
.study-feedback{padding:16px;border-radius:var(--radius-sm);margin:16px 0;font-size:0.9rem;line-height:1.6;animation:fadeUp 0.3s ease}
.study-feedback.correct-fb{background:rgba(0,206,201,0.1);border:1px solid rgba(0,206,201,0.3)}
.study-feedback.incorrect-fb{background:rgba(253,121,168,0.1);border:1px solid rgba(253,121,168,0.3)}
.study-hint-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border:1px dashed var(--pri);
border-radius:var(--radius-sm);color:var(--pri);font-size:0.85rem;font-weight:600;margin:8px 0;
transition:all var(--transition);cursor:pointer}
.study-hint-btn:hover{background:var(--bg3);border-style:solid}
.study-ask-row{display:flex;gap:8px;margin-top:12px}
.study-ask-row input{flex:1;padding:10px 14px;border:1px solid var(--card-border);border-radius:20px;
background:var(--card);font-size:0.85rem;outline:none;transition:border var(--transition)}
.study-ask-row input:focus{border-color:var(--pri)}
.study-ask-row button{padding:8px 16px;border-radius:20px;background:var(--pri);color:#fff;font-size:0.85rem;font-weight:600}
.study-score-banner{text-align:center;padding:32px 20px;animation:fadeUp 0.5s ease}
.study-score-banner h2{margin-bottom:8px}
.study-score-banner .ssb-big{font-family:var(--font-display);font-size:3rem;font-weight:700;color:var(--pri);margin:12px 0}
.study-streak-bonus{display:inline-flex;align-items:center;gap:6px;background:rgba(253,203,110,0.15);
color:#e17055;padding:6px 14px;border-radius:20px;font-size:0.8rem;font-weight:600;margin-top:8px}
.study-mode-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:16px;
font-size:0.75rem;font-weight:700;letter-spacing:0.3px;text-transform:uppercase}
.study-mode-badge.learn{background:rgba(108,92,231,0.12);color:var(--pri)}
.study-mode-badge.practice{background:rgba(0,206,201,0.12);color:var(--acc)}

/* === RESPONSIVE === */
@media(min-width:768px){
  .sidebar{display:flex;flex-direction:column}
  .bottom-nav{display:none}
  .main{margin-left:var(--sidebar-w);padding-bottom:24px}
  .main-inner{padding:32px 40px}
  .stats-row{grid-template-columns:repeat(3,1fr)}
  .card-grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
  .chat-container{height:calc(100dvh - 120px)}
}
@media(max-width:400px){
  .stats-row{grid-template-columns:repeat(3,1fr)}
  .stat-card .stat-num{font-size:1.3rem}
  .card-grid{grid-template-columns:1fr}
}

/* === SCROLLBAR === */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--text3);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text2)}

/* === MOBILE TOP BAR === */
.mobile-top{display:flex;align-items:center;justify-content:space-between;padding:8px 0 16px;position:sticky;top:0;z-index:10}
.mobile-top .mt-brand{display:flex;align-items:center;gap:8px}
.mobile-top .mt-brand .logo{width:32px;height:32px;background:linear-gradient(135deg,var(--pri),var(--acc));
border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff}
.mobile-top .mt-brand span{font-family:var(--font-display);font-weight:700;font-size:1.1rem;color:var(--pri)}
.mobile-top .mt-actions{display:flex;gap:8px}
.mobile-top .mt-actions button{width:36px;height:36px;border-radius:50%;background:var(--card);
border:1px solid var(--card-border);display:flex;align-items:center;justify-content:center}
@media(min-width:768px){.mobile-top{display:none}}
</style>

<script>
// === STATE ===
const STATE = JSON.parse(localStorage.getItem('studypal') || '{}');
function save(){localStorage.setItem('studypal',JSON.stringify(STATE))}
if(!STATE.completed) STATE.completed={};
if(!STATE.examHistory) STATE.examHistory=[];
if(!STATE.streak) STATE.streak=1;
if(!STATE.lastVisit){STATE.lastVisit=Date.now()}else{
  const diff=Math.floor((Date.now()-STATE.lastVisit)/(1000*60*60*24));
  if(diff===1)STATE.streak=(STATE.streak||0)+1;else if(diff>1)STATE.streak=1;
  STATE.lastVisit=Date.now();
}
save();

// === SUBJECT DATA ===
const SUBJECTS=[
{id:'biology',name:'Biology',icon:'🧬',color:'#00b894',topics:[
{id:'cell-structure',name:'Cell Structure',time:'8 min read',content:`<p>Cells are the fundamental units of life. Every living organism is composed of one or more cells, and all cells arise from pre-existing cells through division. This principle, known as cell theory, was established in the 19th century by scientists Schleiden and Schwann.</p><p>There are two major categories of cells: prokaryotic and eukaryotic. Prokaryotic cells, found in bacteria and archaea, lack a membrane-bound nucleus and are generally smaller and simpler. Eukaryotic cells, found in plants, animals, fungi, and protists, contain a true nucleus enclosed by a double membrane, along with various specialized organelles.</p><p>Key organelles in eukaryotic cells include the mitochondria (powerhouse of the cell, responsible for ATP production via cellular respiration), the endoplasmic reticulum (rough ER for protein synthesis, smooth ER for lipid synthesis), the Golgi apparatus (processes and packages proteins), lysosomes (contain digestive enzymes), and ribosomes (sites of protein synthesis).</p><p>Plant cells have additional structures not found in animal cells, including a rigid cell wall made of cellulose, chloroplasts for photosynthesis, and a large central vacuole for storage and maintaining turgor pressure.</p>`,takeaways:['Cells are the basic units of life — all living things are made of cells','Prokaryotic cells lack a nucleus; eukaryotic cells have membrane-bound organelles','Mitochondria produce ATP through cellular respiration','Plant cells have cell walls, chloroplasts, and large vacuoles that animal cells lack']},
{id:'dna-genetics',name:'DNA & Genetics',time:'10 min read',content:`<p>Deoxyribonucleic acid (DNA) is the molecule that carries genetic instructions for the development, functioning, growth, and reproduction of all known organisms. DNA is structured as a double helix, first described by Watson and Crick in 1953, consisting of two polynucleotide strands wound around each other.</p><p>Each strand is made of nucleotides, and each nucleotide contains a phosphate group, a deoxyribose sugar, and one of four nitrogenous bases: adenine (A), thymine (T), guanine (G), or cytosine (C). Base pairing rules dictate that A pairs with T and G pairs with C, held together by hydrogen bonds.</p><p>Genes are segments of DNA that encode instructions for building proteins. The process of gene expression involves two main steps: transcription (copying DNA into messenger RNA in the nucleus) and translation (using mRNA as a template to assemble amino acids into proteins at ribosomes). This flow of information is called the Central Dogma of molecular biology.</p><p>Genetic inheritance follows patterns first described by Gregor Mendel. Dominant alleles mask the effect of recessive alleles in heterozygous individuals. Concepts like incomplete dominance, codominance, and polygenic inheritance add complexity beyond simple Mendelian genetics.</p>`,takeaways:['DNA is a double helix of nucleotides with base pairing: A-T and G-C','Gene expression involves transcription (DNA→RNA) and translation (RNA→protein)','The Central Dogma describes the flow: DNA → RNA → Protein','Mendelian genetics describes dominant/recessive inheritance patterns']},
{id:'evolution',name:'Evolution',time:'9 min read',content:`<p>Evolution is the change in the heritable characteristics of biological populations over successive generations. Charles Darwin and Alfred Russel Wallace independently proposed the theory of evolution by natural selection in 1858, which remains the cornerstone of modern biology.</p><p>Natural selection operates on the principle that individuals with traits better suited to their environment are more likely to survive and reproduce, passing those advantageous traits to offspring. Over many generations, this leads to adaptation — populations becoming better fitted to their environments. Key requirements for natural selection include variation within a population, heritability of traits, and differential reproductive success.</p><p>Evidence for evolution comes from multiple sources: the fossil record shows transitional forms between species, comparative anatomy reveals homologous structures (similar bone arrangements in different species), molecular biology shows shared DNA sequences across species, and biogeography shows distribution patterns consistent with common ancestry.</p><p>Speciation — the formation of new species — typically occurs through geographic isolation (allopatric speciation) or through reproductive isolation within the same area (sympatric speciation). Genetic drift, gene flow, and mutations also drive evolutionary change alongside natural selection.</p>`,takeaways:['Natural selection favors traits that improve survival and reproduction','Evolution requires variation, heritability, and differential reproduction','Evidence includes fossils, homologous structures, DNA comparisons, and biogeography','Speciation occurs through geographic or reproductive isolation']},
{id:'human-body',name:'Human Body Systems',time:'10 min read',content:`<p>The human body is organized into organ systems that work together to maintain homeostasis — a stable internal environment. There are eleven major organ systems, each with specialized functions that contribute to overall survival and well-being.</p><p>The circulatory system, powered by the heart, transports oxygen, nutrients, hormones, and waste products through a network of blood vessels. The respiratory system handles gas exchange — oxygen enters the blood in the lungs while carbon dioxide is expelled. These two systems work in concert: the pulmonary circuit sends blood to the lungs, while the systemic circuit delivers oxygenated blood to the body.</p><p>The nervous system, comprising the brain, spinal cord, and peripheral nerves, coordinates rapid responses to stimuli through electrical impulses. The endocrine system provides slower, longer-lasting regulation through hormones released by glands such as the thyroid, adrenals, and pancreas. Together, these systems regulate everything from metabolism to mood.</p><p>The digestive system breaks down food mechanically and chemically, absorbing nutrients in the small intestine. The musculoskeletal system provides structure, support, and movement. The immune system defends against pathogens using white blood cells, antibodies, and lymphatic tissue. The excretory system, primarily the kidneys, filters waste from blood to produce urine.</p>`,takeaways:['The body has 11 organ systems that maintain homeostasis','The circulatory and respiratory systems work together for gas exchange','The nervous system handles rapid responses; the endocrine system handles slower hormonal regulation','The immune system defends against pathogens using multiple defense mechanisms']},
{id:'ecology',name:'Ecology & Ecosystems',time:'8 min read',content:`<p>Ecology is the scientific study of interactions between organisms and their environment. These interactions occur at multiple levels of organization: individual organisms, populations, communities, ecosystems, and the biosphere as a whole.</p><p>An ecosystem includes all living organisms (biotic factors) and non-living components (abiotic factors like temperature, water, sunlight, and soil) in a given area. Energy flows through ecosystems in one direction: from the sun to producers (plants), then to primary consumers (herbivores), secondary consumers (carnivores), and decomposers. At each trophic level, approximately 90% of energy is lost as heat, which is why food chains rarely exceed four or five levels.</p><p>Nutrient cycles — including the carbon, nitrogen, and water cycles — recycle matter through ecosystems. The carbon cycle involves photosynthesis (removing CO₂ from the atmosphere), cellular respiration (releasing CO₂), and decomposition. The nitrogen cycle converts atmospheric nitrogen into usable forms through nitrogen-fixing bacteria.</p><p>Biodiversity — the variety of life in an area — is critical for ecosystem resilience. Ecosystems with higher biodiversity tend to be more stable and productive. Human activities such as deforestation, pollution, and climate change are major threats to global biodiversity and ecosystem health.</p>`,takeaways:['Ecosystems include biotic (living) and abiotic (non-living) components','Energy flows one way through trophic levels, losing ~90% at each step','Carbon and nitrogen cycles recycle essential elements through ecosystems','Biodiversity increases ecosystem stability and resilience']},
{id:'photosynthesis',name:'Photosynthesis',time:'8 min read',content:`<p>Photosynthesis is the process by which green plants, algae, and some bacteria convert light energy into chemical energy stored in glucose. The overall equation is: 6CO₂ + 6H₂O + light energy → C₆H₁₂O₆ + 6O₂. This process is the foundation of nearly all food chains on Earth.</p><p>Photosynthesis occurs primarily in the chloroplasts of plant cells, specifically within structures called thylakoids (arranged in stacks called grana) and the surrounding fluid called the stroma. Chlorophyll, the green pigment in thylakoids, absorbs light most efficiently in the red and blue wavelengths, reflecting green light — which is why plants appear green.</p><p>The process has two main stages. The light-dependent reactions occur in the thylakoid membranes, where light energy splits water molecules, releases oxygen, and generates ATP and NADPH. The light-independent reactions (Calvin Cycle) occur in the stroma, where CO₂ is fixed into glucose using the ATP and NADPH produced in the first stage.</p><p>Factors affecting the rate of photosynthesis include light intensity, carbon dioxide concentration, and temperature. Increasing light intensity or CO₂ generally increases the rate up to a saturation point. Temperature affects enzyme activity — rates increase with temperature up to an optimum, then decline as enzymes denature.</p>`,takeaways:['Photosynthesis converts CO₂ and water into glucose and oxygen using light energy','Light reactions produce ATP and NADPH; the Calvin Cycle fixes CO₂ into glucose','Chlorophyll absorbs red and blue light, reflecting green','Rate is affected by light intensity, CO₂ concentration, and temperature']}
]},
{id:'chemistry',name:'Chemistry',icon:'⚗️',color:'#e17055',topics:[
{id:'atomic-structure',name:'Atomic Structure',time:'8 min read',content:`<p>Atoms are the basic building blocks of matter. Each atom consists of a central nucleus containing positively charged protons and electrically neutral neutrons, surrounded by a cloud of negatively charged electrons. The number of protons defines the element (its atomic number), while the total of protons and neutrons gives the mass number.</p><p>The modern understanding of atomic structure evolved through key experiments. Thomson's cathode ray experiments discovered electrons. Rutherford's gold foil experiment revealed the dense, positively charged nucleus. Bohr proposed that electrons orbit the nucleus in specific energy levels, and quantum mechanics later refined this into the orbital model with probability clouds.</p><p>Electron configuration describes how electrons are distributed among orbitals. Electrons fill orbitals following three rules: the Aufbau principle (fill lowest energy first), the Pauli exclusion principle (maximum two electrons per orbital with opposite spins), and Hund's rule (electrons occupy empty orbitals in a subshell before pairing). The configuration determines an element's chemical properties.</p><p>Isotopes are atoms of the same element with different numbers of neutrons. For example, Carbon-12 and Carbon-14 are both carbon, but C-14 has two extra neutrons and is radioactive. Isotopes are used in radiometric dating, medical imaging, and nuclear energy.</p>`,takeaways:['Atoms have protons and neutrons in the nucleus, electrons in orbitals','Atomic number = protons; mass number = protons + neutrons','Electrons fill orbitals following Aufbau, Pauli exclusion, and Hund\'s rules','Isotopes are atoms of the same element with different neutron counts']},
{id:'chemical-bonding',name:'Chemical Bonding',time:'9 min read',content:`<p>Chemical bonds form when atoms interact to achieve a more stable electron configuration, typically resembling that of the nearest noble gas. There are three primary types of chemical bonds: ionic, covalent, and metallic, each with distinct properties and formation mechanisms.</p><p>Ionic bonds form when one atom transfers electrons to another, creating oppositely charged ions that attract each other. This typically occurs between metals (which lose electrons) and non-metals (which gain electrons). Ionic compounds form crystal lattices, have high melting points, and conduct electricity when dissolved in water or melted.</p><p>Covalent bonds form when atoms share electron pairs. A single covalent bond involves one shared pair, a double bond shares two pairs, and a triple bond shares three. Covalent bonds can be polar (unequal sharing due to electronegativity differences) or nonpolar (equal sharing). Molecular compounds generally have lower melting points than ionic compounds.</p><p>Metallic bonds occur in metals, where electrons are delocalized and shared among a lattice of metal cations — often described as a "sea of electrons." This explains metals' conductivity, malleability, ductility, and luster. Intermolecular forces (van der Waals, dipole-dipole, hydrogen bonds) are weaker attractions between molecules that affect physical properties.</p>`,takeaways:['Ionic bonds: electron transfer between metals and nonmetals','Covalent bonds: electron sharing; can be polar or nonpolar','Metallic bonds: delocalized electrons in a "sea" around metal cations','Bond type determines physical properties like melting point and conductivity']},
{id:'organic-chem',name:'Organic Chemistry',time:'9 min read',content:`<p>Organic chemistry is the study of carbon-containing compounds and their reactions. Carbon is uniquely suited to form the backbone of complex molecules because it can form four covalent bonds, creating chains, branches, and rings. This versatility gives rise to millions of known organic compounds.</p><p>Hydrocarbons are the simplest organic compounds, containing only carbon and hydrogen. Alkanes have single bonds (CₙH₂ₙ₊₂), alkenes have at least one double bond (CₙH₂ₙ), and alkynes have at least one triple bond (CₙH₂ₙ₋₂). These form a homologous series where each successive member differs by a CH₂ unit.</p><p>Functional groups are specific arrangements of atoms that determine a molecule's chemical behavior. Common functional groups include hydroxyl (-OH, making alcohols), carboxyl (-COOH, making carboxylic acids), amino (-NH₂, making amines), and carbonyl (C=O, found in aldehydes and ketones). Organic reactions include substitution, addition, elimination, and condensation reactions.</p><p>Isomerism — where molecules share the same molecular formula but different structural arrangements — is a key concept. Structural isomers differ in how atoms are connected, while stereoisomers differ in spatial arrangement. Chirality, where a molecule is not superimposable on its mirror image, is crucial in biochemistry and pharmaceutical chemistry.</p>`,takeaways:['Carbon forms 4 bonds, enabling chains, branches, and rings','Alkanes, alkenes, and alkynes differ by their bond types','Functional groups (hydroxyl, carboxyl, amino, carbonyl) determine chemical properties','Isomers share formulas but differ in structure or spatial arrangement']},
{id:'acids-bases',name:'Acids & Bases',time:'7 min read',content:`<p>Acids and bases are fundamental chemical species that are central to countless reactions in chemistry and biology. Several theories define them: Arrhenius theory (acids produce H⁺ in water, bases produce OH⁻), Brønsted-Lowry theory (acids are proton donors, bases are proton acceptors), and Lewis theory (acids accept electron pairs, bases donate electron pairs).</p><p>The pH scale measures acidity and basicity on a logarithmic scale from 0 to 14. Pure water has a pH of 7 (neutral). Solutions below 7 are acidic, and solutions above 7 are basic. Each unit change represents a tenfold change in hydrogen ion concentration. Strong acids (like HCl, H₂SO₄) fully dissociate in water, while weak acids (like acetic acid) only partially dissociate.</p><p>Neutralization reactions occur when acids and bases react to form water and a salt: HCl + NaOH → NaCl + H₂O. Titration is a laboratory technique used to determine the concentration of an unknown acid or base by gradually adding a solution of known concentration until the equivalence point is reached.</p><p>Buffer solutions resist changes in pH when small amounts of acid or base are added. They consist of a weak acid and its conjugate base (or vice versa). Buffers are critical in biological systems — for example, the bicarbonate buffer system maintains blood pH at approximately 7.4.</p>`,takeaways:['Acids donate protons (H⁺); bases accept protons (Brønsted-Lowry definition)','pH is logarithmic: each unit = 10x change in H⁺ concentration','Neutralization: acid + base → salt + water','Buffer solutions resist pH changes and are vital in biological systems']},
{id:'periodic-table',name:'Periodic Table',time:'8 min read',content:`<p>The periodic table organizes all known elements by increasing atomic number and groups them by similar chemical properties. Dmitri Mendeleev published the first widely recognized version in 1869, predicting undiscovered elements based on gaps in his table — predictions that proved remarkably accurate.</p><p>Elements are arranged in periods (horizontal rows) and groups (vertical columns). Elements in the same group share similar electron configurations and chemical behavior. Group 1 (alkali metals) are highly reactive metals. Group 17 (halogens) are reactive nonmetals. Group 18 (noble gases) are largely inert due to full outer electron shells.</p><p>Periodic trends describe how properties change across the table. Atomic radius decreases across a period (more protons pull electrons closer) and increases down a group (more electron shells). Ionization energy — the energy needed to remove an electron — generally increases across a period and decreases down a group. Electronegativity follows a similar trend, with fluorine being the most electronegative element.</p><p>The table is divided into blocks based on which sublevel is being filled: s-block (groups 1-2), p-block (groups 13-18), d-block (transition metals), and f-block (lanthanides and actinides). Transition metals are notable for forming colorful compounds, variable oxidation states, and catalytic activity.</p>`,takeaways:['Elements are arranged by atomic number; groups share chemical properties','Atomic radius decreases across a period, increases down a group','Ionization energy and electronegativity increase across a period','The table has s, p, d, and f blocks based on electron filling']},
{id:'reactions',name:'Reactions & Equations',time:'8 min read',content:`<p>Chemical reactions involve the rearrangement of atoms as bonds break and form, transforming reactants into products. Chemical equations represent these changes symbolically, with reactants on the left and products on the right of an arrow. Equations must be balanced to satisfy the law of conservation of mass — atoms are neither created nor destroyed.</p><p>There are several major types of chemical reactions. Synthesis (combination) reactions join two or more substances into one product (A + B → AB). Decomposition reactions break a compound into simpler substances (AB → A + B). Single replacement reactions involve one element displacing another (A + BC → AC + B). Double replacement reactions exchange ions between two compounds (AB + CD → AD + CB). Combustion reactions involve a substance reacting with oxygen, producing heat and light.</p><p>Reaction rates describe how quickly reactions proceed and are influenced by temperature, concentration, surface area, catalysts, and the nature of reactants. Collision theory states that reactions occur when particles collide with sufficient energy (activation energy) and proper orientation. Catalysts lower the activation energy, speeding up reactions without being consumed.</p><p>Chemical equilibrium is reached when the forward and reverse reaction rates are equal. Le Chatelier's principle states that if a system at equilibrium is disturbed, it will shift to counteract the change. Factors that affect equilibrium include concentration, pressure, and temperature changes.</p>`,takeaways:['Equations must be balanced — atoms are conserved in reactions','Major types: synthesis, decomposition, single/double replacement, combustion','Reaction rate depends on temperature, concentration, surface area, and catalysts','Le Chatelier\'s principle: systems shift to counteract disturbances to equilibrium']}
]},
{id:'physics',name:'Physics',icon:'⚡',color:'#0984e3',topics:[
{id:'newtons-laws',name:"Newton's Laws",time:'8 min read',content:`<p>Sir Isaac Newton's three laws of motion, published in 1687, form the foundation of classical mechanics. These laws describe the relationship between the motion of an object and the forces acting upon it, and they remain remarkably accurate for everyday objects moving at ordinary speeds.</p><p>Newton's First Law (Law of Inertia) states that an object at rest stays at rest, and an object in motion continues moving at constant velocity, unless acted upon by a net external force. Inertia is the tendency of objects to resist changes in their state of motion, and it is directly proportional to mass. A heavier object has more inertia.</p><p>Newton's Second Law quantifies the relationship between force, mass, and acceleration: F = ma. The net force on an object equals its mass multiplied by its acceleration. This means that for a given force, a more massive object accelerates less. The unit of force is the Newton (N), equal to 1 kg·m/s².</p><p>Newton's Third Law states that for every action, there is an equal and opposite reaction. When you push against a wall, the wall pushes back on you with equal force. When a rocket expels gas downward, the reaction force propels it upward. These action-reaction pairs always act on different objects.</p>`,takeaways:['First Law: objects maintain their state of motion unless a net force acts on them','Second Law: F = ma — force equals mass times acceleration','Third Law: every action has an equal and opposite reaction','These laws accurately describe motion for everyday objects at normal speeds']},
{id:'thermodynamics',name:'Thermodynamics',time:'9 min read',content:`<p>Thermodynamics is the branch of physics dealing with heat, work, temperature, and energy. It describes how thermal energy is converted to and from other forms of energy and how it affects matter. The laws of thermodynamics are among the most fundamental and universal principles in all of science.</p><p>The Zeroth Law establishes thermal equilibrium: if two systems are each in equilibrium with a third, they are in equilibrium with each other — this is the basis for temperature measurement. The First Law is conservation of energy: energy cannot be created or destroyed, only transformed. The internal energy of a system changes by the amount of heat added minus work done by the system (ΔU = Q - W).</p><p>The Second Law introduces entropy — a measure of disorder in a system. It states that the total entropy of an isolated system always increases over time. Heat naturally flows from hot to cold objects, never the reverse without external work. This law explains why perpetual motion machines are impossible and why processes have a preferred direction.</p><p>The Third Law states that as temperature approaches absolute zero (0 K or -273.15°C), entropy approaches a minimum. It is impossible to reach absolute zero in a finite number of steps. Applications of thermodynamics include heat engines, refrigeration, power plants, and understanding chemical reaction spontaneity through Gibbs free energy.</p>`,takeaways:['First Law: energy is conserved — it transforms but is never created or destroyed','Second Law: entropy (disorder) of an isolated system always increases','Heat flows spontaneously from hot to cold, not the reverse','Absolute zero (0 K) cannot be reached; entropy approaches a minimum there']},
{id:'electricity',name:'Electricity & Circuits',time:'9 min read',content:`<p>Electricity is the flow of electric charge, typically carried by electrons in a conductor. Electric current (I) is measured in amperes (A) and represents the rate of charge flow. Voltage (V), measured in volts, is the electrical potential difference that drives current through a circuit. Resistance (R), measured in ohms (Ω), opposes the flow of current.</p><p>Ohm's Law is the fundamental relationship: V = IR. This states that voltage equals current multiplied by resistance. If you increase the voltage across a resistor, the current increases proportionally. If you increase resistance, the current decreases. This relationship holds for ohmic materials at constant temperature.</p><p>Circuits can be arranged in series or parallel. In series circuits, components are connected end-to-end, so the same current flows through each. Total resistance is the sum of individual resistances. In parallel circuits, components are connected across the same two points, and each has the same voltage. Total resistance is found using 1/R_total = 1/R₁ + 1/R₂ + ...</p><p>Electrical power (P) is the rate of energy transfer: P = IV = I²R = V²/R, measured in watts (W). Electrical energy is power multiplied by time, commonly measured in kilowatt-hours (kWh) for household billing. Capacitors store energy in electric fields, while inductors store energy in magnetic fields.</p>`,takeaways:["Ohm's Law: V = IR — voltage equals current times resistance",'Series circuits: same current, resistances add up','Parallel circuits: same voltage, total resistance decreases','Electrical power: P = IV, measured in watts']},
{id:'waves',name:'Waves & Optics',time:'8 min read',content:`<p>Waves are disturbances that transfer energy from one place to another without transferring matter. They are characterized by wavelength (distance between successive peaks), frequency (number of oscillations per second, in Hz), amplitude (maximum displacement), and speed (v = fλ). Waves can be mechanical (requiring a medium, like sound) or electromagnetic (no medium needed, like light).</p><p>Transverse waves oscillate perpendicular to the direction of travel (like light and water waves), while longitudinal waves oscillate parallel to the direction of travel (like sound). When waves meet, they superpose: constructive interference increases amplitude, destructive interference decreases it. Standing waves form when two identical waves travel in opposite directions.</p><p>Light is an electromagnetic wave that travels at approximately 3 × 10⁸ m/s in a vacuum. The electromagnetic spectrum ranges from radio waves (longest wavelength) through microwaves, infrared, visible light, ultraviolet, X-rays, to gamma rays (shortest wavelength). Visible light spans from about 380 nm (violet) to 700 nm (red).</p><p>Optics studies light behavior. Reflection follows the law that the angle of incidence equals the angle of reflection. Refraction is the bending of light as it passes between media of different densities, described by Snell's law: n₁sinθ₁ = n₂sinθ₂. Lenses use refraction to focus light, forming the basis of eyeglasses, cameras, microscopes, and telescopes.</p>`,takeaways:['Waves transfer energy without transferring matter; v = fλ','Transverse waves oscillate perpendicular to travel; longitudinal waves oscillate parallel','Light travels at 3×10⁸ m/s; the EM spectrum spans radio to gamma rays','Reflection: angle in = angle out; Refraction: light bends between different media']},
{id:'quantum',name:'Quantum Basics',time:'9 min read',content:`<p>Quantum mechanics describes the behavior of matter and energy at the smallest scales — atoms and subatomic particles. At this level, the rules of classical physics break down, and phenomena become fundamentally probabilistic rather than deterministic. Quantum mechanics is one of the most successful and experimentally verified theories in all of physics.</p><p>Max Planck introduced the idea of quantized energy in 1900, proposing that energy is emitted in discrete packets called quanta (E = hf, where h is Planck's constant). Einstein extended this to explain the photoelectric effect: light consists of photons, each carrying energy proportional to frequency. This demonstrated the particle nature of light alongside its wave nature — wave-particle duality.</p><p>Heisenberg's Uncertainty Principle states that it is impossible to simultaneously know both the exact position and momentum of a particle with perfect precision. The more precisely one is measured, the less precisely the other can be known. This is not a limitation of measurement technology but a fundamental property of nature.</p><p>The Schrödinger equation describes how the quantum state of a system evolves over time. Solutions to this equation give wave functions whose squared magnitude represents the probability of finding a particle in a given location. Electrons in atoms exist in orbitals — probability clouds — rather than fixed orbits. Quantum mechanics underlies modern technology including semiconductors, lasers, and MRI machines.</p>`,takeaways:['Energy is quantized — emitted in discrete packets (E = hf)','Wave-particle duality: light and matter exhibit both wave and particle properties','Uncertainty Principle: position and momentum cannot both be precisely known','Electrons exist in probability clouds (orbitals), not fixed orbits']},
{id:'energy-work',name:'Energy & Work',time:'8 min read',content:`<p>Energy is the capacity to do work, and it exists in many forms: kinetic (energy of motion), potential (stored energy due to position or configuration), thermal, chemical, electrical, nuclear, and more. The SI unit of energy is the joule (J). Energy is a scalar quantity — it has magnitude but no direction.</p><p>Work is done when a force causes displacement: W = Fd cosθ, where F is the force, d is the displacement, and θ is the angle between them. Work is measured in joules. When you lift a book against gravity, you do positive work on the book, increasing its gravitational potential energy (PE = mgh). No work is done if there is no displacement or if the force is perpendicular to the motion.</p><p>The Work-Energy Theorem states that the net work done on an object equals its change in kinetic energy: W_net = ΔKE = ½mv₂² - ½mv₁². Kinetic energy is KE = ½mv². Power is the rate of doing work: P = W/t, measured in watts (W). One watt equals one joule per second.</p><p>The Law of Conservation of Energy states that energy cannot be created or destroyed in an isolated system — only converted from one form to another. A roller coaster at the top of a hill has maximum potential energy; as it descends, potential converts to kinetic. In real systems, some energy always converts to thermal energy through friction, but the total remains constant.</p>`,takeaways:['Work = force × displacement × cos(angle); measured in joules','Kinetic energy: KE = ½mv²; Potential energy: PE = mgh','Work-Energy Theorem: net work = change in kinetic energy','Energy is always conserved — it transforms but total remains constant']}
]},
{id:'mathematics',name:'Mathematics',icon:'📐',color:'#6c5ce7',topics:[
{id:'algebra',name:'Algebra',time:'8 min read',content:`<p>Algebra is the branch of mathematics that uses symbols (typically letters) to represent unknown quantities and express general relationships. It provides the language for virtually all of higher mathematics and is essential in science, engineering, economics, and countless other fields.</p><p>At its core, algebra involves solving equations — finding the values of unknowns that make statements true. Linear equations (ax + b = 0) have one solution and graph as straight lines. Quadratic equations (ax² + bx + c = 0) can have zero, one, or two solutions and graph as parabolas. The quadratic formula x = (-b ± √(b²-4ac)) / 2a provides solutions for any quadratic equation.</p><p>Systems of equations involve multiple equations with multiple unknowns. Methods for solving include substitution, elimination, and matrix methods. A system of two linear equations in two unknowns can have one solution (lines intersect), no solution (parallel lines), or infinitely many solutions (same line).</p><p>Algebraic expressions can be factored and expanded using techniques like distributing (FOIL for binomials), factoring common factors, difference of squares (a²-b² = (a+b)(a-b)), and completing the square. Polynomials, rational expressions, and inequalities extend algebraic concepts to more complex scenarios. Mastering algebra is the gateway to calculus and beyond.</p>`,takeaways:['Algebra uses symbols to represent unknowns and express relationships','The quadratic formula solves any equation of the form ax² + bx + c = 0','Systems of equations can be solved by substitution, elimination, or matrices','Factoring techniques: common factors, difference of squares, completing the square']},
{id:'calculus',name:'Calculus',time:'10 min read',content:`<p>Calculus is the mathematical study of continuous change, built on two fundamental operations: differentiation and integration. Developed independently by Newton and Leibniz in the 17th century, calculus is indispensable in physics, engineering, economics, computer science, and virtually every quantitative field.</p><p>Differentiation finds the instantaneous rate of change of a function — geometrically, the slope of the tangent line at any point. The derivative of f(x) is defined as the limit: f'(x) = lim(h→0) [f(x+h) - f(x)] / h. Key rules include the power rule (d/dx[xⁿ] = nxⁿ⁻¹), product rule, quotient rule, and chain rule. Derivatives are used to find velocity from position, optimize functions (finding maxima and minima), and analyze rates of change.</p><p>Integration is the reverse process — it accumulates quantities over intervals. The definite integral ∫ₐᵇ f(x)dx gives the signed area under the curve between a and b. The Fundamental Theorem of Calculus links the two operations: if F is an antiderivative of f, then ∫ₐᵇ f(x)dx = F(b) - F(a). Integration techniques include substitution, integration by parts, and partial fractions.</p><p>Applications of calculus are vast: computing areas and volumes, modeling population growth, analyzing motion, calculating work and energy, determining probabilities in statistics, and much more. Multivariable calculus extends these ideas to functions of several variables using partial derivatives and multiple integrals.</p>`,takeaways:['Differentiation finds instantaneous rate of change (slope of tangent)','The power rule: d/dx[xⁿ] = nxⁿ⁻¹','Integration computes accumulated quantities — area under curves','The Fundamental Theorem of Calculus connects derivatives and integrals']},
{id:'statistics',name:'Statistics & Probability',time:'9 min read',content:`<p>Statistics is the science of collecting, organizing, analyzing, and interpreting data to make informed decisions. Descriptive statistics summarize data using measures like mean (average), median (middle value), and mode (most frequent value). Measures of spread include range, variance, and standard deviation, which quantify how dispersed data points are around the mean.</p><p>Probability measures the likelihood of events occurring, ranging from 0 (impossible) to 1 (certain). For equally likely outcomes, probability = favorable outcomes / total outcomes. Key rules include the addition rule for mutually exclusive events (P(A or B) = P(A) + P(B)) and the multiplication rule for independent events (P(A and B) = P(A) × P(B)). Conditional probability P(A|B) measures likelihood given that another event has occurred.</p><p>Probability distributions describe how probabilities are spread across outcomes. The normal distribution (bell curve) is the most important — many natural phenomena follow it. It is characterized by its mean (μ) and standard deviation (σ). The empirical rule states that approximately 68% of data falls within 1σ, 95% within 2σ, and 99.7% within 3σ of the mean.</p><p>Inferential statistics uses sample data to make conclusions about populations. Hypothesis testing evaluates claims using p-values and significance levels. Confidence intervals provide ranges likely to contain the true population parameter. The Central Limit Theorem states that sample means approximate a normal distribution regardless of the population's shape, given a large enough sample size.</p>`,takeaways:['Mean, median, and mode summarize central tendency; standard deviation measures spread','Probability ranges from 0 to 1; use addition/multiplication rules for combined events','The normal distribution: 68-95-99.7 rule for data within 1, 2, 3 standard deviations','Central Limit Theorem: sample means become normally distributed with large samples']},
{id:'trigonometry',name:'Trigonometry',time:'8 min read',content:`<p>Trigonometry studies the relationships between angles and side lengths of triangles, particularly right triangles. The three primary trigonometric ratios — sine, cosine, and tangent — are defined for an angle θ in a right triangle as: sin(θ) = opposite/hypotenuse, cos(θ) = adjacent/hypotenuse, tan(θ) = opposite/adjacent.</p><p>The unit circle extends trigonometric functions beyond right triangles to all angles. On a unit circle (radius 1) centered at the origin, for any angle θ, the coordinates of the point on the circle are (cos θ, sin θ). This allows trig functions to handle negative angles and angles greater than 360°. Key values include sin(30°) = ½, cos(60°) = ½, and sin(45°) = cos(45°) = √2/2.</p><p>Trigonometric identities are equations that are true for all values of the variables. The Pythagorean identity sin²θ + cos²θ = 1 is the most fundamental. Others include the double angle formulas (sin 2θ = 2 sin θ cos θ), sum and difference formulas, and reciprocal identities (csc = 1/sin, sec = 1/cos, cot = 1/tan).</p><p>The law of sines (a/sin A = b/sin B = c/sin C) and the law of cosines (c² = a² + b² - 2ab cos C) extend trigonometry to non-right triangles. Applications include surveying, navigation, signal processing, and physics (describing waves, oscillations, and circular motion). Inverse trig functions (arcsin, arccos, arctan) find angles from ratios.</p>`,takeaways:['SOH-CAH-TOA: sine = opposite/hypotenuse, cosine = adjacent/hypotenuse, tangent = opposite/adjacent','The unit circle defines trig functions for all angles using coordinates (cos θ, sin θ)','Pythagorean identity: sin²θ + cos²θ = 1','Law of sines and cosines solve any triangle, not just right triangles']},
{id:'linear-algebra',name:'Linear Algebra',time:'9 min read',content:`<p>Linear algebra is the branch of mathematics concerning linear equations, linear transformations, and their representations using vectors and matrices. It is foundational to computer graphics, machine learning, quantum mechanics, statistics, economics, and engineering.</p><p>Vectors are quantities with both magnitude and direction, represented as ordered lists of numbers. Vector operations include addition, scalar multiplication, and the dot product (a·b = |a||b|cosθ, which measures how parallel two vectors are). The cross product (in 3D) produces a vector perpendicular to both inputs. Vectors can describe points, directions, forces, and velocities.</p><p>Matrices are rectangular arrays of numbers used to represent linear transformations and systems of equations. Matrix multiplication (AB)ᵢⱼ = Σ aᵢₖbₖⱼ represents composition of transformations. The determinant of a square matrix indicates whether the transformation is invertible (det ≠ 0) and by how much it scales area/volume. A matrix with determinant zero is singular and has no inverse.</p><p>Eigenvalues and eigenvectors reveal the fundamental behavior of linear transformations. For a matrix A, if Av = λv for some scalar λ and nonzero vector v, then λ is an eigenvalue and v is the corresponding eigenvector. Eigenvectors point in directions that are only scaled (not rotated) by the transformation. These concepts are central to principal component analysis, vibration analysis, and quantum mechanics.</p>`,takeaways:['Vectors have magnitude and direction; the dot product measures alignment','Matrices represent linear transformations; multiplication composes them','Determinant ≠ 0 means the matrix is invertible; det = 0 means singular','Eigenvalues/eigenvectors reveal directions that are only scaled by a transformation']},
{id:'geometry',name:'Geometry',time:'8 min read',content:`<p>Geometry is the study of shapes, sizes, positions, and properties of space. Euclidean geometry, based on axioms formulated by the ancient Greek mathematician Euclid around 300 BCE, remains the foundation of geometric reasoning. Its five postulates — including the parallel postulate — define the properties of flat (planar) geometry.</p><p>Fundamental shapes include triangles (classified by sides: equilateral, isosceles, scalene; and by angles: acute, right, obtuse), quadrilaterals (squares, rectangles, parallelograms, trapezoids, rhombuses), and circles. The sum of angles in any triangle is 180°. The Pythagorean theorem (a² + b² = c²) relates the sides of a right triangle.</p><p>Area formulas are essential: triangle A = ½bh, rectangle A = lw, circle A = πr², trapezoid A = ½(a+b)h. Volume formulas for 3D shapes include: rectangular prism V = lwh, cylinder V = πr²h, sphere V = (4/3)πr³, cone V = (1/3)πr²h. Surface area calculations are critical for real-world applications like packaging and construction.</p><p>Coordinate geometry (analytic geometry) connects algebra and geometry by placing shapes on the coordinate plane. The distance formula d = √((x₂-x₁)² + (y₂-y₁)²) derives from the Pythagorean theorem. The midpoint formula gives ((x₁+x₂)/2, (y₁+y₂)/2). Lines are described by equations in slope-intercept form (y = mx + b) or point-slope form. Transformations include translation, rotation, reflection, and dilation.</p>`,takeaways:['Triangle angle sum = 180°; Pythagorean theorem: a² + b² = c²','Area formulas: triangle ½bh, rectangle lw, circle πr²','Volume: prism lwh, cylinder πr²h, sphere (4/3)πr³, cone (1/3)πr²h','Distance formula: d = √((x₂-x₁)² + (y₂-y₁)²)']}
]},
{id:'english',name:'English Literature',icon:'📖',color:'#e84393',topics:[
{id:'essay-writing',name:'Essay Writing',time:'9 min read',content:`<p>Essay writing is a foundational skill in English literature that involves constructing a clear, coherent argument or analysis in written form. A well-structured essay demonstrates critical thinking, effective communication, and the ability to support claims with evidence. Whether writing for academic purposes or personal expression, mastering essay structure is essential.</p><p>The standard essay structure consists of three main parts: introduction, body, and conclusion. The introduction should hook the reader, provide context, and present a clear thesis statement — a concise declaration of the essay's central argument. Body paragraphs each focus on a single supporting point, beginning with a topic sentence, followed by evidence (quotes, examples, data), analysis, and a linking sentence to the next paragraph.</p><p>Effective essays use the PEE (Point, Evidence, Explanation) or PEEL (Point, Evidence, Explanation, Link) frameworks for body paragraphs. Evidence should be specific and directly relevant. Analysis should explain how the evidence supports the argument — not just what it says, but what it means and why it matters. Avoid merely summarizing; always interpret and evaluate.</p><p>The conclusion should restate the thesis in light of the arguments made, synthesize the key points without introducing new information, and leave the reader with a broader reflection or implication. Strong essays also demonstrate varied sentence structure, precise vocabulary, academic register, and smooth transitions between paragraphs using linking words and phrases.</p>`,takeaways:['Structure: Introduction (hook + thesis), Body (PEE/PEEL paragraphs), Conclusion','Every body paragraph needs a point, evidence, and analytical explanation','Analysis explains WHY evidence matters, not just WHAT it says','Conclusions synthesize arguments and offer broader reflection — no new info']},
{id:'poetry-analysis',name:'Poetry Analysis',time:'8 min read',content:`<p>Poetry analysis involves examining how a poet uses language, structure, and literary techniques to create meaning and evoke emotion. Unlike prose, poetry condenses meaning through careful word choice, rhythm, and imagery. A thorough analysis considers both what a poem says (content) and how it says it (form and technique).</p><p>Begin by reading the poem multiple times — first for overall impression, then for details. Identify the speaker, audience, subject, tone, and mood. Consider the historical and biographical context of the poet, which may inform the poem's themes. Note any shifts in tone, perspective, or subject that occur within the poem.</p><p>Analyze the poet's use of literary devices: metaphor and simile (comparisons), personification (giving human qualities to non-human things), alliteration (repeated consonant sounds), assonance (repeated vowel sounds), enjambment (lines running into each other), caesura (pauses within lines), and symbolism (objects representing abstract ideas). Consider how these devices contribute to the poem's meaning and emotional impact.</p><p>Structure and form also carry meaning. Consider the poem's type (sonnet, free verse, haiku, ballad), rhyme scheme, meter (iambic pentameter, for example), stanza organization, and line length. A sonnet's volta (turn) at line 9 or 13 often signals a shift in argument. Free verse poets make deliberate choices about line breaks and spacing that create rhythm and emphasis without traditional meter.</p>`,takeaways:['Read multiple times: first for impression, then for technique and detail','Identify speaker, tone, mood, and any shifts within the poem','Analyze devices: metaphor, simile, personification, alliteration, enjambment, symbolism','Form carries meaning: consider rhyme scheme, meter, stanza structure, and line breaks']},
{id:'shakespeare',name:'Shakespeare Overview',time:'9 min read',content:`<p>William Shakespeare (1564–1616) is widely regarded as the greatest writer in the English language. Born in Stratford-upon-Avon, he produced approximately 39 plays, 154 sonnets, and several longer poems during his career. His works span comedy, tragedy, history, and romance, exploring universal themes that remain profoundly relevant four centuries later.</p><p>Shakespeare's tragedies — including Hamlet, Macbeth, Othello, and King Lear — explore the downfall of noble characters through fatal flaws (hamartia). Hamlet's indecision, Macbeth's ambition, Othello's jealousy, and Lear's pride all drive their tragic arcs. These plays examine themes of power, mortality, betrayal, madness, and the human condition with extraordinary psychological depth.</p><p>His comedies — such as A Midsummer Night's Dream, Twelfth Night, and Much Ado About Nothing — feature mistaken identities, witty wordplay, romantic entanglements, and generally conclude with marriages and reconciliation. The comedies explore themes of love, illusion versus reality, social conventions, and the absurdity of human behavior.</p><p>Shakespeare's language innovations were immense. He coined over 1,700 words still used today (including "assassination," "lonely," and "generous") and popularized phrases like "break the ice," "wild goose chase," and "heart of gold." His use of blank verse (unrhymed iambic pentameter) became the standard for English dramatic poetry. When analyzing Shakespeare, pay attention to soliloquies (revealing inner thoughts), dramatic irony, and the interplay between verse and prose.</p>`,takeaways:['Shakespeare wrote ~39 plays and 154 sonnets spanning tragedy, comedy, history, and romance','Tragedies feature noble heroes destroyed by fatal flaws (hamartia)','Comedies feature mistaken identity, wordplay, and end in marriage/reconciliation','He coined 1,700+ words and wrote primarily in blank verse (unrhymed iambic pentameter)']},
{id:'literary-devices',name:'Literary Devices',time:'8 min read',content:`<p>Literary devices are techniques that writers use to create special effects, convey meaning beyond the literal, and engage readers on multiple levels. Understanding these devices is essential for analyzing any text — from poetry and novels to speeches and song lyrics. They are the building blocks of sophisticated writing.</p><p>Figurative language devices include metaphor (direct comparison: "life is a journey"), simile (comparison using like/as: "brave as a lion"), personification (giving human qualities to non-human things: "the wind whispered"), hyperbole (exaggeration: "I've told you a million times"), and oxymoron (contradictory terms: "deafening silence"). These create vivid imagery and layers of meaning beyond literal interpretation.</p><p>Structural and sound devices include foreshadowing (hinting at future events), flashback (returning to earlier events), juxtaposition (placing contrasting elements side by side), irony (dramatic: audience knows what characters don't; situational: outcomes opposite to expectations; verbal: saying the opposite of what is meant), alliteration (repeated consonant sounds), onomatopoeia (words mimicking sounds), and repetition (for emphasis or rhythm).</p><p>Narrative devices include unreliable narrator (whose account cannot be fully trusted), stream of consciousness (presenting thoughts as they flow), pathetic fallacy (weather reflecting mood), allegory (a story representing a deeper moral or political meaning), and motif (a recurring element with symbolic significance). Skilled authors layer multiple devices to create rich, multi-dimensional texts that reward careful reading and re-reading.</p>`,takeaways:['Metaphor: direct comparison; Simile: comparison with like/as; Personification: human qualities to non-human','Irony has three types: dramatic, situational, and verbal','Foreshadowing hints at future events; flashback returns to the past','Allegory tells one story while representing a deeper meaning']},
{id:'critical-thinking',name:'Critical Thinking',time:'8 min read',content:`<p>Critical thinking in English literature involves analyzing texts beyond surface-level comprehension to evaluate arguments, identify assumptions, and form independent judgments. It is the difference between summarizing what happens in a text and understanding why it matters, how it works, and what it reveals about broader themes.</p><p>Developing a critical response requires asking probing questions: What is the author's purpose? What assumptions underlie the text? How does the author position the reader? What perspectives are included or excluded? What are the implications of the text's argument? How does context (historical, cultural, biographical) shape meaning?</p><p>Evaluating evidence is central to critical analysis. Strong analytical writing distinguishes between fact and opinion, recognizes bias and perspective, assesses the reliability of sources, and identifies logical fallacies (appeal to emotion, straw man arguments, false dichotomies, circular reasoning). When writing critically about literature, always support interpretations with textual evidence and explain how that evidence supports your reading.</p><p>Comparative and contextual analysis deepens critical engagement. Comparing texts reveals different approaches to similar themes. Considering feminist, Marxist, postcolonial, psychoanalytic, or structuralist critical lenses offers different interpretive frameworks. A mature critical response acknowledges multiple valid interpretations while arguing persuasively for a particular reading, engaging with counterarguments rather than ignoring them.</p>`,takeaways:['Critical thinking goes beyond summary to analysis, evaluation, and interpretation','Always ask: what is the purpose, what assumptions exist, whose perspective is represented?','Support interpretations with textual evidence and explain its significance','Critical lenses (feminist, Marxist, postcolonial) offer different frameworks for analysis']},
