<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Year 9 AQA Revision Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bio: #16a34a; --bio-light: #dcfce7; --bio-mid: #bbf7d0;
    --phy: #2563eb; --phy-light: #dbeafe; --phy-mid: #bfdbfe;
    --chem: #d97706; --chem-light: #fef3c7; --chem-mid: #fde68a;
    --math: #7c3aed; --math-light: #ede9fe; --math-mid: #ddd6fe;
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #232323; --border: #2e2e2e;
    --text: #f0f0f0; --muted: #888; --accent: #f0f0f0;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; padding: 2rem 1rem 4rem; }
  
  .hub-header { text-align: center; margin-bottom: 2.5rem; }
  .hub-title { font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
  .hub-sub { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted); margin-top: 8px; letter-spacing: 0.1em; text-transform: uppercase; }

  .countdown { display: inline-block; margin: 1.2rem auto 0; font-family: 'Space Mono', monospace; font-size: 13px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 8px 18px; color: var(--muted); }
  .countdown span { color: var(--text); font-weight: 700; }

  .subject-tabs { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .tab { padding: 10px 22px; border-radius: 40px; border: 1.5px solid var(--border); background: transparent; color: var(--muted); font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .tab:hover { color: var(--text); border-color: #555; }
  .tab.active[data-s="biology"]  { background: var(--bio-light); border-color: var(--bio); color: #14532d; }
  .tab.active[data-s="physics"]  { background: var(--phy-light); border-color: var(--phy); color: #1e3a8a; }
  .tab.active[data-s="chemistry"]{ background: var(--chem-light); border-color: var(--chem); color: #78350f; }
  .tab.active[data-s="maths"]    { background: var(--math-light); border-color: var(--math); color: #3b0764; }

  .mode-row { display: flex; gap: 6px; justify-content: center; margin-bottom: 2rem; }
  .mode-btn { padding: 7px 20px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .mode-btn.active { background: var(--surface2); border-color: #555; color: var(--text); }

  .container { max-width: 600px; margin: 0 auto; }

  /* FLASHCARDS */
  .fc-wrap { perspective: 1000px; margin-bottom: 1.5rem; }
  .fc-inner { position: relative; min-height: 220px; transform-style: preserve-3d; transition: transform 0.45s cubic-bezier(.4,0,.2,1); cursor: pointer; }
  .fc-inner.flipped { transform: rotateY(180deg); }
  .fc-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); padding: 2rem; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
  .fc-back { transform: rotateY(180deg); }
  .fc-label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; }
  .fc-text { font-size: 16px; line-height: 1.65; color: var(--text); }
  .fc-hint { margin-top: 1.25rem; font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); }
  .fc-answer { font-size: 15px; line-height: 1.7; color: #d0ffd0; }

  .prog-bar { height: 3px; background: var(--surface2); border-radius: 2px; margin-bottom: 1.25rem; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
  .fill-bio  { background: var(--bio); }
  .fill-phy  { background: var(--phy); }
  .fill-chem { background: var(--chem); }
  .fill-math { background: var(--math); }

  .fc-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
  .shuffle-btn { font-family: 'Space Mono', monospace; font-size: 11px; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; letter-spacing: 0.05em; }
  .shuffle-btn:hover { background: var(--surface2); color: var(--text); border-color: #555; }
  .shuffle-btn.on { background: var(--surface2); border-color: #555; color: var(--text); }
  .fc-progress-label { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }

  .nav-row { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 1rem; }
  .nav-btn { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
  .nav-btn:hover { background: var(--surface2); }
  .nav-counter { font-family: 'Space Mono', monospace; font-size: 13px; color: var(--muted); min-width: 60px; text-align: center; }

  .key-hints { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .key-hint { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
  .key { display: inline-flex; align-items: center; justify-content: center; min-width: 22px; height: 20px; padding: 0 5px; border-radius: 4px; border: 1px solid #3a3a3a; background: #222; color: #aaa; font-size: 9px; font-family: 'Space Mono', monospace; }

  .nav-btn.flash { animation: flash-ring 0.18s ease; }
  @keyframes flash-ring { 0%{box-shadow:0 0 0 0 rgba(255,255,255,0.3)} 100%{box-shadow:0 0 0 6px rgba(255,255,255,0)} }

  .fc-controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
  .shuffle-btn { font-family: 'Space Mono', monospace; font-size: 11px; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; letter-spacing: 0.05em; display: flex; align-items: center; gap: 5px; }
  .shuffle-btn:hover { background: var(--surface2); color: var(--text); border-color: #555; }
  .shuffle-btn.on { background: var(--surface2); border-color: #aaa; color: var(--text); }
  .shuffle-badge { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); }

  .key-hints { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 0.85rem; }
  .key-hint { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
  .key { display: inline-flex; align-items: center; justify-content: center; min-width: 22px; height: 20px; padding: 0 5px; border-radius: 4px; border: 1px solid #3a3a3a; background: #222; color: #bbb; font-size: 9px; font-family: 'Space Mono', monospace; }
  .key.lit { border-color: #666; background: #2e2e2e; color: var(--text); transition: all 0.1s; }

  /* PRACTICE */
  .pq-controls { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 1rem; flex-wrap: wrap; }
  .pq-ctrl-label { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }
  .pq-size-btns { display: flex; gap: 5px; }
  .pq-size-btn { padding: 5px 13px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 11px; cursor: pointer; transition: all 0.15s; }
  .pq-size-btn:hover { background: var(--surface2); color: var(--text); }
  .pq-size-btn.active { background: var(--surface2); border-color: #888; color: var(--text); }
  .score-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .score-pill { font-family: 'Space Mono', monospace; font-size: 11px; padding: 5px 14px; border-radius: 20px; background: var(--surface); border: 1px solid var(--border); color: var(--muted); }
  .score-pill.good { background: #052e16; border-color: var(--bio); color: #4ade80; }
  .score-pill.bad  { background: #2d0000; border-color: #dc2626; color: #f87171; }

  .pq-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.75rem; }
  .pq-q { font-size: 16px; line-height: 1.65; margin-bottom: 1.5rem; font-weight: 600; }
  .pq-opts { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1rem; }
  .pq-opt { padding: 11px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-family: 'Syne', sans-serif; font-size: 14px; text-align: left; cursor: pointer; transition: all 0.15s; }
  .pq-opt:hover:not(:disabled) { border-color: #555; background: #2a2a2a; }
  .pq-opt.correct { background: #052e16; border-color: #16a34a; color: #4ade80; }
  .pq-opt.wrong   { background: #2d0000; border-color: #dc2626; color: #f87171; }
  .pq-opt:disabled { cursor: default; }
  .pq-exp { font-size: 13px; line-height: 1.6; color: #aaa; background: #111; border-left: 3px solid #444; border-radius: 4px; padding: 12px 14px; margin-bottom: 1rem; display: none; font-family: 'Space Mono', monospace; }
  .pq-exp.show { display: block; }
  .pq-next { padding: 10px 24px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; display: none; transition: background 0.15s; }
  .pq-next:hover { background: #2a2a2a; }
  .pq-next.show { display: inline-block; }

  .finish-box { text-align: center; padding: 2rem; }
  .finish-score { font-size: 3rem; font-weight: 800; margin-bottom: 0.5rem; }
  .finish-label { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted); margin-bottom: 1.5rem; }
  .retry-btn { padding: 10px 28px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; }

  .section-hidden { display: none; }

  @media (max-width: 500px) {
    .tab { padding: 8px 14px; font-size: 13px; }
    body { padding: 1.25rem 0.75rem 3rem; }
  }
</style>
</head>
<body>

<div class="hub-header">
  <div class="hub-title">Year 9 Revision</div>
  <div class="hub-sub">AQA — Biology · Physics · Chemistry · Maths</div>
  <div class="countdown">Exam week starts in <span id="days-left">—</span> days</div>
</div>

<div class="container">
  <div class="subject-tabs">
    <button class="tab active" data-s="biology"   onclick="switchSubject('biology')">🌿 Biology</button>
    <button class="tab"        data-s="physics"   onclick="switchSubject('physics')">⚛️ Physics</button>
    <button class="tab"        data-s="chemistry" onclick="switchSubject('chemistry')">🧪 Chemistry</button>
    <button class="tab"        data-s="maths"     onclick="switchSubject('maths')">📐 Maths</button>
  </div>
  <div class="mode-row">
    <button class="mode-btn active" onclick="switchMode('flash', this)">Flashcards</button>
    <button class="mode-btn"        onclick="switchMode('practice', this)">Practice Questions</button>
  </div>

  <!-- FLASHCARD SECTION -->
  <div id="flash-section">
    <div class="fc-controls">
      <button class="shuffle-btn" id="shuffle-btn" onclick="toggleShuffle()">⇄ Shuffle</button>
      <span class="shuffle-badge" id="shuffle-badge"></span>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="pf"></div></div>
    <div class="fc-wrap" onclick="flipCard()">
      <div class="fc-inner" id="fc-inner">
        <div class="fc-face fc-front">
          <div class="fc-label">Question</div>
          <div class="fc-text" id="fc-q"></div>
          <div class="fc-hint">click / space to reveal answer</div>
        </div>
        <div class="fc-face fc-back">
          <div class="fc-label">Answer</div>
          <div class="fc-answer" id="fc-a"></div>
          <div class="fc-hint">click / space to go back</div>
        </div>
      </div>
    </div>
    <div class="nav-row">
      <button class="nav-btn" id="btn-prev" onclick="prevCard()">&#8592;</button>
      <span class="nav-counter" id="fc-counter">1 / 10</span>
      <button class="nav-btn" id="btn-next" onclick="nextCard()">&#8594;</button>
    </div>
    <div class="key-hints">
      <span class="key-hint"><kbd class="key" id="k-left">A / ←</kbd> prev</span>
      <span class="key-hint"><kbd class="key" id="k-space">Space</kbd> flip</span>
      <span class="key-hint"><kbd class="key" id="k-right">D / →</kbd> next</span>
    </div>
  </div>

  <!-- PRACTICE SECTION -->
  <div id="practice-section" class="section-hidden">
    <div class="pq-controls">
      <span class="pq-ctrl-label">Questions per round:</span>
      <div class="pq-size-btns">
        <button class="pq-size-btn" onclick="setRoundSize(5,this)">5</button>
        <button class="pq-size-btn active" onclick="setRoundSize(10,this)">10</button>
        <button class="pq-size-btn" onclick="setRoundSize(15,this)">All 15</button>
      </div>
    </div>
    <div class="score-row">
      <span class="score-pill good" id="sc-correct">✓ Correct: 0</span>
      <span class="score-pill bad"  id="sc-wrong">✗ Wrong: 0</span>
      <span class="score-pill"      id="sc-prog">Q 1 of 10</span>
    </div>
    <div id="pq-area"></div>
  </div>
</div>

<script>
const EXAM_DATE = new Date('2025-06-22');
const today = new Date();
const diff = Math.ceil((new Date('2026-06-22') - today) / 86400000);
document.getElementById('days-left').textContent = diff > 0 ? diff : 0;

const SUBJECTS = {
  biology: {
    fill: 'fill-bio',
    cards: [
      {q:"What is the function of mitochondria?", a:"Mitochondria are the site of aerobic respiration. They produce ATP (energy) for the cell. Every cell that needs energy has mitochondria."},
      {q:"What is diffusion?", a:"The net movement of particles from an area of high concentration to low concentration, down the concentration gradient. No energy is needed — it is a passive process."},
      {q:"What are the four bases in DNA?", a:"Adenine (A), Thymine (T), Guanine (G), and Cytosine (C). A always pairs with T; G always pairs with C. These are complementary base pairs."},
      {q:"What is the role of the enzyme amylase?", a:"Amylase breaks down starch into maltose (a sugar). It is produced in the salivary glands and the pancreas, and works in the mouth and small intestine."},
      {q:"What is natural selection?", a:"Individuals with advantageous traits survive and reproduce more successfully, passing those traits to offspring. Over many generations, the population changes — this is evolution."},
      {q:"What is the difference between aerobic and anaerobic respiration?", a:"Aerobic uses oxygen → produces CO₂ + water + lots of ATP. Anaerobic has no oxygen → produces lactic acid in animals (or ethanol + CO₂ in yeast) + less ATP."},
      {q:"What do guard cells do?", a:"Guard cells control the opening and closing of stomata on leaves. They regulate gas exchange (CO₂ in, O₂ out) and water loss through transpiration."},
      {q:"What is osmosis?", a:"The movement of water molecules through a partially permeable membrane from a region of low solute concentration (dilute) to high solute concentration (concentrated). It is passive."},
      {q:"Name three types of blood vessel and their features.", a:"Arteries: thick muscular walls, carry oxygenated blood away from the heart. Veins: thinner walls, have valves, carry blood to the heart. Capillaries: one cell thick, site of gas/nutrient exchange."},
      {q:"What is a gene?", a:"A section of DNA on a chromosome that codes for a specific protein, which determines a characteristic. Humans have about 20,000 genes on 23 pairs of chromosomes."},
    ],
    practice: [
      {q:"Which organelle is responsible for producing energy in a cell?", opts:["Nucleus","Ribosome","Mitochondria","Cell membrane"], ans:2, exp:"Mitochondria carry out aerobic respiration to produce ATP — the cell's energy currency. Cells with high energy demands (like muscle cells) have many mitochondria."},
      {q:"A student places a potato chip in salty water. What happens and why?", opts:["It gains mass — osmosis into the chip","It loses mass — osmosis out of the chip","It gains mass — diffusion","Nothing happens"], ans:1, exp:"The salt water is more concentrated than the potato cells, so water moves OUT of the chip by osmosis (down the concentration gradient), causing it to lose mass and become flaccid."},
      {q:"In the equation for photosynthesis, what are the two products?", opts:["CO₂ and water","Glucose and oxygen","Glucose and CO₂","Oxygen and water"], ans:1, exp:"6CO₂ + 6H₂O → C₆H₁₂O₆ + 6O₂. Glucose is the food/energy store for the plant; oxygen is released as a by-product through stomata."},
      {q:"What base pairs with Guanine in DNA?", opts:["Adenine","Thymine","Cytosine","Uracil"], ans:2, exp:"G–C and A–T are the complementary base pairs in DNA. The pairing is held by hydrogen bonds. Uracil appears in RNA, not DNA."},
      {q:"An organism is well camouflaged. How does this relate to natural selection?", opts:["It directly causes a mutation","It has no effect on survival","It is more likely to survive and pass its genes on","It will always produce identical offspring"], ans:2, exp:"Better camouflage → less predation → survives longer → reproduces more → passes camouflage genes to more offspring. Over generations, the population becomes better camouflaged."},
      {q:"What is the word equation for aerobic respiration?", opts:["Glucose + oxygen → carbon dioxide + water","Glucose → lactic acid","Carbon dioxide + water → glucose + oxygen","Glucose + water → ethanol + CO₂"], ans:0, exp:"Glucose + oxygen → carbon dioxide + water (+ energy as ATP). This happens in the mitochondria and releases far more energy than anaerobic respiration."},
      {q:"Where does photosynthesis take place inside a plant cell?", opts:["Mitochondria","Nucleus","Chloroplasts","Ribosomes"], ans:2, exp:"Chloroplasts contain chlorophyll, the green pigment that absorbs light energy. They are found mainly in leaf cells (mesophyll) and are the site of photosynthesis."},
      {q:"What is the function of the cell membrane?", opts:["Produces proteins","Controls what enters and leaves the cell","Contains the genetic material","Provides energy"], ans:1, exp:"The cell membrane is selectively permeable — it controls the movement of substances in and out of the cell. It is made of a phospholipid bilayer with embedded proteins."},
      {q:"Which blood vessel carries oxygenated blood AWAY from the heart?", opts:["Vein","Capillary","Pulmonary vein","Aorta (artery)"], ans:3, exp:"The aorta is the main artery leaving the heart, carrying oxygenated blood to the body. Arteries always carry blood AWAY from the heart — remember A for Away."},
      {q:"A plant is placed in the dark for 24 hours. What happens to starch levels?", opts:["Starch increases","Starch stays the same","Starch decreases or disappears","Glucose disappears first then starch"], ans:2, exp:"Without light, the plant cannot photosynthesise, so it cannot make glucose or starch. Existing starch is used up for respiration. This is why we destarch plants before photosynthesis experiments."},
      {q:"What is a mutation?", opts:["A change in an organism's behaviour","A random change in the DNA sequence","Death of a cell","A type of natural selection"], ans:1, exp:"A mutation is a random change in the base sequence of DNA. Most mutations have no effect, some are harmful, and rarely one can be beneficial. Mutations are the source of new alleles and variation."},
      {q:"What is the role of insulin in the body?", opts:["Breaks down fats","Lowers blood glucose levels","Raises blood glucose levels","Produced by the pituitary gland"], ans:1, exp:"Insulin is produced by the pancreas when blood glucose is too HIGH. It causes cells (especially liver and muscle) to absorb glucose and convert it to glycogen for storage, lowering blood glucose back to normal."},
      {q:"During anaerobic respiration in humans, what is produced?", opts:["Ethanol and CO₂","Carbon dioxide and water","Lactic acid","Glucose and oxygen"], ans:2, exp:"In humans (and other animals), anaerobic respiration produces lactic acid. This builds up in muscles during intense exercise, causing the burning feeling. Yeast produces ethanol and CO₂ instead."},
      {q:"What does the term 'double helix' describe?", opts:["Two separate DNA molecules","The two-stranded twisted structure of DNA","Two chromosomes","A protein structure"], ans:1, exp:"DNA has a double helix structure — two strands of nucleotides twisted around each other, held together by complementary base pairs (A-T and G-C). Discovered by Watson and Crick in 1953."},
      {q:"Which part of the digestive system absorbs most nutrients?", opts:["Stomach","Large intestine","Small intestine","Oesophagus"], ans:2, exp:"The small intestine is lined with villi (tiny finger-like projections) which massively increase surface area for absorption. Digested food molecules pass into the blood through the villi walls."},
    ]
  },
  physics: {
    fill: 'fill-phy',
    cards: [
      {q:"State Newton's Second Law of Motion.", a:"Force = mass × acceleration (F = ma). Increasing the force increases acceleration; increasing the mass decreases acceleration for the same force. Units: force in Newtons (N)."},
      {q:"What is the difference between speed and velocity?", a:"Speed is a scalar — it has magnitude only (e.g. 10 m/s). Velocity is a vector — it has both magnitude AND direction (e.g. 10 m/s north). Changing direction = changing velocity."},
      {q:"State the law of conservation of energy.", a:"Energy cannot be created or destroyed, only transferred from one form to another. The total energy in a closed system always remains constant."},
      {q:"State Ohm's Law.", a:"Voltage = Current × Resistance (V = IR). For an ohmic conductor, current is directly proportional to voltage at constant temperature. If V doubles, I doubles."},
      {q:"What is the equation for gravitational potential energy?", a:"GPE = mass × gravitational field strength × height (GPE = mgh). On Earth, g ≈ 10 N/kg. Units are joules (J). Doubling the height doubles the GPE."},
      {q:"What is the difference between transverse and longitudinal waves?", a:"Transverse: vibrations are perpendicular to the direction of travel (e.g. light, water waves). Longitudinal: vibrations are parallel to the direction of travel (e.g. sound)."},
      {q:"What is the equation for wave speed?", a:"Wave speed = frequency × wavelength (v = fλ). Speed in m/s, frequency in Hz, wavelength in metres. All electromagnetic waves travel at 3×10⁸ m/s in a vacuum."},
      {q:"What are the three types of nuclear radiation?", a:"Alpha (α): 2 protons + 2 neutrons, stopped by paper, most ionising. Beta (β): fast electron, stopped by aluminium. Gamma (γ): electromagnetic wave, reduced by thick lead, least ionising."},
      {q:"State Hooke's Law.", a:"The extension of a spring is directly proportional to the force applied, provided the elastic limit is not exceeded. Formula: F = ke, where k is the spring constant (N/m)."},
      {q:"What is the equation for kinetic energy?", a:"KE = ½ × mass × velocity² (KE = ½mv²). Measured in joules. If speed doubles, KE quadruples (because v is squared). This is why speed is so dangerous in cars."},
    ],
    practice: [
      {q:"A car of mass 1000 kg accelerates at 3 m/s². What is the resultant force?", opts:["300 N","3000 N","333 N","30 N"], ans:1, exp:"F = ma = 1000 × 3 = 3000 N. Always check units — mass in kg, acceleration in m/s², force in Newtons."},
      {q:"A 2 kg ball is lifted 5 m. What is its GPE? (g = 10 N/kg)", opts:["10 J","100 J","25 J","1000 J"], ans:1, exp:"GPE = mgh = 2 × 10 × 5 = 100 J. If the ball is then dropped, all this GPE converts to KE (ignoring air resistance)."},
      {q:"What type of wave is sound?", opts:["Transverse","Longitudinal","Electromagnetic","Mechanical transverse"], ans:1, exp:"Sound is longitudinal — particles vibrate back and forth in the same direction as the wave travels, creating compressions and rarefactions. It needs a medium to travel through."},
      {q:"A resistor has a voltage of 12 V and a current of 3 A. What is its resistance?", opts:["36 Ω","4 Ω","0.25 Ω","15 Ω"], ans:1, exp:"R = V ÷ I = 12 ÷ 3 = 4 Ω. Rearrange V = IR → R = V/I. Always show your rearrangement in exams."},
      {q:"Which type of nuclear radiation is most ionising?", opts:["Gamma","Beta","Alpha","X-rays"], ans:2, exp:"Alpha particles are the most ionising — they are large (2p + 2n), move slowly, and interact strongly with matter. They are also the least penetrating (stopped by paper or skin)."},
      {q:"A wave has a frequency of 50 Hz and wavelength 2 m. What is its speed?", opts:["25 m/s","100 m/s","52 m/s","0.04 m/s"], ans:1, exp:"v = fλ = 50 × 2 = 100 m/s. Frequency × wavelength always gives wave speed. Make sure you multiply, not divide!"},
      {q:"What happens to the resistance of a wire if its length is doubled?", opts:["Resistance halves","Resistance stays the same","Resistance doubles","Resistance quadruples"], ans:2, exp:"Resistance is directly proportional to length (R ∝ L). Doubling the length doubles the resistance, because electrons have further to travel and experience more collisions with ions."},
      {q:"A spring has a spring constant of 40 N/m. It is stretched 0.5 m. What is the force?", opts:["80 N","20 N","0.0125 N","40.5 N"], ans:1, exp:"F = ke = 40 × 0.5 = 20 N. Hooke's Law: force = spring constant × extension. Always check the extension is in metres."},
      {q:"An object travels 60 m in 12 s at constant speed. What is its speed?", opts:["720 m/s","0.2 m/s","5 m/s","48 m/s"], ans:2, exp:"Speed = distance ÷ time = 60 ÷ 12 = 5 m/s. This is the basic speed equation. Don't confuse speed (scalar) with velocity (vector, needs direction)."},
      {q:"Which of these is a scalar quantity?", opts:["Velocity","Force","Acceleration","Speed"], ans:3, exp:"Speed is a scalar — it has magnitude only (e.g. 30 m/s). Velocity, force, and acceleration are all vectors — they need both magnitude and direction to be fully described."},
      {q:"What energy transfer happens when a ball falls from a height?", opts:["KE → GPE","Chemical → KE","GPE → KE","Thermal → GPE"], ans:2, exp:"As the ball falls, gravitational potential energy (GPE) converts to kinetic energy (KE). At the bottom, all the GPE has become KE (ignoring air resistance). Energy is conserved."},
      {q:"Beta radiation is emitted from a nucleus. What happens to the atomic number?", opts:["Decreases by 2","Stays the same","Increases by 1","Decreases by 1"], ans:2, exp:"In beta decay, a neutron turns into a proton + electron (the beta particle). The proton stays in the nucleus, so atomic number increases by 1. Mass number stays the same."},
      {q:"Two resistors of 4 Ω and 6 Ω are connected in series. What is the total resistance?", opts:["2.4 Ω","10 Ω","5 Ω","24 Ω"], ans:1, exp:"In series, total resistance = R₁ + R₂ = 4 + 6 = 10 Ω. In parallel, it would be lower. Series resistors simply add together."},
      {q:"A 5 kg object has KE of 250 J. What is its speed?", opts:["50 m/s","10 m/s","5 m/s","100 m/s"], ans:1, exp:"KE = ½mv² → v² = 2KE/m = 2×250/5 = 100 → v = √100 = 10 m/s. Always rearrange carefully and remember to square root at the end."},
      {q:"What is the unit of frequency?", opts:["Metres (m)","Newtons (N)","Hertz (Hz)","Joules (J)"], ans:2, exp:"Frequency is measured in Hertz (Hz), which means 'cycles per second'. 1 Hz = 1 wave per second. Higher frequency = shorter wavelength (for same wave speed)."},
    ]
  },
  chemistry: {
    fill: 'fill-chem',
    cards: [
      {q:"What is the difference between an atom, element, and compound?", a:"Atom: the smallest particle of an element. Element: a substance made of only one type of atom. Compound: two or more elements chemically bonded together in fixed ratios."},
      {q:"What happens to particles when a substance is heated?", a:"Particles gain kinetic energy and move faster. They collide more frequently and with more energy. This can cause changes of state (e.g. melting, boiling) or increase reaction rate."},
      {q:"What is the word equation for complete combustion?", a:"Hydrocarbon + oxygen → carbon dioxide + water. Incomplete combustion (not enough O₂) produces carbon monoxide and/or carbon (soot), which are toxic/harmful."},
      {q:"What is an endothermic reaction?", a:"A reaction that absorbs heat energy from the surroundings, causing the temperature to decrease. Example: dissolving ammonium nitrate in water, or thermal decomposition."},
      {q:"State the law of conservation of mass.", a:"Mass is neither created nor destroyed in a chemical reaction. The total mass of reactants always equals the total mass of products. Atoms are just rearranged, not made or destroyed."},
      {q:"What is the difference between ionic and covalent bonding?", a:"Ionic: electrons are transferred from a metal to a non-metal, forming oppositely charged ions held by electrostatic attraction. Covalent: electrons are shared between non-metal atoms."},
      {q:"What is pH and what does it measure?", a:"pH measures the concentration of H⁺ ions in solution. pH 7 = neutral (pure water). Below 7 = acidic (more H⁺). Above 7 = alkaline (fewer H⁺). The scale runs from 0 (very acidic) to 14 (very alkaline)."},
      {q:"What is the reactivity series?", a:"Metals listed in order of reactivity: K > Na > Ca > Mg > Al > Zn > Fe > Cu > Ag > Au. More reactive metals displace less reactive ones from solutions. Used to predict displacement reactions."},
      {q:"What are the products of a neutralisation reaction?", a:"Acid + base → salt + water. Example: hydrochloric acid + sodium hydroxide → sodium chloride + water. The H⁺ from the acid reacts with the OH⁻ from the base."},
      {q:"Describe the structure of an atom.", a:"A central nucleus containing protons (positive charge) and neutrons (no charge), surrounded by electrons (negative charge) arranged in shells. Atoms are mostly empty space. Atomic number = number of protons."},
    ],
    practice: [
      {q:"Iron is added to copper sulfate solution. What do you observe?", opts:["No reaction occurs","Iron dissolves and copper metal is deposited","Copper dissolves and iron is deposited","The solution turns green immediately"], ans:1, exp:"Iron is more reactive than copper, so it displaces copper from the solution. Iron dissolves (forming iron sulfate) and copper metal deposits — you'd see a brown coating on the iron and the blue solution fading."},
      {q:"A reaction releases heat to the surroundings. What type of reaction is this?", opts:["Endothermic","Reversible","Exothermic","Catalytic"], ans:2, exp:"Exothermic reactions release energy to surroundings, raising the temperature. Examples: combustion, neutralisation, oxidation. Endothermic reactions absorb energy, lowering the temperature."},
      {q:"What is the approximate pH of a strong acid like hydrochloric acid?", opts:["7","10","1–2","5–6"], ans:2, exp:"Strong acids fully dissociate, releasing many H⁺ ions, giving a very low pH (often 1–2). Weak acids partially dissociate and have a higher pH (e.g. 4–6). pH 7 is neutral."},
      {q:"Magnesium is burned in oxygen. What is the product?", opts:["Magnesium chloride","Magnesium oxide","Magnesium hydroxide","Magnesium carbonate"], ans:1, exp:"2Mg + O₂ → 2MgO. A very bright white flame is produced and white magnesium oxide powder forms. It's an oxidation reaction — magnesium gains oxygen."},
      {q:"Which type of bonding involves the transfer of electrons?", opts:["Covalent","Metallic","Ionic","Hydrogen bonding"], ans:2, exp:"Ionic bonding: a metal atom loses electrons → becomes a positive ion (cation); a non-metal gains electrons → becomes a negative ion (anion). The oppositely charged ions attract each other electrostatically."},
      {q:"What does the atomic number of an element tell you?", opts:["Number of neutrons","Number of protons","Mass of the atom","Number of electron shells"], ans:1, exp:"The atomic number = number of protons in the nucleus. It also equals the number of electrons in a neutral atom. Elements are arranged in the periodic table in order of atomic number."},
      {q:"Which of the following is a mixture?", opts:["Water (H₂O)","Carbon dioxide (CO₂)","Air","Sodium chloride (NaCl)"], ans:2, exp:"Air is a mixture — it contains nitrogen, oxygen, argon, CO₂ and other gases NOT chemically bonded together. Mixtures can be separated by physical methods. Compounds cannot."},
      {q:"What is produced when an acid reacts with a metal carbonate?", opts:["Salt + water only","Salt + water + carbon dioxide","Salt + hydrogen","Water + carbon dioxide only"], ans:1, exp:"Acid + metal carbonate → salt + water + carbon dioxide. E.g. HCl + CaCO₃ → CaCl₂ + H₂O + CO₂. The CO₂ gas can be tested with limewater (turns milky)."},
      {q:"How can you test for hydrogen gas?", opts:["Glowing splint relights","Damp litmus paper turns red","Lighted splint causes a squeaky pop","It turns limewater milky"], ans:2, exp:"The squeaky pop test: hold a lit splint near the gas. Hydrogen ignites with a squeaky pop sound. A glowing splint relights in oxygen; limewater turns milky with CO₂."},
      {q:"A student heats copper carbonate. What colour change do they observe?", opts:["Green to black","Blue to white","Orange to silver","White to green"], ans:0, exp:"Copper carbonate (green) thermally decomposes: CuCO₃ → CuO + CO₂. Copper oxide is black. This is an endothermic decomposition reaction — heat energy is absorbed to break down the compound."},
      {q:"What is the charge of a proton?", opts:["−1","0","+1","+2"], ans:2, exp:"Protons have a charge of +1. Neutrons have no charge (0). Electrons have a charge of −1. In a neutral atom, the number of protons equals the number of electrons, so charges cancel out."},
      {q:"Sodium is in Group 1. How many electrons does it lose when it forms an ion?", opts:["2","3","1","7"], ans:2, exp:"Group 1 metals have 1 electron in their outer shell. They lose this 1 electron to form a +1 ion (Na⁺). Group 2 metals lose 2 electrons (2+ ion); Group 7 non-metals gain 1 electron (−1 ion)."},
      {q:"Which method would you use to separate salt from salt water?", opts:["Filtration","Distillation or evaporation","Chromatography","Decanting"], ans:1, exp:"Evaporation removes water, leaving salt crystals. Distillation can collect the water as well. Filtration only separates insoluble solids from liquids — salt dissolves so it passes through filter paper."},
      {q:"What happens to the rate of reaction when a catalyst is added?", opts:["It slows down","It stays the same","It speeds up but the catalyst is used up","It speeds up and the catalyst is unchanged"], ans:3, exp:"A catalyst increases the rate of reaction by providing an alternative pathway with lower activation energy. Crucially, the catalyst is NOT used up — it can be reused. This makes catalysts valuable industrially."},
      {q:"Carbon dioxide is bubbled into limewater. What do you observe?", opts:["It turns blue","It turns red","It turns milky/cloudy","No change"], ans:2, exp:"CO₂ reacts with calcium hydroxide (limewater) to form calcium carbonate, an insoluble white precipitate: Ca(OH)₂ + CO₂ → CaCO₃ + H₂O. This is the standard test for CO₂."},
    ]
  },
  maths: {
    fill: 'fill-math',
    cards: [
      {q:"What is the formula for the area of a circle?", a:"A = πr², where r is the radius. Circumference = 2πr (or πd). Common mistake: don't use the diameter in the area formula — always use the radius (half the diameter)."},
      {q:"How do you find the gradient of a straight line?", a:"Gradient m = (y₂ − y₁) ÷ (x₂ − x₁) = rise ÷ run. Pick two clear points on the line. A positive gradient slopes up left to right; negative slopes down."},
      {q:"State Pythagoras' theorem.", a:"a² + b² = c², where c is the hypotenuse (the longest side, opposite the right angle). To find the hypotenuse: c = √(a² + b²). To find another side: a = √(c² − b²)."},
      {q:"How do you calculate the mean of a data set?", a:"Mean = sum of all values ÷ number of values. Compare with: median (middle value when ordered), mode (most common value), range (max − min)."},
      {q:"What is the equation of a straight line?", a:"y = mx + c, where m is the gradient and c is the y-intercept (where the line crosses the y-axis). You can find the equation from two points by calculating m first, then substituting."},
      {q:"How do you expand double brackets, e.g. (x + 3)(x − 2)?", a:"Use FOIL: First (x·x = x²), Outer (x·−2 = −2x), Inner (3·x = 3x), Last (3·−2 = −6). Collect like terms: x² + x − 6."},
      {q:"What is the formula for the area of a trapezium?", a:"A = ½(a + b)h, where a and b are the two parallel sides and h is the perpendicular height between them. Don't confuse h with the slant side."},
      {q:"How do you solve a linear equation like 3x + 5 = 17?", a:"Work in reverse: subtract 5 from both sides → 3x = 12. Divide both sides by 3 → x = 4. Always perform the same operation to BOTH sides. Check by substituting back."},
      {q:"What is a prime number?", a:"A number with exactly two factors: 1 and itself. Primes: 2, 3, 5, 7, 11, 13, 17, 19, 23... Note: 1 is NOT prime (only one factor). 2 is the only even prime."},
      {q:"How do you calculate percentage change?", a:"% change = (new value − original value) ÷ original value × 100. Positive result = percentage increase; negative = percentage decrease. Always divide by the ORIGINAL value."},
    ],
    practice: [
      {q:"A circle has radius 5 cm. What is its area? (use π ≈ 3.14)", opts:["15.7 cm²","78.5 cm²","31.4 cm²","62.8 cm²"], ans:1, exp:"A = πr² = 3.14 × 5² = 3.14 × 25 = 78.5 cm². Common mistake: using diameter (10) instead of radius (5). Always halve the diameter first."},
      {q:"Expand and simplify: (x + 4)(x − 3)", opts:["x² + x − 12","x² + 7x − 12","x² − x − 12","x² + x + 12"], ans:0, exp:"FOIL: x² − 3x + 4x − 12 = x² + x − 12. The key step is collecting like terms: −3x + 4x = +x. Watch the signs carefully!"},
      {q:"A price rises from £40 to £50. What is the percentage increase?", opts:["10%","20%","25%","15%"], ans:2, exp:"% increase = (50 − 40) ÷ 40 × 100 = 10 ÷ 40 × 100 = 25%. Divide by the ORIGINAL value (40), not the new value. This is the most common mistake in percentage change questions."},
      {q:"A right triangle has legs of 6 cm and 8 cm. What is the hypotenuse?", opts:["10 cm","14 cm","12 cm","100 cm"], ans:0, exp:"c² = 6² + 8² = 36 + 64 = 100, so c = √100 = 10 cm. This is the classic 3-4-5 Pythagorean triple scaled by 2. Recognising these triples saves time in exams."},
      {q:"What is the gradient of the line through (1, 3) and (4, 9)?", opts:["2","3","6","½"], ans:0, exp:"Gradient = (9 − 3) ÷ (4 − 1) = 6 ÷ 3 = 2. The line rises 6 units for every 3 across. With gradient 2 and point (1,3): y = 2x + 1."},
      {q:"Solve: 2x + 7 = 15", opts:["x = 11","x = 4","x = 3","x = 8"], ans:1, exp:"Subtract 7 from both sides: 2x = 8. Divide by 2: x = 4. Check: 2(4) + 7 = 8 + 7 = 15 ✓. Always check by substituting your answer back in."},
      {q:"What is the area of a trapezium with parallel sides 5 cm and 9 cm, height 4 cm?", opts:["28 cm²","18 cm²","36 cm²","14 cm²"], ans:0, exp:"A = ½(a+b)h = ½(5+9)×4 = ½×14×4 = 28 cm². Add the parallel sides first, then multiply by height, then halve. Don't forget to halve!"},
      {q:"What are the factors of 24?", opts:["1,2,3,4,6,8,12,24","1,2,4,6,8,24","1,3,6,8,12,24","2,3,4,6,8,12"], ans:0, exp:"Factors of 24: 1×24, 2×12, 3×8, 4×6. So factors are 1,2,3,4,6,8,12,24. A quick method: go through numbers 1,2,3... and check if they divide exactly into 24."},
      {q:"The mean of 5 numbers is 12. What is their total?", opts:["12","2.4","60","17"], ans:2, exp:"Mean = total ÷ count, so total = mean × count = 12 × 5 = 60. This is a key rearrangement — if you know the mean and how many values, you can always find the total."},
      {q:"What is the interior angle of a regular hexagon?", opts:["60°","90°","120°","108°"], ans:2, exp:"Sum of interior angles of a hexagon = (6−2)×180 = 720°. Each angle = 720°÷6 = 120°. Formula: (n−2)×180 for any polygon, then divide by n for the angle of a regular polygon."},
      {q:"Simplify: 3x + 2y − x + 5y", opts:["2x + 7y","4x + 7y","2x + 3y","3x + 7y"], ans:0, exp:"Collect like terms: (3x − x) + (2y + 5y) = 2x + 7y. Only terms with the same letter (and power) can be combined. x terms with x terms, y terms with y terms."},
      {q:"A bag has 3 red, 5 blue, 2 green balls. What is the probability of picking a blue ball?", opts:["5","½","1/2","5/10 = ½"], ans:3, exp:"P(blue) = number of blue ÷ total = 5 ÷ (3+5+2) = 5/10 = ½. Always find the total number of outcomes first. Probability is always between 0 and 1."},
      {q:"What is 15% of 240?", opts:["36","24","360","3.6"], ans:0, exp:"10% of 240 = 24. 5% = 12. 15% = 24 + 12 = 36. Or: 0.15 × 240 = 36. Breaking percentages into 10% + 5% is a quick mental method."},
      {q:"Factorise: x² + 5x + 6", opts:["(x+2)(x+3)","(x+1)(x+6)","(x−2)(x−3)","(x+6)(x−1)"], ans:0, exp:"Find two numbers that multiply to 6 and add to 5: 2 and 3. So x² + 5x + 6 = (x+2)(x+3). Always check by expanding back out: x² + 3x + 2x + 6 = x² + 5x + 6 ✓"},
      {q:"A line has equation y = 3x − 2. What is the y-intercept?", opts:["3","−2","2","−3"], ans:1, exp:"In y = mx + c, c is the y-intercept (where the line crosses the y-axis, i.e. when x=0). Here c = −2, so the line crosses the y-axis at (0, −2). The gradient m = 3."},
    ]
  }
};

let subject = 'biology';
let mode = 'flash';
let cardIdx = 0;
let flipped = false;
let shuffleOn = false;
let shuffledOrder = [];
let pqIdx = 0;
let correct = 0;
let wrong = 0;
let answered = false;
let roundSize = 10;
let activeQs = [];

// --- Shuffle helpers ---
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildOrder(len) {
  const arr = Array.from({length: len}, (_, i) => i);
  return shuffleOn ? shuffleArray(arr) : arr;
}

function buildActiveQs() {
  const all = SUBJECTS[subject].practice;
  const shuffled = shuffleArray([...all]);
  activeQs = shuffled.slice(0, Math.min(roundSize, all.length));
}

function toggleShuffle() {
  shuffleOn = !shuffleOn;
  const btn = document.getElementById('shuffle-btn');
  btn.classList.toggle('on', shuffleOn);
  shuffledOrder = buildOrder(SUBJECTS[subject].cards.length);
  cardIdx = 0;
  flipped = false;
  updateShuffleBadge();
  renderCard();
}

function updateShuffleBadge() {
  document.getElementById('shuffle-badge').textContent = shuffleOn ? 'shuffled' : '';
}

function currentCard() {
  return SUBJECTS[subject].cards[shuffledOrder[cardIdx]];
}

function setRoundSize(n, btn) {
  roundSize = n;
  document.querySelectorAll('.pq-size-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  pqIdx = 0; correct = 0; wrong = 0; answered = false;
  buildActiveQs();
  renderPQ();
}

// --- Subject / mode switching ---
function switchSubject(s) {
  subject = s;
  cardIdx = 0; flipped = false; pqIdx = 0; correct = 0; wrong = 0; answered = false;
  shuffledOrder = buildOrder(SUBJECTS[subject].cards.length);
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-s="${s}"]`).classList.add('active');
  if (mode === 'flash') renderCard();
  else { buildActiveQs(); renderPQ(); }
}

function switchMode(m, btn) {
  mode = m;
  pqIdx = 0; correct = 0; wrong = 0; answered = false;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('flash-section').classList.toggle('section-hidden', m !== 'flash');
  document.getElementById('practice-section').classList.toggle('section-hidden', m !== 'practice');
  if (m === 'flash') renderCard();
  else { buildActiveQs(); renderPQ(); }
}

// --- Flashcard rendering ---
function renderCard() {
  const cards = SUBJECTS[subject].cards;
  const c = currentCard();
  flipped = false;
  document.getElementById('fc-inner').classList.remove('flipped');
  document.getElementById('fc-q').textContent = c.q;
  document.getElementById('fc-a').textContent = c.a;
  document.getElementById('fc-counter').textContent = `${cardIdx + 1} / ${cards.length}`;
  const pct = cards.length > 1 ? Math.round((cardIdx / (cards.length - 1)) * 100) : 100;
  const pf = document.getElementById('pf');
  pf.style.width = pct + '%';
  pf.className = 'prog-fill ' + SUBJECTS[subject].fill;
}

function flipCard() {
  flipped = !flipped;
  document.getElementById('fc-inner').classList.toggle('flipped', flipped);
}

function nextCard() {
  cardIdx = (cardIdx + 1) % SUBJECTS[subject].cards.length;
  flashBtn('btn-next');
  renderCard();
}
function prevCard() {
  cardIdx = (cardIdx - 1 + SUBJECTS[subject].cards.length) % SUBJECTS[subject].cards.length;
  flashBtn('btn-prev');
  renderCard();
}

function flashBtn(id) {
  const b = document.getElementById(id);
  if (!b) return;
  b.classList.add('flash');
  setTimeout(() => b.classList.remove('flash'), 200);
}

function litKey(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add('lit');
  setTimeout(() => el.classList.remove('lit'), 150);
}

// --- Keyboard controls ---
document.addEventListener('keydown', e => {
  if (mode !== 'flash') return;
  if (['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) return;
  if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
    e.preventDefault(); litKey('k-left'); prevCard();
  } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
    e.preventDefault(); litKey('k-right'); nextCard();
  } else if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W' || e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
    e.preventDefault(); litKey('k-space'); flipCard();
  }
});

// --- Practice questions ---
function renderPQ() {
  answered = false;
  updateScoreRow();
  const area = document.getElementById('pq-area');
  if (pqIdx >= activeQs.length) {
    const pct = Math.round((correct / activeQs.length) * 100);
    area.innerHTML = `<div class="finish-box">
      <div class="finish-score">${correct}/${activeQs.length}</div>
      <div class="finish-label">${pct >= 80 ? '🎉 Great work!' : pct >= 60 ? '👍 Good effort!' : '📚 Keep revising!'} — ${pct}%</div>
      <button class="retry-btn" onclick="resetPQ()">New random round ↺</button>
    </div>`;
    return;
  }
  const q = activeQs[pqIdx];
  area.innerHTML = `<div class="pq-card">
    <div class="pq-q">Q${pqIdx + 1}. ${q.q}</div>
    <div class="pq-opts">${q.opts.map((o,i)=>`<button class="pq-opt" onclick="selectOpt(${i})">${'ABCD'[i]}. ${o}</button>`).join('')}</div>
    <div class="pq-exp" id="pq-exp"></div>
    <button class="pq-next" id="pq-next" onclick="nextPQ()">Next question →</button>
  </div>`;
}

function selectOpt(i) {
  if (answered) return;
  answered = true;
  const q = activeQs[pqIdx];
  const btns = document.querySelectorAll('.pq-opt');
  btns.forEach(b => b.disabled = true);
  btns[q.ans].classList.add('correct');
  if (i !== q.ans) { btns[i].classList.add('wrong'); wrong++; } else correct++;
  document.getElementById('pq-exp').textContent = q.exp;
  document.getElementById('pq-exp').classList.add('show');
  document.getElementById('pq-next').classList.add('show');
  updateScoreRow();
}

function nextPQ() { pqIdx++; renderPQ(); }
function resetPQ() { pqIdx = 0; correct = 0; wrong = 0; buildActiveQs(); renderPQ(); }

function updateScoreRow() {
  document.getElementById('sc-correct').textContent = `✓ Correct: ${correct}`;
  document.getElementById('sc-wrong').textContent = `✗ Wrong: ${wrong}`;
  document.getElementById('sc-prog').textContent = `Q ${Math.min(pqIdx+1, activeQs.length)} of ${activeQs.length}`;
}

// Init
shuffledOrder = buildOrder(SUBJECTS[subject].cards.length);
buildActiveQs();
renderCard();
</script>
