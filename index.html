<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jaouis Site</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080810;
      --surface: #13131f;
      --border: #1e1e30;
      --accent: #a78bfa;
      --accent-glow: rgba(167,139,250,0.10);
      --text: #e8e8f0;
      --muted: #5a5a7a;
      --font: 'Syne', sans-serif;
      --mono: 'DM Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px 60px;
    }

    .hero {
      text-align: center;
      margin-bottom: 44px;
    }

    .hero h1 {
      font-size: clamp(2.2rem, 6vw, 4rem);
      font-weight: 800;
      letter-spacing: -0.05em;
      line-height: 1;
    }

    .hero h1 em { font-style: normal; color: var(--accent); }

    .hero p {
      margin-top: 12px;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .search-wrap {
      width: 100%;
      max-width: 900px;
      margin-bottom: 20px;
    }

    #search {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.78rem;
      padding: 9px 14px;
      border-radius: 7px;
      outline: none;
      transition: border-color 0.15s;
    }

    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--muted); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 12px;
      width: 100%;
      max-width: 900px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 18px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color 0.15s, background 0.15s, transform 0.15s;
    }

    .card:hover {
      border-color: var(--accent);
      background: var(--accent-glow);
      transform: translateY(-2px);
    }

    .card-icon { font-size: 1.6rem; }
    .card-name { font-size: 0.9rem; font-weight: 700; letter-spacing: -0.02em; }
    .card-desc { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); line-height: 1.5; }
    .card-file { font-family: var(--mono); font-size: 0.62rem; color: var(--accent); opacity: 0.6; margin-top: 2px; }

    .empty {
      display: none;
      grid-column: 1/-1;
      text-align: center;
      padding: 40px 0;
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--muted);
    }

    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- ════════════════════════════════════════
     ✏️  ADD YOUR FILES HERE
     name  = display name on the card
     file  = filename (same folder as this)
     desc  = short description
     icon  = any emoji
════════════════════════════════════════ -->
<script>
const FILES = [
  { name: "Jaouis Music", file: "jaouis-music.html", desc: "", icon: "🎵" },
  { name: "Jaouis Notes", file: "jaouis-notes.html", desc: "", icon: "📝" },
  { name: "Jaouis Games", file: "jaouis-games.html", desc: "", icon: "🎮" },
  { name: "Jaouis Ocarina", file: "jaouis-ocarina.html", desc: "", icon: "🎶" },
  { name: "Jaouis Arcade", file: "jaouis-arcade.html", desc: "", icon: "🕹️" },
  { name: "Jaouis Atom", file: "jaouis-atom.html", desc: "", icon: "⚛️" },
];
</script>
<!-- ════════════════════════════════════════ -->

<div class="hero">
  <h1>Jaouis <em>Site</em></h1>
  <p>CLICK A CARD TO OPEN — BACK BUTTON RETURNS HERE</p>
</div>

<div class="search-wrap">
  <input id="search" type="text" placeholder="Search files…" autocomplete="off" />
</div>

<div class="grid" id="grid">
  <div class="empty" id="empty">No files added yet. Edit the FILES array to add some!</div>
</div>

<script>
  const grid   = document.getElementById('grid');
  const search = document.getElementById('search');
  const empty  = document.getElementById('empty');

  function render(q = '') {
    grid.querySelectorAll('.card').forEach(c => c.remove());

    const matches = FILES.filter(f =>
      f.name.toLowerCase().includes(q) ||
      (f.desc || '').toLowerCase().includes(q) ||
      f.file.toLowerCase().includes(q)
    );

    empty.style.display = matches.length === 0 ? 'block' : 'none';

    matches.forEach(f => {
      const a = document.createElement('a');
      a.className = 'card';
      a.href = f.file;
      a.innerHTML = `
        <div class="card-icon">${f.icon || '📄'}</div>
        <div class="card-name">${f.name}</div>
        <div class="card-desc">${f.desc || ''}</div>
        <div class="card-file">${f.file}</div>`;
      grid.insertBefore(a, empty);
    });
  }

  render();
  search.addEventListener('input', () => render(search.value.toLowerCase()));
</script>

</body>
</html>
