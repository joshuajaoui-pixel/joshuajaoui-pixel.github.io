<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Molecule Lab</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f3;--bg3:#e8e8e5;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#a0a09a;
  --border:rgba(0,0,0,0.11);--border2:rgba(0,0,0,0.22);
  --radius:10px;--radius-lg:14px;
  --blue:#378ADD;--blue-bg:#E6F1FB;--blue-text:#0C447C;
  --purple:#7F77DD;--purple-bg:#EEEDFE;--purple-text:#3C3489;
  --green:#639922;--green-bg:#EAF3DE;--green-text:#27500A;
  --red:#E24B4A;--red-bg:#FCEBEB;--red-text:#791F1F;
  --amber:#BA7517;--amber-bg:#FAEEDA;--amber-text:#412402;
  --teal:#1D9E75;--teal-bg:#E1F5EE;--teal-text:#085041;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1e1e1c;--bg2:#272725;--bg3:#303030;
  --text:#f0efe8;--text2:#a0a098;--text3:#6a6a62;
  --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.2);
  --blue-bg:#0c2d4a;--blue-text:#85B7EB;
  --purple-bg:#1e1b3a;--purple-text:#AFA9EC;
  --green-bg:#162209;--green-text:#97C459;
  --red-bg:#2a0f0f;--red-text:#F09595;
  --amber-bg:#281a05;--amber-text:#FAC775;
  --teal-bg:#082b1e;--teal-text:#5DCAA5;
}}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text)}
#app{display:grid;grid-template-columns:185px 1fr 255px;height:100vh}

/* LEFT */
#left{display:flex;flex-direction:column;border-right:0.5px solid var(--border);padding:10px;gap:7px;overflow:hidden}
#left h1{font-size:15px;font-weight:500}
#atom-search{width:100%;padding:5px 9px;font-size:12px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--bg2);color:var(--text);outline:none}
#atom-search:focus{border-color:var(--border2)}
#left-label{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
#atom-list{overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:1px}
#atom-list::-webkit-scrollbar{width:3px}
#atom-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.atom-btn{display:flex;align-items:center;gap:7px;padding:5px 6px;border-radius:7px;border:none;background:transparent;cursor:grab;transition:background .1s;width:100%;text-align:left;color:var(--text);user-select:none}
.atom-btn:hover{background:var(--bg2)}
.atom-btn:active{cursor:grabbing}
.asym-sm{font-size:12px;font-weight:600;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:5px;flex-shrink:0}
.alabel .aname{font-size:11px;font-weight:500;color:var(--text)}
.alabel .asub{font-size:9px;color:var(--text3)}

/* CENTER */
#center{display:flex;flex-direction:column;overflow:hidden}
#toolbar{display:flex;align-items:center;gap:5px;padding:7px 10px;border-bottom:0.5px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.tbtn{padding:4px 11px;font-size:11px;border-radius:7px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .1s;font-family:inherit;white-space:nowrap}
.tbtn:hover{background:var(--bg2);color:var(--text)}
.tbtn.active{background:var(--purple-bg);color:var(--purple-text);border-color:transparent}
.tsep{width:0.5px;height:16px;background:var(--border2);margin:0 1px;flex-shrink:0}
#canvas-wrap{flex:1;position:relative;overflow:hidden}
#mol-canvas{display:block;width:100%;height:100%}
#hint-bar{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--text3);background:var(--bg2);padding:3px 12px;border-radius:20px;border:0.5px solid var(--border);pointer-events:none;white-space:nowrap}
#formula-bar{position:absolute;top:8px;left:50%;transform:translateX(-50%);font-size:13px;font-weight:500;color:var(--text);background:var(--bg);padding:4px 14px;border-radius:20px;border:0.5px solid var(--border);pointer-events:none;letter-spacing:.02em;min-width:40px;text-align:center}

/* RIGHT */
#right{display:flex;flex-direction:column;border-left:0.5px solid var(--border);overflow:hidden}
#result-area{padding:12px;border-bottom:0.5px solid var(--border);flex-shrink:0}
#result-area .sec-label{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
#result-box{min-height:70px}
.res-empty{font-size:12px;color:var(--text3);line-height:1.6}
@keyframes popIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.res-anim{animation:popIn .2s cubic-bezier(.34,1.56,.64,1)}
.res-name{font-size:17px;font-weight:500;margin-bottom:2px;line-height:1.2}
.res-key{font-size:10px;color:var(--text3);font-family:monospace;margin-bottom:5px}
.res-desc{font-size:11px;color:var(--text2);line-height:1.65;margin-bottom:7px}
.tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.tag-gas{background:var(--blue-bg);color:var(--blue-text)}
.tag-liquid{background:var(--teal-bg);color:var(--teal-text)}
.tag-solid{background:var(--bg3);color:var(--text2)}
.tag-useful{background:var(--green-bg);color:var(--green-text)}
.tag-hazardous{background:var(--red-bg);color:var(--red-text)}
.tag-cat{background:var(--purple-bg);color:var(--purple-text)}
.tag-ai{background:var(--amber-bg);color:var(--amber-text)}
#fun-fact-box{font-size:10px;color:var(--amber-text);background:var(--amber-bg);border-radius:7px;padding:7px 9px;margin-top:7px;line-height:1.55;display:none}
#id-btn{width:100%;margin-top:8px;padding:7px;font-size:12px;font-weight:500;border-radius:var(--radius);border:0.5px solid var(--purple);background:transparent;color:var(--purple);cursor:pointer;font-family:inherit;transition:background .1s}
#id-btn:hover{background:var(--purple-bg)}
#id-btn:disabled{opacity:.45;cursor:not-allowed}

#disco-area{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:10px}
#disco-head{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between}
.badge{font-size:9px;font-weight:500;padding:2px 7px;border-radius:20px;background:var(--purple-bg);color:var(--purple-text)}
.clr-btn{font-size:9px;color:var(--text3);cursor:pointer;border:none;background:transparent;font-family:inherit}
.clr-btn:hover{color:var(--text)}
#disco-list{overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:3px}
#disco-list::-webkit-scrollbar{width:3px}
#disco-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.disco-item{padding:5px 8px;border-radius:7px;background:var(--bg2);font-size:11px;cursor:pointer;transition:background .1s;display:flex;align-items:center;justify-content:space-between;gap:6px}
.disco-item:hover{background:var(--bg3)}
.disco-name{color:var(--text);font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.disco-key{font-family:monospace;color:var(--text3);font-size:9px;flex-shrink:0}
@keyframes slideIn{from{transform:translateX(16px);opacity:0}to{transform:translateX(0);opacity:1}}
.new-disco{animation:slideIn .22s ease}

#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius);padding:6px 14px;font-size:11px;color:var(--text);opacity:0;pointer-events:none;transition:opacity .18s,transform .18s;z-index:999}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.spinner{display:inline-block;width:10px;height:10px;border:2px solid var(--border2);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
#drag-ghost{position:fixed;pointer-events:none;z-index:1000;display:none;border-radius:50%;align-items:center;justify-content:center;font-weight:600;font-size:12px;transform:translate(-50%,-50%);width:40px;height:40px}
</style>
</head>
<body>
<div id="app">

<div id="left">
  <h1>⚗️ Molecule Lab</h1>
  <input id="atom-search" placeholder="Search elements…" autocomplete="off"/>
  <div id="left-label">Drag onto canvas</div>
  <div id="atom-list"></div>
</div>

<div id="center">
  <div id="toolbar">
    <button class="tbtn active" id="tool-select" onclick="setTool('select')" title="Select &amp; drag (V)">Select</button>
    <button class="tbtn" id="tool-bond" onclick="setTool('bond')" title="Draw bonds (B)">Bond</button>
    <button class="tbtn" id="tool-erase" onclick="setTool('erase')" title="Erase (E)">Erase</button>
    <div class="tsep"></div>
    <select id="bond-sel" style="padding:3px 7px;font-size:11px;border-radius:7px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);font-family:inherit;cursor:pointer">
      <option value="1">Single —</option>
      <option value="2">Double =</option>
      <option value="3">Triple ≡</option>
    </select>
    <div class="tsep"></div>
    <button class="tbtn" onclick="clearCanvas()">Clear</button>
    <button class="tbtn" onclick="surpriseMe()">Surprise me</button>
    <div class="tsep"></div>
    <span style="font-size:10px;color:var(--text3)" id="kb-hint">V / B / E · Enter = identify</span>
  </div>
  <div id="canvas-wrap">
    <canvas id="mol-canvas"></canvas>
    <div id="formula-bar">—</div>
    <div id="hint-bar">Drag elements here · Bond mode: click atom → drag to another atom</div>
  </div>
</div>

<div id="right">
  <div id="result-area">
    <div class="sec-label">Result</div>
    <div id="result-box"><p class="res-empty">Build a molecule on the canvas, then click Identify.</p></div>
    <div id="fun-fact-box"></div>
    <button id="id-btn" onclick="identify()">Identify Molecule ✦</button>
  </div>
  <div id="disco-area">
    <div id="disco-head">
      Discoveries <span id="disco-count" class="badge">0</span>
      <button class="clr-btn" onclick="clearDiscos()">clear all</button>
    </div>
    <div id="disco-list"><p style="font-size:11px;color:var(--text3)">None yet!</p></div>
  </div>
</div>

</div>
<div id="drag-ghost"></div>
<div id="toast"></div>

const canvas=document.getElementById('mol-canvas');
const ctx=canvas.getContext('2d');
const wrap=document.getElementById('canvas-wrap');

let atoms=[];
let bonds=[];
let tool='select';
let bondStart=null;
let dragging=null;
let dragOff={x:0,y:0};
let nextId=0;
let discoveries=new Map();
const R=22;

// detect dark mode
const isDark=()=>window.matchMedia('(prefers-color-scheme:dark)').matches;

function resize(){
  const dpr=window.devicePixelRatio||1;
  const w=wrap.clientWidth,h=wrap.clientHeight;
  canvas.width=w*dpr;canvas.height=h*dpr;
  canvas.style.width=w+'px';canvas.style.height=h+'px';
  ctx.scale(dpr,dpr);
  draw();
}
window.addEventListener('resize',resize);
resize();

function setTool(t){
  tool=t;bondStart=null;
  document.querySelectorAll('.tbtn[id^="tool-"]').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('tool-'+t);
  if(el)el.classList.add('active');
  canvas.style.cursor=t==='select'?'default':t==='erase'?'crosshair':'crosshair';
  draw();
}

function getAtomAt(x,y){
  for(let i=atoms.length-1;i>=0;i--){
    if(Math.hypot(atoms[i].x-x,atoms[i].y-y)<R+3)return atoms[i];
  }
  return null;
}

function getBondIdx(x,y){
  for(let i=bonds.length-1;i>=0;i--){
    const b=bonds[i];
    const a1=atoms.find(a=>a.id===b.a),a2=atoms.find(a=>a.id===b.b);
    if(!a1||!a2)continue;
    const dx=a2.x-a1.x,dy=a2.y-a1.y,len=Math.hypot(dx,dy);
    if(len<1)continue;
    const t=((x-a1.x)*dx+(y-a1.y)*dy)/(len*len);
    if(t<0.1||t>0.9)continue;
    const px=a1.x+t*dx,py=a1.y+t*dy;
    if(Math.hypot(x-px,y-py)<9)return i;
  }
  return -1;
}

let mouseXY={x:0,y:0};

canvas.addEventListener('mousedown',e=>{
  e.preventDefault();
  const p=cpos(e);
  if(tool==='select'){
    const a=getAtomAt(p.x,p.y);
    if(a){dragging=a;dragOff={x:p.x-a.x,y:p.y-a.y};}
  } else if(tool==='bond'){
    const a=getAtomAt(p.x,p.y);
    if(a){bondStart=a;draw();}
  } else if(tool==='erase'){
    const a=getAtomAt(p.x,p.y);
    if(a){bonds=bonds.filter(b=>b.a!==a.id&&b.b!==a.id);atoms=atoms.filter(at=>at.id!==a.id);updateFormula();draw();}
    else{const bi=getBondIdx(p.x,p.y);if(bi>=0){bonds.splice(bi,1);draw();}}
  }
});

canvas.addEventListener('mousemove',e=>{
  const p=cpos(e);mouseXY=p;
  if(tool==='select'&&dragging){
    dragging.x=p.x-dragOff.x;dragging.y=p.y-dragOff.y;
    updateFormula();draw();
  } else if(tool==='bond'&&bondStart){
    draw();
    ctx.save();
    ctx.strokeStyle='rgba(127,119,221,0.45)';ctx.lineWidth=2;ctx.setLineDash([5,4]);
    ctx.beginPath();ctx.moveTo(bondStart.x,bondStart.y);ctx.lineTo(p.x,p.y);ctx.stroke();
    ctx.setLineDash([]);ctx.restore();
  }
});

canvas.addEventListener('mouseup',e=>{
  const p=cpos(e);
  if(tool==='select'){dragging=null;}
  else if(tool==='bond'&&bondStart){
    const a=getAtomAt(p.x,p.y);
    if(a&&a.id!==bondStart.id){
      const order=parseInt(document.getElementById('bond-sel').value)||1;
      const ex=bonds.find(b=>(b.a===bondStart.id&&b.b===a.id)||(b.a===a.id&&b.b===bondStart.id));
      if(ex)ex.order=order;
      else bonds.push({a:bondStart.id,b:a.id,order});
      updateFormula();
    }
    bondStart=null;draw();
  }
});

// double-click to cycle bond order
canvas.addEventListener('dblclick',e=>{
  const p=cpos(e);
  const bi=getBondIdx(p.x,p.y);
  if(bi>=0){bonds[bi].order=(bonds[bi].order%3)+1;draw();}
});

function cpos(e){
  const r=canvas.getBoundingClientRect();
  return {x:e.clientX-r.left,y:e.clientY-r.top};
}

function drawBond(a1,a2,order){
  const dx=a2.x-a1.x,dy=a2.y-a1.y,len=Math.hypot(dx,dy);
  if(len<1)return;
  const ux=dx/len,uy=dy/len,px=-uy,py=ux;
  const x1=a1.x+ux*(R+1),y1=a1.y+uy*(R+1);
  const x2=a2.x-ux*(R+1),y2=a2.y-uy*(R+1);
  const col=isDark()?'rgba(210,210,210,0.75)':'rgba(40,40,40,0.65)';
  const offsets=order===1?[0]:order===2?[-3.5,3.5]:[-5,0,5];
  ctx.save();ctx.strokeStyle=col;ctx.lineCap='round';ctx.lineWidth=2.2;ctx.setLineDash([]);
  offsets.forEach(off=>{
    ctx.beginPath();ctx.moveTo(x1+px*off,y1+py*off);ctx.lineTo(x2+px*off,y2+py*off);ctx.stroke();
  });
  ctx.restore();
}

function draw(){
  const w=wrap.clientWidth,h=wrap.clientHeight;
  ctx.clearRect(0,0,w,h);

  // grid dots (subtle)
  ctx.fillStyle=isDark()?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.04)';
  for(let gx=30;gx<w;gx+=40)for(let gy=30;gy<h;gy+=40){ctx.beginPath();ctx.arc(gx,gy,1,0,Math.PI*2);ctx.fill();}

  bonds.forEach(b=>{
    const a1=atoms.find(a=>a.id===b.a),a2=atoms.find(a=>a.id===b.b);
    if(a1&&a2)drawBond(a1,a2,b.order);
  });

  atoms.forEach(a=>{
    // glow for bond-start
    if(bondStart&&bondStart.id===a.id){
      ctx.save();ctx.beginPath();ctx.arc(a.x,a.y,R+6,0,Math.PI*2);
      ctx.fillStyle='rgba(127,119,221,0.18)';ctx.fill();ctx.restore();
    }
    ctx.save();
    ctx.beginPath();ctx.arc(a.x,a.y,R,0,Math.PI*2);
    ctx.fillStyle=a.col;ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle=a.tc;
    const fs=a.sym.length>2?10:a.sym.length===2?12:14;
    ctx.font=`600 ${fs}px -apple-system,sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(a.sym,a.x,a.y);
    ctx.restore();
  });
}

// ---- drag from palette ----
const ghost=document.getElementById('drag-ghost');
let draggingEl=null;

function renderAtoms(filter=''){
  const list=document.getElementById('atom-list');list.innerHTML='';
  const f=filter.toLowerCase();
  ELEMENTS.filter(a=>!f||a.name.toLowerCase().includes(f)||a.sym.toLowerCase().includes(f)).forEach(el=>{
    const btn=document.createElement('div');
    btn.className='atom-btn';btn.draggable=true;
    btn.innerHTML=`<span class="asym-sm" style="background:${el.col};color:${el.tc}">${el.sym}</span><div class="alabel"><div class="aname">${el.name}</div><div class="asub">Z=${el.num} · ${el.cat}</div></div>`;
    btn.addEventListener('dragstart',ev=>{
      draggingEl=el;ev.dataTransfer.effectAllowed='copy';
      const img=new Image();ev.dataTransfer.setDragImage(img,0,0);
      ghost.style.display='flex';ghost.style.background=el.col;ghost.style.color=el.tc;
      ghost.textContent=el.sym;
    });
    btn.addEventListener('dragend',()=>{ghost.style.display='none';draggingEl=null;});
    list.appendChild(btn);
  });
}

document.addEventListener('dragover',e=>{
  e.preventDefault();ghost.style.left=e.clientX+'px';ghost.style.top=e.clientY+'px';
});
canvas.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='copy';});
canvas.addEventListener('drop',e=>{
  e.preventDefault();if(!draggingEl)return;
  const p=cpos(e);
  atoms.push({id:nextId++,sym:draggingEl.sym,col:draggingEl.col,tc:draggingEl.tc,x:p.x,y:p.y});
  updateFormula();draw();ghost.style.display='none';
  document.getElementById('hint-bar').style.display='none';
});

function updateFormula(){
  const count={};
  atoms.forEach(a=>{count[a.sym]=(count[a.sym]||0)+1;});
  const keys=Object.keys(count).sort((a,b)=>{const o=k=>k==='C'?0:k==='H'?1:2;if(o(a)!==o(b))return o(a)-o(b);return a.localeCompare(b);});
  const f=keys.map(k=>k+(count[k]>1?count[k]:'')).join('');
  document.getElementById('formula-bar').textContent=f||'—';
}

function getFormula(){
  const count={};
  atoms.forEach(a=>{count[a.sym]=(count[a.sym]||0)+1;});
  const keys=Object.keys(count).sort((a,b)=>{const o=k=>k==='C'?0:k==='H'?1:2;if(o(a)!==o(b))return o(a)-o(b);return a.localeCompare(b);});
  return keys.map(k=>k+(count[k]>1?count[k]:'')).join('');
}

let aiLoading=false;
async function identify(){
  if(atoms.length===0){showToast('Add some atoms first!');return;}
  if(aiLoading)return;
  const key=getFormula();
  const local=DB[key];
  const panel=document.getElementById('result-box');
  const ff=document.getElementById('fun-fact-box');
  const btn=document.getElementById('id-btn');

  if(local){
    const isNew=!discoveries.has(key);
    if(isNew){discoveries.set(key,local.name);addDisco(key,local.name);}
    panel.innerHTML=renderResult(local,key,isNew,false);
    ff.style.display=local.fun?'block':'none';
    if(local.fun)ff.textContent='💡 '+local.fun;
    if(isNew)showToast('Discovered: '+local.name+'!');
    return;
  }

  // AI
  aiLoading=true;
  btn.innerHTML='<span class="spinner"></span> Asking AI…';btn.disabled=true;
  panel.innerHTML='<p class="res-empty"><span class="spinner"></span> Identifying…</p>';ff.style.display='none';

  const bondDesc=bonds.map(b=>{
    const a1=atoms.find(a=>a.id===b.a),a2=atoms.find(a=>a.id===b.b);
    if(!a1||!a2)return '';
    return `${a1.sym}-${a2.sym} ${['single','double','triple'][b.order-1]||'single'} bond`;
  }).filter(Boolean).join(', ');

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:`Identify this molecule: formula ${key}${bondDesc?', bonds: '+bondDesc:''}. Return ONLY raw JSON (no markdown, no backticks): {name, description (1-2 sentences), state (gas/liquid/solid), useful (bool), hazardous (bool), category (short string), funFact (one interesting sentence or null)}. If chemically impossible, name it "Not a real compound" and explain in description.`}]})
    });
    const data=await res.json();
    const text=(data.content||[]).filter(c=>c.type==='text').map(c=>c.text).join('');
    let p=null;try{p=JSON.parse(text.replace(/```json|```/g,'').trim());}catch(e){}
    if(p&&p.name){
      const isNew=!discoveries.has(key)&&p.name!=='Not a real compound';
      if(isNew){discoveries.set(key,p.name);addDisco(key,p.name);}
      panel.innerHTML=renderResult({...p,cat:p.category},key,isNew,true);
      if(p.funFact){ff.style.display='block';ff.textContent='💡 '+p.funFact;}else ff.style.display='none';
      if(isNew)showToast('Discovered: '+p.name+'!');
    } else {
      panel.innerHTML=`<p class="res-desc">${text||'Could not identify this formula.'}</p>`;
    }
  }catch(e){panel.innerHTML='<p class="res-empty">AI request failed.</p>';}
  btn.innerHTML='Identify Molecule ✦';btn.disabled=false;aiLoading=false;
}

function renderResult(r,key,isNew,isAI){
  return `<div class="res-anim">
    <div class="res-name">${r.name}${isNew?' <span class="badge" style="font-size:9px;vertical-align:middle">New!</span>':''}</div>
    <div class="res-key">${key} · ${r.state||'?'}</div>
    <div class="res-desc">${r.desc||r.description||''}</div>
    <div class="tags">
      ${r.state?`<span class="tag tag-${r.state}">${r.state}</span>`:''}
      ${r.useful?'<span class="tag tag-useful">useful</span>':''}
      ${r.hazardous?'<span class="tag tag-hazardous">hazardous</span>':''}
      ${r.cat?`<span class="tag tag-cat">${r.cat}</span>`:''}
      ${isAI?'<span class="tag tag-ai">AI</span>':''}
    </div>
  </div>`;
}

function addDisco(key,name){
  const list=document.getElementById('disco-list');
  const empty=list.querySelector('p');if(empty)list.innerHTML='';
  const item=document.createElement('div');item.className='disco-item new-disco';
  item.innerHTML=`<span class="disco-name">${name}</span><span class="disco-key">${key}</span>`;
  item.title=`${name} (${key})`;
  list.prepend(item);
  document.getElementById('disco-count').textContent=discoveries.size;
  setTimeout(()=>item.classList.remove('new-disco'),1500);
}

function addA(sym,x,y){
  const el=ELEMENTS.find(e=>e.sym===sym)||{sym,col:'#ccc',tc:'#333'};
  const a={id:nextId++,sym:el.sym,col:el.col,tc:el.tc,x,y};atoms.push(a);return a;
}

const EXAMPLES=[
  ()=>{const cx=wrap.clientWidth/2,cy=wrap.clientHeight/2;const O=addA('O',cx,cy);const H1=addA('H',cx-75,cy+55);const H2=addA('H',cx+75,cy+55);bonds.push({a:O.id,b:H1.id,order:1},{a:O.id,b:H2.id,order:1});},
  ()=>{const cx=wrap.clientWidth/2,cy=wrap.clientHeight/2;const C=addA('C',cx,cy);const O1=addA('O',cx-100,cy);const O2=addA('O',cx+100,cy);bonds.push({a:C.id,b:O1.id,order:2},{a:C.id,b:O2.id,order:2});},
  ()=>{const cx=wrap.clientWidth/2,cy=wrap.clientHeight/2;const N=addA('N',cx,cy);const H1=addA('H',cx-75,cy+65);const H2=addA('H',cx+75,cy+65);const H3=addA('H',cx,cy-85);bonds.push({a:N.id,b:H1.id,order:1},{a:N.id,b:H2.id,order:1},{a:N.id,b:H3.id,order:1});},
  ()=>{const cx=wrap.clientWidth/2,cy=wrap.clientHeight/2;const Na=addA('Na',cx-60,cy);const Cl=addA('Cl',cx+60,cy);bonds.push({a:Na.id,b:Cl.id,order:1});},
  ()=>{const cx=wrap.clientWidth/2,cy=wrap.clientHeight/2;const C=addA('C',cx,cy);const H1=addA('H',cx,cy-90);const H2=addA('H',cx+85,cy+45);const H3=addA('H',cx-85,cy+45);const H4=addA('H',cx,cy+90);bonds.push({a:C.id,b:H1.id,order:1},{a:C.id,b:H2.id,order:1},{a:C.id,b:H3.id,order:1},{a:C.id,b:H4.id,order:1});},
  ()=>{const cx=wrap.clientWidth/2,cy=wrap.clientHeight/2;const C1=addA('C',cx-50,cy);const C2=addA('C',cx+50,cy);const H1=addA('H',cx-50,cy-90);const H2=addA('H',cx+50,cy-90);bonds.push({a:C1.id,b:C2.id,order:2},{a:C1.id,b:H1.id,order:1},{a:C2.id,b:H2.id,order:1});},
  ()=>{const cx=wrap.clientWidth/2,cy=wrap.clientHeight/2;const C1=addA('C',cx-60,cy);const C2=addA('C',cx+60,cy);const H1=addA('H',cx-60,cy-90);const H2=addA('H',cx+60,cy-90);const H3=addA('H',cx-60,cy+90);const H4=addA('H',cx+60,cy+90);bonds.push({a:C1.id,b:C2.id,order:1},{a:C1.id,b:H1.id,order:1},{a:C1.id,b:H3.id,order:1},{a:C2.id,b:H2.id,order:1},{a:C2.id,b:H4.id,order:1});},
];

function surpriseMe(){
  clearCanvas(true);
  EXAMPLES[Math.floor(Math.random()*EXAMPLES.length)]();
  updateFormula();draw();
  setTimeout(()=>identify(),80);
}

function clearCanvas(silent){
  atoms=[];bonds=[];bondStart=null;dragging=null;
  document.getElementById('formula-bar').textContent='—';
  if(!silent){
    document.getElementById('result-box').innerHTML='<p class="res-empty">Build a molecule on the canvas, then click Identify.</p>';
    document.getElementById('fun-fact-box').style.display='none';
    document.getElementById('hint-bar').style.display='';
  }
  draw();
}

function clearDiscos(){discoveries.clear();document.getElementById('disco-count').textContent=0;document.getElementById('disco-list').innerHTML='<p style="font-size:11px;color:var(--text3)">None yet!</p>';}

document.getElementById('atom-search').oninput=e=>renderAtoms(e.target.value);
document.addEventListener('keydown',e=>{
  if(document.activeElement===document.getElementById('atom-search'))return;
  if(e.key==='v'||e.key==='V')setTool('select');
  if(e.key==='b'||e.key==='B')setTool('bond');
  if(e.key==='e'||e.key==='E')setTool('erase');
  if(e.key==='Enter')identify();
  if(e.key==='Escape'){bondStart=null;dragging=null;draw();}
});

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

renderAtoms();draw();
</script>
