.atom-btn:hover{background:var(--color-background-tertiary);border-color:var(--color-border-secondary);transform:translateX(2px)}
.atom-btn:active{cursor:grabbing;transform:scale(0.97)}
.atom-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0}
#canvas-area{flex:1;position:relative;overflow:hidden;background:var(--color-background-primary)}
#canvas-area svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}

.placed-atom{position:absolute;width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;cursor:grab;user-select:none;transition:box-shadow .15s,transform .15s;border:2px solid rgba(255,255,255,0.3);box-shadow:0 2px 8px rgba(0,0,0,0.15)}

.placed-atom.selected{box-shadow:0 0 0 3px var(--color-background-primary),0 0 0 5px #378ADD;z-index:200}
.placed-atom.merging{animation:pulse .3s ease-in-out 3;z-index:300}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.merge-flash{position:absolute;border-radius:50%;pointer-events:none;animation:flashOut .5s ease-out forwards;z-index:400}

#result-panel{position:absolute;bottom:0;left:0;right:0;background:var(--color-background-primary);border-top:0.5px solid var(--color-border-tertiary);padding:10px 14px;display:none;animation:slideUp .25s ease-out}

function colorWithOpacity(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function getTextColor(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (r*299+g*587+b*114)/1000 > 128 ? '#1a1a1a' : '#ffffff';
}

function buildAtomList() {
  const list = document.getElementById('atom-list');
  const groups = {};
  ATOMS.forEach(a => { if(!groups[a.group]) groups[a.group]=[]; groups[a.group].push(a); });
  Object.entries(groups).forEach(([g, atoms]) => {
    const lbl = document.createElement('div');
    lbl.className = 'atom-group-label';
    lbl.textContent = g.toUpperCase();
    list.appendChild(lbl);
    atoms.forEach(a => {
      const btn = document.createElement('div');
      btn.className = 'atom-btn';
      btn.innerHTML = `<div class="atom-dot" style="background:${a.color};color:${getTextColor(a.color)}">${a.sym}</div><span>${a.name}</span>`;
      btn.draggable = true;
      btn.addEventListener('mouseenter', e => showTooltip(e, `${a.name} (${a.sym})\nMass: ${a.mass} u\n${a.group}`));
      btn.addEventListener('mouseleave', hideTooltip);
      btn.addEventListener('dragstart', e => {
        e.dataTransfer.setData('atom', a.sym);
        dragState = {type:'new', sym:a.sym};
      });
      btn.addEventListener('click', () => spawnAtomAt(a.sym, 80+Math.random()*200, 80+Math.random()*200));
      list.appendChild(btn);
    });
  });
}

function getAtomData(sym) { return ATOMS.find(a=>a.sym===sym); }

function spawnAtomAt(sym, x, y, id) {
  const a = getAtomData(sym);
  if(!a) return null;
  const el = document.createElement('div');
  el.className = 'placed-atom';
  el.style.cssText = `left:${x-26}px;top:${y-26}px;background:${a.color};color:${getTextColor(a.color)}`;
  el.textContent = sym;
  el.dataset.sym = sym;
  const uid = id || (Date.now()+Math.random()).toString(36);
  el.dataset.id = uid;
  makeDraggable(el);
  el.addEventListener('click', e => { e.stopPropagation(); toggleSelect(uid); });
  el.addEventListener('mouseenter', e => showTooltip(e, `${a.name} (${a.sym})\nMass: ${a.mass} u`));
  el.addEventListener('mouseleave', hideTooltip);
  workspace.appendChild(el);
  const rec = {id:uid, sym, el, x, y};
  placedAtoms.push(rec);
  updateInstructions();
  return rec;
}

function makeDraggable(el) {
  let ox, oy, startX, startY, moving=false;
  el.addEventListener('mousedown', e => {
    if(e.button!==0) return;
    e.preventDefault(); e.stopPropagation();
    const r = workspace.getBoundingClientRect();
    const pr = el.getBoundingClientRect();
    ox = e.clientX - pr.left - (pr.width/2);
    oy = e.clientY - pr.top - (pr.height/2);
    startX = e.clientX; startY = e.clientY;
    moving = false;
    const move = me => {
      if(!moving && Math.hypot(me.clientX-startX,me.clientY-startY)>4) moving=true;
      if(!moving) return;
      hideTooltip();
      const nx = me.clientX - r.left - ox;
      const ny = me.clientY - r.top - oy;
      const rec = placedAtoms.find(a=>a.id===el.dataset.id);
      if(rec){ rec.x=nx+26; rec.y=ny+26; }
      el.style.left=(nx)+'px'; el.style.top=(ny)+'px';
      el.style.zIndex=200;
    };
    const up = ue => {
      document.removeEventListener('mousemove',move);
      document.removeEventListener('mouseup',up);
      el.style.zIndex='';
      if(moving) checkCollision(el.dataset.id);
    };
    document.addEventListener('mousemove',move);
    document.addEventListener('mouseup',up);
  });
}

function toggleSelect(id) {
  if(loadingCombine) return;
  const prev = selectedAtom;
  placedAtoms.forEach(a => a.el.classList.remove('selected'));
  if(prev && prev.id!==id) {
    const a1 = prev, a2 = placedAtoms.find(a=>a.id===id);
    if(a1 && a2 && a1.id!==a2.id) { selectedAtom=null; combineAtoms([a1.id,a2.id]); return; }
  }
  const rec = placedAtoms.find(a=>a.id===id);
  if(rec && (!prev || prev.id!==id)) { rec.el.classList.add('selected'); selectedAtom=rec; }
  else selectedAtom=null;
}

workspace.addEventListener('dragover', e => e.preventDefault());
workspace.addEventListener('drop', e => {
  e.preventDefault();
  const sym = e.dataTransfer.getData('atom');
  if(!sym) return;
  const r = workspace.getBoundingClientRect();
  spawnAtomAt(sym, e.clientX-r.left, e.clientY-r.top);
});

function checkCollision(id) {
  const me = placedAtoms.find(a=>a.id===id);
  if(!me) return;
  for(const other of placedAtoms) {
    if(other.id===id) continue;
    const dist = Math.hypot(me.x-other.x, me.y-other.y);
    if(dist < 52) { combineAtoms([id, other.id]); return; }
  }
}

function buildFormula(syms) {
  const counts = {};
  syms.forEach(s => counts[s]=(counts[s]||0)+1);
  const order = ['C','H','O','N','S','P','F','Cl','Br','I','Na','K','Ca','Mg','Fe','Cu','Zn','Al','Si','B','Li','Be','Ag','Au','Pb','Hg','He','Ne','Ar'];
  let formula = '';
  const used = new Set();
  order.forEach(e => { if(counts[e]){formula+=e+(counts[e]>1?counts[e]:'');used.add(e);} });
  Object.keys(counts).forEach(e => { if(!used.has(e)){formula+=e+(counts[e]>1?counts[e]:'');} });
  return formula;
}

async function combineAtoms(ids) {
  if(loadingCombine) return;
  const targets = ids.map(id=>placedAtoms.find(a=>a.id===id)).filter(Boolean);
  if(targets.length<2) return;
  loadingCombine = true;
  targets.forEach(t => t.el.classList.add('merging'));
  await sleep(350);
  const syms = targets.map(t=>t.sym);
  const formula = buildFormula(syms);
  let result = null;
  if(KNOWN[formula]) {
    result = {formula, ...KNOWN[formula], known:true};
  } else {
    result = await askClaude(syms, formula);
  }
  if(result) {
    const cx = targets.reduce((s,t)=>s+t.x,0)/targets.length;
    const cy = targets.reduce((s,t)=>s+t.y,0)/targets.length;
    showMergeFlash(cx, cy, result.color||'#6366F1');
    targets.forEach(t => { t.el.remove(); placedAtoms = placedAtoms.filter(a=>a.id!==t.id); });
    selectedAtom = null;
    showResult(result);
    if(!discoveries.has(formula)) {
      discoveries.add(formula);
      addDiscovery(result);
      scoreBadge.textContent = `${discoveries.size} discovered`;
    }
    spawnCompound(result, cx, cy);
  } else {
    targets.forEach(t => { t.el.classList.remove('merging'); });
    showResult({formula, name:'No reaction', desc:'These atoms don\'t typically combine this way. Try a different combination!', emoji:'🤷', color:'#9CA3AF', known:false});
  }
  loadingCombine = false;
  updateInstructions();
}

async function askClaude(syms, formula) {
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:`I combined these atoms: ${syms.join(' + ')} forming formula ${formula}. Is this a real chemical compound? If yes, reply ONLY with JSON: {"name":"compound name","desc":"1-2 sentence fun description","emoji":"single relevant emoji","color":"hex color representing the compound","valid":true}. If no real compound results, reply ONLY: {"valid":false}. No other text.`}]
      })
    });
    const d = await res.json();
    const txt = d.content?.find(c=>c.type==='text')?.text||'';
    const clean = txt.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);
    if(parsed.valid===false) return null;
    return {formula, ...parsed, known:false};
  } catch(e) { return null; }
}

function spawnCompound(result, x, y) {
  const el = document.createElement('div');
  el.className = 'compound-atom';
  const col = result.color||'#6366F1';
  el.style.cssText = `left:${x-60}px;top:${y-22}px;background:${col};color:${getTextColor(col)}`;
  el.innerHTML = `<span style="font-size:16px">${result.emoji||'⚗️'}</span><span>${result.formula}</span>`;
  el.dataset.id = (Date.now()+Math.random()).toString(36);
  el.dataset.sym = result.formula;
  el.dataset.isCompound = '1';
  el.title = result.name;
  el.addEventListener('mouseenter', e => showTooltip(e, `${result.name}\n${result.formula}`));
  el.addEventListener('mouseleave', hideTooltip);
  let ox2, oy2, moving2=false, sx, sy;
  el.addEventListener('mousedown', e => {
    if(e.button!==0)return;
    e.preventDefault(); e.stopPropagation();
    const r = workspace.getBoundingClientRect();
    const pr = el.getBoundingClientRect();
    ox2 = e.clientX - pr.left - pr.width/2;
    oy2 = e.clientY - pr.top - pr.height/2;
    sx=e.clientX; sy=e.clientY; moving2=false;
    const mv = me => {
      if(!moving2 && Math.hypot(me.clientX-sx,me.clientY-sy)>4) moving2=true;
      if(!moving2)return;
      hideTooltip();
      el.style.left=(me.clientX-r.left-ox2)+'px';
      el.style.top=(me.clientY-r.top-oy2)+'px';
    };
    const up = () => { document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); };
    document.addEventListener('mousemove',mv);
    document.addEventListener('mouseup',up);
  });
  el.addEventListener('dblclick', () => el.remove());
  workspace.appendChild(el);
}

function showMergeFlash(x, y, color) {
  const f = document.createElement('div');
  f.className = 'merge-flash';
  f.style.cssText = `left:${x-30}px;top:${y-30}px;width:60px;height:60px;background:${colorWithOpacity(color,.5)};border:2px solid ${color}`;
  workspace.appendChild(f);
  setTimeout(()=>f.remove(), 600);
}

function showResult(result) {
  const panel = resultPanel;
  const icon = document.getElementById('result-icon');
  const h4 = panel.querySelector('h4');
  const p = panel.querySelector('p');
  icon.textContent = result.emoji||'⚗️';
  icon.style.background = colorWithOpacity(result.color||'#6366F1', 0.15);
  h4.textContent = `${result.formula} — ${result.name}`;
  p.textContent = result.desc;
  panel.classList.add('visible');
  clearTimeout(panel._timer);
  panel._timer = setTimeout(()=>panel.classList.remove('visible'), 6000);
}

document.getElementById('close-result').addEventListener('click',()=>resultPanel.classList.remove('visible'));

function addDiscovery(result) {
  const el = document.createElement('div');
  el.className = 'discovery-item';
  el.innerHTML = `<div class="di-formula">${result.emoji||''} ${result.formula}</div><div class="di-name">${result.name}</div>`;
  const cnt = discoveriesEl.querySelector('.discovery-count');
  if(cnt) cnt.remove();
  discoveriesEl.insertBefore(el, discoveriesEl.firstChild);
}

function updateInstructions() {
  instructionsEl.style.display = placedAtoms.length===0 ? 'block':'none';
}

document.getElementById('btn-clear').addEventListener('click',()=>{
  workspace.querySelectorAll('.placed-atom,.compound-atom').forEach(e=>e.remove());
  placedAtoms=[];selectedAtom=null;
  resultPanel.classList.remove('visible');
  updateInstructions();
});

document.getElementById('btn-hint').addEventListener('click',()=>{
  const h = HINTS[hintIdx%HINTS.length];
  hintIdx++;
  showResult({formula:'Hint',name:'Try this!',desc:h,emoji:'💡',color:'#F59E0B'});
});

workspace.addEventListener('click', ()=>{ placedAtoms.forEach(a=>a.el.classList.remove('selected')); selectedAtom=null; });

function showTooltip(e, text) {
  tooltip.innerHTML = text.replace(/\n/g,'<br>');
  tooltip.style.opacity='1';
  posTooltip(e);
}
function hideTooltip(){ tooltip.style.opacity='0'; }
function posTooltip(e){ tooltip.style.left=(e.clientX+14)+'px'; tooltip.style.top=(e.clientY-8)+'px'; }
document.addEventListener('mousemove', e=>{ if(tooltip.style.opacity==='1') posTooltip(e); });

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

buildAtomList();
updateInstructions();
</script>
