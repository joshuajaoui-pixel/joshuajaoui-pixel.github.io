<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Molecule Lab</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff;--bg2:#f5f5f3;--bg3:#eaeae7;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#a8a8a0;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.2);
  --purple:#7F77DD;--purple-bg:#EEEDFE;--purple-text:#3C3489;
  --blue:#378ADD;--blue-bg:#E6F1FB;--blue-text:#0C447C;
  --green:#639922;--green-bg:#EAF3DE;--green-text:#27500A;
  --red:#E24B4A;--red-bg:#FCEBEB;--red-text:#791F1F;
  --amber:#BA7517;--amber-bg:#FAEEDA;--amber-text:#412402;
  --teal:#1D9E75;--teal-bg:#E1F5EE;--teal-text:#085041;
  --r:11px;--safe-bottom:env(safe-area-inset-bottom,0px);
  --palette-h:220px;--toolbar-h:52px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#272725;--bg3:#323230;
  --text:#f0efe8;--text2:#a0a098;--text3:#6a6a62;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.18);
  --purple-bg:#1e1b3a;--purple-text:#AFA9EC;
  --blue-bg:#0c2d4a;--blue-text:#85B7EB;
  --green-bg:#162209;--green-text:#97C459;
  --red-bg:#2a0f0f;--red-text:#F09595;
  --amber-bg:#281a05;--amber-text:#FAC775;
  --teal-bg:#082b1e;--teal-text:#5DCAA5;
}}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);touch-action:none;user-select:none;-webkit-user-select:none}

/* ── DESKTOP LAYOUT ── */
#app{display:grid;grid-template-columns:190px 1fr 260px;grid-template-rows:100vh;height:100vh}
#left-panel{grid-column:1;display:flex;flex-direction:column;border-right:0.5px solid var(--border);overflow:hidden}
#center-panel{grid-column:2;display:flex;flex-direction:column;overflow:hidden;position:relative}
#right-panel{grid-column:3;display:flex;flex-direction:column;border-left:0.5px solid var(--border);overflow:hidden}

/* ── LEFT: element palette ── */
.panel-head{padding:12px 12px 8px;flex-shrink:0}
.panel-head h1{font-size:15px;font-weight:500;margin-bottom:8px}
.search-inp{width:100%;padding:7px 10px;font-size:13px;border-radius:var(--r);border:0.5px solid var(--border);background:var(--bg2);color:var(--text);outline:none}
.search-inp:focus{border-color:var(--border2)}
.section-label{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:4px 12px 4px;flex-shrink:0}
#atom-list{overflow-y:auto;flex:1;padding:2px 6px 8px}
#atom-list::-webkit-scrollbar{width:3px}
#atom-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.atom-btn{display:flex;align-items:center;gap:8px;padding:7px 7px;border-radius:9px;border:none;background:transparent;cursor:pointer;width:100%;text-align:left;color:var(--text);transition:background .1s}
.atom-btn:hover,.atom-btn:active{background:var(--bg2)}
.asym{font-size:12px;font-weight:700;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:7px;flex-shrink:0;letter-spacing:-.02em}
.alabel .aname{font-size:12px;font-weight:500}
.alabel .asub{font-size:10px;color:var(--text3)}

/* ── CENTER: toolbar + canvas ── */
#toolbar{display:flex;align-items:center;gap:5px;padding:7px 10px;border-bottom:0.5px solid var(--border);flex-shrink:0;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
#toolbar::-webkit-scrollbar{display:none}
.tbtn{padding:6px 12px;font-size:12px;border-radius:8px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .1s;font-family:inherit;white-space:nowrap;flex-shrink:0;min-height:34px}
.tbtn:active{transform:scale(.95)}
.tbtn.active{background:var(--purple-bg);color:var(--purple-text);border-color:transparent}
.tsep{width:0.5px;height:18px;background:var(--border2);flex-shrink:0}
#bond-sel{padding:5px 8px;font-size:12px;border-radius:8px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);font-family:inherit;cursor:pointer;flex-shrink:0;min-height:34px}
#canvas-wrap{flex:1;position:relative;overflow:hidden}
#mol-canvas{display:block;width:100%;height:100%;touch-action:none}
#formula-bar{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:14px;font-weight:600;color:var(--text);background:var(--bg);padding:5px 16px;border-radius:20px;border:0.5px solid var(--border);pointer-events:none;min-width:44px;text-align:center;letter-spacing:.01em;white-space:nowrap}
#hint-bar{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--text3);background:var(--bg2);padding:5px 14px;border-radius:20px;border:0.5px solid var(--border);pointer-events:none;white-space:nowrap;transition:opacity .3s}

/* ── RIGHT: results + discoveries ── */
#result-area{padding:14px;border-bottom:0.5px solid var(--border);flex-shrink:0}
.sec-lbl{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
#result-box{min-height:72px}
.res-empty{font-size:12px;color:var(--text3);line-height:1.65}
@keyframes popIn{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
.res-anim{animation:popIn .22s cubic-bezier(.34,1.56,.64,1)}
.res-name{font-size:18px;font-weight:500;line-height:1.2;margin-bottom:3px}
.res-key{font-size:10px;color:var(--text3);font-family:monospace;margin-bottom:6px}
.res-desc{font-size:12px;color:var(--text2);line-height:1.65;margin-bottom:8px}
.tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500}
.tag-gas{background:var(--blue-bg);color:var(--blue-text)}
.tag-liquid{background:var(--teal-bg);color:var(--teal-text)}
.tag-solid{background:var(--bg3);color:var(--text2)}
.tag-useful{background:var(--green-bg);color:var(--green-text)}
.tag-hazardous{background:var(--red-bg);color:var(--red-text)}
.tag-cat{background:var(--purple-bg);color:var(--purple-text)}
.tag-ai{background:var(--amber-bg);color:var(--amber-text)}
#fun-box{font-size:11px;color:var(--amber-text);background:var(--amber-bg);border-radius:8px;padding:8px 10px;margin-top:8px;line-height:1.55;display:none}
#id-btn{width:100%;margin-top:10px;padding:9px;font-size:13px;font-weight:500;border-radius:var(--r);border:0.5px solid var(--purple);background:transparent;color:var(--purple);cursor:pointer;font-family:inherit;transition:background .1s;min-height:40px}
#id-btn:active{background:var(--purple-bg)}
#id-btn:disabled{opacity:.45}
#disco-area{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:12px}
#disco-head{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.badge{font-size:9px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--purple-bg);color:var(--purple-text)}
.clr-btn{font-size:10px;color:var(--text3);cursor:pointer;border:none;background:transparent;font-family:inherit;padding:2px 6px}
#disco-list{overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:4px}
.disco-item{padding:7px 9px;border-radius:9px;background:var(--bg2);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;transition:background .1s}
.disco-item:active{background:var(--bg3)}
.disco-name{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.disco-key{font-family:monospace;color:var(--text3);font-size:10px;flex-shrink:0}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
.new-disco{animation:slideIn .25s ease}

/* ── TOAST ── */
#toast{position:fixed;bottom:calc(20px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(16px);background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--r);padding:8px 18px;font-size:13px;color:var(--text);opacity:0;pointer-events:none;transition:opacity .18s,transform .18s;z-index:9999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.spinner{display:inline-block;width:11px;height:11px;border:2px solid var(--border2);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══════════════════════════════════════
   MOBILE LAYOUT  (≤ 700px)
══════════════════════════════════════ */
@media(max-width:700px){
  #app{display:flex;flex-direction:column;height:100dvh;height:100vh}
  #left-panel{display:none} /* hidden – replaced by bottom sheet */
  #right-panel{display:none} /* hidden – replaced by result drawer */
  #center-panel{flex:1;min-height:0;display:flex;flex-direction:column;position:relative}
  #canvas-wrap{flex:1;min-height:0}

  /* mobile toolbar */
  #toolbar{padding:6px 8px;gap:4px}
  .tbtn{padding:6px 10px;font-size:12px;min-height:36px}
  #bond-sel{font-size:12px;padding:5px 6px;min-height:36px}

  /* ── bottom result bar (tappable pill) ── */
  #mobile-result-bar{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 14px;border-top:0.5px solid var(--border);
    background:var(--bg);flex-shrink:0;gap:10px;
    padding-bottom:calc(10px + var(--safe-bottom));
  }
  #mobile-formula{font-size:16px;font-weight:600;color:var(--text);min-width:44px}
  #mobile-id-btn{padding:8px 16px;font-size:13px;font-weight:500;border-radius:20px;border:0.5px solid var(--purple);background:transparent;color:var(--purple);cursor:pointer;font-family:inherit;white-space:nowrap;min-height:38px}
  #mobile-id-btn:active{background:var(--purple-bg)}
  #mobile-id-btn:disabled{opacity:.45}

  /* ── bottom sheet: element palette ── */
  #palette-sheet{
    position:fixed;bottom:0;left:0;right:0;
    background:var(--bg);
    border-top:0.5px solid var(--border);
    border-radius:18px 18px 0 0;
    z-index:200;
    transform:translateY(calc(100% - 56px));
    transition:transform .32s cubic-bezier(.4,0,.2,1);
    max-height:75dvh;max-height:75vh;
    display:flex;flex-direction:column;
    padding-bottom:var(--safe-bottom);
  }
  #palette-sheet.open{transform:translateY(0)}
  #sheet-handle-row{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 16px 8px;flex-shrink:0;cursor:pointer
  }
  #sheet-handle{width:36px;height:4px;background:var(--bg3);border-radius:2px;margin:0 auto}
  #sheet-handle-row span{font-size:13px;font-weight:500;color:var(--text)}
  #sheet-search-wrap{padding:0 12px 8px;flex-shrink:0}
  #sheet-search{width:100%;padding:9px 12px;font-size:14px;border-radius:var(--r);border:0.5px solid var(--border);background:var(--bg2);color:var(--text);outline:none}
  #sheet-search:focus{border-color:var(--border2)}
  #sheet-atom-list{overflow-y:auto;flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:0 10px 12px;-webkit-overflow-scrolling:touch}
  .sheet-atom-btn{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:3px;padding:10px 4px;border-radius:10px;border:none;
    background:var(--bg2);cursor:pointer;transition:background .12s;
    font-family:inherit;color:var(--text)
  }
  .sheet-atom-btn:active{background:var(--bg3);transform:scale(.95)}
  .sheet-asym{font-size:15px;font-weight:700;width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:9px}
  .sheet-aname{font-size:9px;color:var(--text3);text-align:center;line-height:1.2}

  /* ── result drawer ── */
  #result-drawer{
    position:fixed;bottom:0;left:0;right:0;
    background:var(--bg);border-top:0.5px solid var(--border);
    border-radius:18px 18px 0 0;
    z-index:300;
    transform:translateY(100%);
    transition:transform .32s cubic-bezier(.4,0,.2,1);
    max-height:80dvh;max-height:80vh;
    display:flex;flex-direction:column;
    padding-bottom:var(--safe-bottom);
  }
  #result-drawer.open{transform:translateY(0)}
  #drawer-handle-row{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 16px 8px;cursor:pointer;flex-shrink:0
  }
  #drawer-close{font-size:20px;color:var(--text3);background:none;border:none;cursor:pointer;padding:0 4px;color:var(--text2)}
  #drawer-body{overflow-y:auto;padding:0 16px 16px;flex:1;-webkit-overflow-scrolling:touch}

  /* hide desktop-only elements */
  #hint-bar{display:none}
  #formula-bar{font-size:13px;top:8px}
}
/* hide mobile elements on desktop */
#mobile-result-bar,#palette-sheet,#result-drawer{display:none}
@media(max-width:700px){
  #mobile-result-bar{display:flex}
  #palette-sheet,#result-drawer{display:flex}
  #result-area,#disco-area{/* keep in DOM, used by drawer */}
}
</style>
</head>
<body>
<div id="app">

  <!-- ══ LEFT: desktop element palette ══ -->
  <div id="left-panel">
    <div class="panel-head">
      <h1>⚗️ Molecule Lab</h1>
      <input class="search-inp" id="atom-search" placeholder="Search elements…" autocomplete="off"/>
    </div>
    <div class="section-label">Drag onto canvas</div>
    <div id="atom-list"></div>
  </div>

  <!-- ══ CENTER: canvas ══ -->
  <div id="center-panel">
    <div id="toolbar">
      <button class="tbtn active" id="tool-select" onclick="setTool('select')">Select</button>
      <button class="tbtn" id="tool-bond" onclick="setTool('bond')">Bond</button>
      <button class="tbtn" id="tool-erase" onclick="setTool('erase')">Erase</button>
      <div class="tsep"></div>
      <select id="bond-sel">
        <option value="1">Single —</option>
        <option value="2">Double =</option>
        <option value="3">Triple ≡</option>
      </select>
      <div class="tsep"></div>
      <button class="tbtn" onclick="clearCanvas()">Clear</button>
      <button class="tbtn" onclick="surpriseMe()">Surprise me</button>
    </div>
    <div id="canvas-wrap">
      <canvas id="mol-canvas"></canvas>
      <div id="formula-bar">—</div>
      <div id="hint-bar">Drag elements here · Bond mode: tap atom → tap another</div>
    </div>
    <!-- mobile bottom bar -->
    <div id="mobile-result-bar">
      <span id="mobile-formula">—</span>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="tbtn" onclick="openPaletteSheet()" style="font-size:13px;padding:7px 12px">+ Elements</button>
        <button id="mobile-id-btn" onclick="identify()">Identify ✦</button>
      </div>
    </div>
  </div>

  <!-- ══ RIGHT: desktop results + discoveries ══ -->
  <div id="right-panel">
    <div id="result-area">
      <div class="sec-lbl">Result</div>
      <div id="result-box"><p class="res-empty">Build a molecule, then click Identify.</p></div>
      <div id="fun-box"></div>
      <button id="id-btn" onclick="identify()">Identify Molecule ✦</button>
    </div>
    <div id="disco-area">
      <div id="disco-head">
        Discoveries <span id="disco-count" class="badge">0</span>
        <button class="clr-btn" onclick="clearDiscos()">clear</button>
      </div>
      <div id="disco-list"><p style="font-size:11px;color:var(--text3)">None yet!</p></div>
    </div>
  </div>
</div>

<!-- ══ MOBILE: element palette bottom sheet ══ -->
<div id="palette-sheet">
  <div id="sheet-handle-row" onclick="toggleSheet()">
    <span>Elements</span>
    <div id="sheet-handle"></div>
    <span id="sheet-mode-lbl" style="font-size:12px;color:var(--text3)">tap to add</span>
  </div>
  <div id="sheet-search-wrap">
    <input class="search-inp" id="sheet-search" placeholder="Search elements…" autocomplete="off"/>
  </div>
  <div id="sheet-atom-list"></div>
</div>

<!-- ══ MOBILE: result drawer ══ -->
<div id="result-drawer">
  <div id="drawer-handle-row">
    <span style="font-size:14px;font-weight:500" id="drawer-title">Result</span>
    <button id="drawer-close" onclick="closeDrawer()">×</button>
  </div>
  <div id="drawer-body">
    <div id="drawer-result-box"></div>
    <div id="drawer-fun-box" style="font-size:11px;color:var(--amber-text);background:var(--amber-bg);border-radius:8px;padding:8px 10px;margin-top:10px;line-height:1.55;display:none"></div>
    <div id="drawer-disco" style="margin-top:16px">
      <div style="font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between">
        Discoveries <span id="drawer-disco-count" class="badge">0</span>
      </div>
      <div id="drawer-disco-list"><p style="font-size:12px;color:var(--text3)">None yet!</p></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const ELEMENTS=[
  {sym:'H',name:'Hydrogen',num:1,cat:'nonmetal',col:'#B5D4F4',tc:'#042C53'},
  {sym:'He',name:'Helium',num:2,cat:'noble gas',col:'#9FE1CB',tc:'#04342C'},
  {sym:'Li',name:'Lithium',num:3,cat:'alkali',col:'#FAC775',tc:'#412402'},
  {sym:'Be',name:'Beryllium',num:4,cat:'alk. earth',col:'#C0DD97',tc:'#173404'},
  {sym:'B',name:'Boron',num:5,cat:'metalloid',col:'#D3D1C7',tc:'#2C2C2A'},
  {sym:'C',name:'Carbon',num:6,cat:'nonmetal',col:'#444441',tc:'#F1EFE8'},
  {sym:'N',name:'Nitrogen',num:7,cat:'nonmetal',col:'#85B7EB',tc:'#042C53'},
  {sym:'O',name:'Oxygen',num:8,cat:'nonmetal',col:'#F7C1C1',tc:'#501313'},
  {sym:'F',name:'Fluorine',num:9,cat:'halogen',col:'#F0997B',tc:'#4A1B0C'},
  {sym:'Ne',name:'Neon',num:10,cat:'noble gas',col:'#9FE1CB',tc:'#04342C'},
  {sym:'Na',name:'Sodium',num:11,cat:'alkali',col:'#FAC775',tc:'#412402'},
  {sym:'Mg',name:'Magnesium',num:12,cat:'alk. earth',col:'#C0DD97',tc:'#173404'},
  {sym:'Al',name:'Aluminium',num:13,cat:'post-trans.',col:'#B4B2A9',tc:'#2C2C2A'},
  {sym:'Si',name:'Silicon',num:14,cat:'metalloid',col:'#D3D1C7',tc:'#2C2C2A'},
  {sym:'P',name:'Phosphorus',num:15,cat:'nonmetal',col:'#FAC775',tc:'#412402'},
  {sym:'S',name:'Sulphur',num:16,cat:'nonmetal',col:'#EF9F27',tc:'#412402'},
  {sym:'Cl',name:'Chlorine',num:17,cat:'halogen',col:'#F0997B',tc:'#4A1B0C'},
  {sym:'Ar',name:'Argon',num:18,cat:'noble gas',col:'#9FE1CB',tc:'#04342C'},
  {sym:'K',name:'Potassium',num:19,cat:'alkali',col:'#FAC775',tc:'#412402'},
  {sym:'Ca',name:'Calcium',num:20,cat:'alk. earth',col:'#C0DD97',tc:'#173404'},
  {sym:'Mn',name:'Manganese',num:25,cat:'transition',col:'#AFA9EC',tc:'#26215C'},
  {sym:'Fe',name:'Iron',num:26,cat:'transition',col:'#AFA9EC',tc:'#26215C'},
  {sym:'Cu',name:'Copper',num:29,cat:'transition',col:'#F5C4B3',tc:'#4A1B0C'},
  {sym:'Zn',name:'Zinc',num:30,cat:'transition',col:'#AFA9EC',tc:'#26215C'},
  {sym:'Ag',name:'Silver',num:47,cat:'transition',col:'#D3D1C7',tc:'#2C2C2A'},
  {sym:'I',name:'Iodine',num:53,cat:'halogen',col:'#CECBF6',tc:'#26215C'},
  {sym:'Ba',name:'Barium',num:56,cat:'alk. earth',col:'#C0DD97',tc:'#173404'},
  {sym:'Au',name:'Gold',num:79,cat:'transition',col:'#FAC775',tc:'#412402'},
  {sym:'Hg',name:'Mercury',num:80,cat:'transition',col:'#AFA9EC',tc:'#26215C'},
  {sym:'Pb',name:'Lead',num:82,cat:'post-trans.',col:'#888780',tc:'#F1EFE8'},
  {sym:'U',name:'Uranium',num:92,cat:'actinide',col:'#97C459',tc:'#173404'},
];

const DB={
  'H2O':{name:'Water',desc:'The most essential molecule for life — a polar solvent covering 71% of Earth and ~60% of your body.',state:'liquid',useful:true,cat:'essential',fun:'Water is the only natural substance that occurs in all three states at temperatures found naturally on Earth.'},
  'CO2':{name:'Carbon Dioxide',desc:'A greenhouse gas produced by respiration and combustion. Plants absorb it during photosynthesis.',state:'gas',cat:'atmospheric',fun:'CO₂ makes up just 0.04% of the atmosphere yet drives significant climate change.'},

// ── canvas setup ──
const canvas=document.getElementById('mol-canvas');
const ctx=canvas.getContext('2d');
const wrap=document.getElementById('canvas-wrap');
let atoms=[],bonds=[],tool='select',bondStart=null,dragging=null,dragOff={x:0,y:0},nextId=0;
let discoveries=new Map();
const R=isMobile()?26:22; // bigger atoms on mobile for fat fingers

function isMobile(){return window.innerWidth<=700;}
const isDark=()=>window.matchMedia('(prefers-color-scheme:dark)').matches;

function resize(){
  const dpr=window.devicePixelRatio||1;
  const w=wrap.clientWidth,h=wrap.clientHeight;
  canvas.width=w*dpr;canvas.height=h*dpr;
  canvas.style.width=w+'px';canvas.style.height=h+'px';
  ctx.scale(dpr,dpr);
  draw();
}
window.addEventListener('resize',()=>{setTimeout(resize,50);});
resize();

// ── tool management ──
function setTool(t){
  tool=t;bondStart=null;
  document.querySelectorAll('.tbtn[id^="tool-"]').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('tool-'+t);
  if(el)el.classList.add('active');
  canvas.style.cursor=t==='select'?'default':'crosshair';
  // update mobile sheet label
  const lbl=document.getElementById('sheet-mode-lbl');
  if(lbl)lbl.textContent=t==='select'?'tap to place':t==='bond'?'select atom first':t==='erase'?'tap to remove':'tap to place';
  draw();
}

// ── hit testing ──
function getAtomAt(x,y,radius){
  const r=radius||(isMobile()?R+8:R+3);
  for(let i=atoms.length-1;i>=0;i--){
    if(Math.hypot(atoms[i].x-x,atoms[i].y-y)<r)return atoms[i];
  }
  return null;
}

function getBondIdx(x,y){
  for(let i=bonds.length-1;i>=0;i--){
    const b=bonds[i];
    const a1=atoms.find(a=>a.id===b.a),a2=atoms.find(a=>a.id===b.b);
    if(!a1||!a2)continue;
    const dx=a2.x-a1.x,dy=a2.y-a1.y,len=Math.hypot(dx,dy);
    if(len<1)continue;
    const t=((x-a1.x)*dx+(y-a1.y)*dy)/(len*len);
    if(t<0.1||t>0.9)continue;
    const px=a1.x+t*dx,py=a1.y+t*dy;
    if(Math.hypot(x-px,y-py)<(isMobile()?14:9))return i;
  }
  return -1;
}

// ── pointer helpers (unified mouse + touch) ──
function evPos(e){
  const r=canvas.getBoundingClientRect();
  if(e.touches&&e.touches.length>0){
    return {x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top};
  }
  if(e.changedTouches&&e.changedTouches.length>0){
    return {x:e.changedTouches[0].clientX-r.left,y:e.changedTouches[0].clientY-r.top};
  }
  return {x:e.clientX-r.left,y:e.clientY-r.top};
}

let touchMoved=false;
let touchStartPos=null;

function onPointerDown(e){
  e.preventDefault();
  touchMoved=false;
  const p=evPos(e);
  touchStartPos=p;
  if(tool==='select'){
    const a=getAtomAt(p.x,p.y);
    if(a){dragging=a;dragOff={x:p.x-a.x,y:p.y-a.y};}
  } else if(tool==='bond'){
    const a=getAtomAt(p.x,p.y);
    if(a){bondStart=a;draw();}
  }
}

function onPointerMove(e){
  e.preventDefault();
  const p=evPos(e);
  if(touchStartPos&&Math.hypot(p.x-touchStartPos.x,p.y-touchStartPos.y)>6)touchMoved=true;
  if(tool==='select'&&dragging){
    dragging.x=p.x-dragOff.x;dragging.y=p.y-dragOff.y;
    updateFormula();draw();
  } else if(tool==='bond'&&bondStart){
    draw();
    ctx.save();ctx.strokeStyle='rgba(127,119,221,0.45)';ctx.lineWidth=2;ctx.setLineDash([5,4]);
    ctx.beginPath();ctx.moveTo(bondStart.x,bondStart.y);ctx.lineTo(p.x,p.y);ctx.stroke();
    ctx.setLineDash([]);ctx.restore();
  }
}

function onPointerUp(e){
  e.preventDefault();
  const p=evPos(e);
  if(tool==='select'){
    if(!touchMoved&&!dragging){
      // tap on empty canvas — do nothing (atoms added via palette)
    }
    dragging=null;
  } else if(tool==='bond'&&bondStart){
    const a=getAtomAt(p.x,p.y);
    if(a&&a.id!==bondStart.id){
      const order=parseInt(document.getElementById('bond-sel').value)||1;
      const ex=bonds.find(b=>(b.a===bondStart.id&&b.b===a.id)||(b.a===a.id&&b.b===bondStart.id));
      if(ex)ex.order=order;else bonds.push({a:bondStart.id,b:a.id,order});
      updateFormula();showToast('Bond drawn!');
    } else if(!touchMoved){
      showToast('Tap another atom to bond');
    }
    bondStart=null;draw();
  } else if(tool==='erase'&&!touchMoved){
    const a=getAtomAt(p.x,p.y);
    if(a){bonds=bonds.filter(b=>b.a!==a.id&&b.b!==a.id);atoms=atoms.filter(at=>at.id!==a.id);updateFormula();draw();}
    else{const bi=getBondIdx(p.x,p.y);if(bi>=0){bonds.splice(bi,1);draw();}}
  }
}

// bind pointer events
canvas.addEventListener('mousedown',onPointerDown,{passive:false});
canvas.addEventListener('mousemove',onPointerMove,{passive:false});
canvas.addEventListener('mouseup',onPointerUp,{passive:false});
canvas.addEventListener('touchstart',onPointerDown,{passive:false});
canvas.addEventListener('touchmove',onPointerMove,{passive:false});
canvas.addEventListener('touchend',onPointerUp,{passive:false});

// double-tap / double-click to cycle bond order
let lastTap=0;
canvas.addEventListener('touchend',e=>{
  const now=Date.now();
  if(now-lastTap<300){
    const p=evPos(e);
    const bi=getBondIdx(p.x,p.y);
    if(bi>=0){bonds[bi].order=(bonds[bi].order%3)+1;draw();showToast(['Single','Double','Triple'][bonds[bi].order-1]+' bond');}
  }
  lastTap=now;
},{passive:false});
canvas.addEventListener('dblclick',e=>{
  const p=evPos(e);
  const bi=getBondIdx(p.x,p.y);
  if(bi>=0){bonds[bi].order=(bonds[bi].order%3)+1;draw();}
});

// ── draw ──
function drawBond(a1,a2,order){
  const dx=a2.x-a1.x,dy=a2.y-a1.y,len=Math.hypot(dx,dy);
  if(len<1)return;
  const ux=dx/len,uy=dy/len,px=-uy,py=ux;
  const x1=a1.x+ux*(R+1),y1=a1.y+uy*(R+1);
  const x2=a2.x-ux*(R+1),y2=a2.y-uy*(R+1);
  const col=isDark()?'rgba(210,210,200,0.7)':'rgba(40,40,40,0.6)';
  const gap=isMobile()?4.5:3.5;
  const offsets=order===1?[0]:order===2?[-gap,gap]:[-gap*1.5,0,gap*1.5];
  ctx.save();ctx.strokeStyle=col;ctx.lineCap='round';ctx.lineWidth=isMobile()?2.8:2.2;ctx.setLineDash([]);
  offsets.forEach(off=>{
    ctx.beginPath();ctx.moveTo(x1+px*off,y1+py*off);ctx.lineTo(x2+px*off,y2+py*off);ctx.stroke();
  });
  ctx.restore();
}

function draw(){
  const w=wrap.clientWidth,h=wrap.clientHeight;
  ctx.clearRect(0,0,w,h);
  // subtle dot grid
  ctx.fillStyle=isDark()?'rgba(255,255,255,0.035)':'rgba(0,0,0,0.04)';
  const gs=isMobile()?36:40;
  for(let gx=gs/2;gx<w;gx+=gs)for(let gy=gs/2;gy<h;gy+=gs){ctx.beginPath();ctx.arc(gx,gy,1,0,Math.PI*2);ctx.fill();}
  bonds.forEach(b=>{const a1=atoms.find(a=>a.id===b.a),a2=atoms.find(a=>a.id===b.b);if(a1&&a2)drawBond(a1,a2,b.order);});
  atoms.forEach(a=>{
    if(bondStart&&bondStart.id===a.id){
      ctx.save();ctx.beginPath();ctx.arc(a.x,a.y,R+7,0,Math.PI*2);ctx.fillStyle='rgba(127,119,221,0.2)';ctx.fill();ctx.restore();
    }
    ctx.save();
    ctx.beginPath();ctx.arc(a.x,a.y,R,0,Math.PI*2);ctx.fillStyle=a.col;ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.12)';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle=a.tc;
    const fs=a.sym.length>2?isMobile()?11:10:a.sym.length===2?isMobile()?13:12:isMobile()?15:14;
    ctx.font=`700 ${fs}px -apple-system,sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(a.sym,a.x,a.y);
    ctx.restore();
  });
}

// ── desktop drag ──
let draggingEl=null;
const ghost=document.createElement('div');
ghost.style.cssText='position:fixed;pointer-events:none;z-index:1000;display:none;border-radius:50%;align-items:center;justify-content:center;font-weight:700;font-size:13px;transform:translate(-50%,-50%);width:44px;height:44px';
document.body.appendChild(ghost);

function renderAtomList(containerEl,filter,isGrid){
  containerEl.innerHTML='';
  const f=(filter||'').toLowerCase();
  ELEMENTS.filter(a=>!f||a.name.toLowerCase().includes(f)||a.sym.toLowerCase().includes(f)).forEach(el=>{
    const btn=document.createElement('div');
    if(isGrid){
      btn.className='sheet-atom-btn';
      btn.innerHTML=`<span class="sheet-asym" style="background:${el.col};color:${el.tc}">${el.sym}</span><span class="sheet-aname">${el.name}</span>`;
      btn.addEventListener('click',()=>{
        addAtomToCanvas(el);
        // close sheet after adding
        closePaletteSheet();
      });
      btn.addEventListener('touchstart',()=>{},{ passive:true });
    } else {
      btn.className='atom-btn';
      btn.draggable=true;
      btn.innerHTML=`<span class="asym" style="background:${el.col};color:${el.tc}">${el.sym}</span><div class="alabel"><div class="aname">${el.name}</div><div class="asub">Z=${el.num} · ${el.cat}</div></div>`;
      btn.addEventListener('dragstart',ev=>{
        draggingEl=el;ev.dataTransfer.effectAllowed='copy';
        const img=new Image();ev.dataTransfer.setDragImage(img,0,0);
        ghost.style.display='flex';ghost.style.background=el.col;ghost.style.color=el.tc;ghost.textContent=el.sym;
      });
      btn.addEventListener('dragend',()=>{ghost.style.display='none';draggingEl=null;});
    }
    containerEl.appendChild(btn);
  });
}

document.addEventListener('dragover',e=>{e.preventDefault();ghost.style.left=e.clientX+'px';ghost.style.top=e.clientY+'px';});
canvas.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='copy';});
canvas.addEventListener('drop',e=>{
  e.preventDefault();if(!draggingEl)return;
  const p=evPos(e);
  atoms.push({id:nextId++,sym:draggingEl.sym,col:draggingEl.col,tc:draggingEl.tc,x:p.x,y:p.y});
  updateFormula();draw();ghost.style.display='none';
  document.getElementById('hint-bar').style.opacity='0';
});

// ── add atom to center of visible canvas (mobile tap from sheet) ──
function addAtomToCanvas(el){
  const cx=wrap.clientWidth/2,cy=wrap.clientHeight/2;
  // scatter a bit so they don't all stack
  const angle=Math.random()*Math.PI*2,dist=atoms.length===0?0:60+Math.random()*40;
  const x=cx+Math.cos(angle)*dist,y=cy+Math.sin(angle)*dist;
  atoms.push({id:nextId++,sym:el.sym,col:el.col,tc:el.tc,x,y});
  updateFormula();draw();
  showToast(el.name+' added — drag to position');
}

// ── formula ──
function updateFormula(){
  const count={};
  atoms.forEach(a=>{count[a.sym]=(count[a.sym]||0)+1;});
  const keys=Object.keys(count).sort((a,b)=>{const o=k=>k==='C'?0:k==='H'?1:2;if(o(a)!==o(b))return o(a)-o(b);return a.localeCompare(b);});
  const f=keys.map(k=>k+(count[k]>1?count[k]:'')).join('');
  document.getElementById('formula-bar').textContent=f||'—';
  const mf=document.getElementById('mobile-formula');
  if(mf)mf.textContent=f||'—';
}
function getFormula(){
  const count={};
  atoms.forEach(a=>{count[a.sym]=(count[a.sym]||0)+1;});
  const keys=Object.keys(count).sort((a,b)=>{const o=k=>k==='C'?0:k==='H'?1:2;if(o(a)!==o(b))return o(a)-o(b);return a.localeCompare(b);});
  return keys.map(k=>k+(count[k]>1?count[k]:'')).join('');
}

// ── identify ──
let aiLoading=false;
async function identify(){
  if(atoms.length===0){showToast('Add some atoms first!');return;}
  if(aiLoading)return;
  const key=getFormula();
  const local=DB[key];

  if(local){
    const isNew=!discoveries.has(key);
    if(isNew){discoveries.set(key,local.name);addDisco(key,local.name);}
    showResultUI(local,key,isNew,false);
    if(isNew)showToast('Discovered: '+local.name+'!');
    if(isMobile())openDrawer();
    return;
  }

  // AI
  aiLoading=true;
  const idBtn=document.getElementById('id-btn');
  const midBtn=document.getElementById('mobile-id-btn');
  const setBtn=(s)=>{if(idBtn)idBtn.innerHTML=s;if(midBtn)midBtn.innerHTML=s;};
  setBtn('<span class="spinner"></span> Asking AI…');
  if(idBtn)idBtn.disabled=true;if(midBtn)midBtn.disabled=true;
  setResultHTML('<p class="res-empty"><span class="spinner"></span> Identifying…</p>');
  setFunHTML('',false);
  if(isMobile())openDrawer();

  const bondDesc=bonds.map(b=>{
    const a1=atoms.find(a=>a.id===b.a),a2=atoms.find(a=>a.id===b.b);
    if(!a1||!a2)return '';
    return `${a1.sym}-${a2.sym} ${['single','double','triple'][b.order-1]||'single'} bond`;
  }).filter(Boolean).join(', ');

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,
        messages:[{role:'user',content:`Identify this molecule: formula ${key}${bondDesc?', bonds: '+bondDesc:''}. Return ONLY raw JSON (no markdown): {name,description(1-2 sentences),state(gas/liquid/solid),useful(bool),hazardous(bool),category(short string),funFact(one interesting sentence or null)}. If chemically impossible, name "Not a real compound" and explain why.`}]})
    });
    const data=await res.json();
    const text=(data.content||[]).filter(c=>c.type==='text').map(c=>c.text).join('');
    let p=null;try{p=JSON.parse(text.replace(/```json|```/g,'').trim());}catch(e){}
    if(p&&p.name){
      const isNew=!discoveries.has(key)&&p.name!=='Not a real compound';
      if(isNew){discoveries.set(key,p.name);addDisco(key,p.name);}
      showResultUI({...p,cat:p.category,desc:p.description,fun:p.funFact},key,isNew,true);
      if(isNew)showToast('Discovered: '+p.name+'!');
    } else {
      setResultHTML(`<p class="res-desc">${text||'Could not identify.'}</p>`);
    }
  }catch(e){setResultHTML('<p class="res-empty">AI request failed.</p>');}
  setBtn('Identify Molecule ✦');
  if(idBtn)idBtn.disabled=false;if(midBtn)midBtn.disabled=false;
  aiLoading=false;
}

function mkResultHTML(r,key,isNew,isAI){
  return `<div class="res-anim">
    <div class="res-name">${r.name}${isNew?' <span class="badge" style="font-size:9px;vertical-align:middle">New!</span>':''}</div>
    <div class="res-key">${key} · ${r.state||'?'}</div>
    <div class="res-desc">${r.desc||r.description||''}</div>
    <div class="tags">
      ${r.state?`<span class="tag tag-${r.state}">${r.state}</span>`:''}
      ${r.useful?'<span class="tag tag-useful">useful</span>':''}
      ${r.hazardous?'<span class="tag tag-hazardous">hazardous</span>':''}
      ${r.cat?`<span class="tag tag-cat">${r.cat}</span>`:''}
      ${isAI?'<span class="tag tag-ai">AI</span>':''}
    </div>
  </div>`;
}

function showResultUI(r,key,isNew,isAI){
  const html=mkResultHTML(r,key,isNew,isAI);
  setResultHTML(html);
  setFunHTML(r.fun||'',!!(r.fun));
}

function setResultHTML(html){
  const d=document.getElementById('result-box');if(d)d.innerHTML=html;
  const dd=document.getElementById('drawer-result-box');if(dd)dd.innerHTML=html;
}
function setFunHTML(text,show){
  const f=document.getElementById('fun-box');
  const fd=document.getElementById('drawer-fun-box');
  if(f){f.style.display=show?'block':'none';if(show)f.textContent='💡 '+text;}
  if(fd){fd.style.display=show?'block':'none';if(show)fd.textContent='💡 '+text;}
}

// ── discoveries ──
function addDisco(key,name){
  // desktop
  const list=document.getElementById('disco-list');
  const empty=list.querySelector('p');if(empty)list.innerHTML='';
  const item=mkDiscoItem(key,name);list.prepend(item);
  document.getElementById('disco-count').textContent=discoveries.size;
  // mobile drawer
  const dlist=document.getElementById('drawer-disco-list');
  const dempty=dlist.querySelector('p');if(dempty)dlist.innerHTML='';
  const ditem=mkDiscoItem(key,name);dlist.prepend(ditem);
  document.getElementById('drawer-disco-count').textContent=discoveries.size;
}
function mkDiscoItem(key,name){
  const item=document.createElement('div');
  item.className='disco-item new-disco';
  item.innerHTML=`<span class="disco-name">${name}</span><span class="disco-key">${key}</span>`;
  setTimeout(()=>item.classList.remove('new-disco'),1500);
  return item;
}
function clearDiscos(){
  discoveries.clear();
  document.getElementById('disco-count').textContent=0;
  document.getElementById('disco-list').innerHTML='<p style="font-size:11px;color:var(--text3)">None yet!</p>';
  document.getElementById('drawer-disco-count').textContent=0;
  document.getElementById('drawer-disco-list').innerHTML='<p style="font-size:12px;color:var(--text3)">None yet!</p>';
}

// ── mobile sheet / drawer ──
let sheetOpen=false;
function openPaletteSheet(){sheetOpen=true;document.getElementById('palette-sheet').classList.add('open');}
function closePaletteSheet(){sheetOpen=false;document.getElementById('palette-sheet').classList.remove('open');}
function toggleSheet(){if(sheetOpen)closePaletteSheet();else openPaletteSheet();}

function openDrawer(){document.getElementById('result-drawer').classList.add('open');}
function closeDrawer(){document.getElementById('result-drawer').classList.remove('open');}

// close sheet when tapping canvas
canvas.addEventListener('touchstart',()=>{if(sheetOpen)closePaletteSheet();},{passive:true});

// ── canvas clear ──
function clearCanvas(silent){
  atoms=[];bonds=[];bondStart=null;dragging=null;
  document.getElementById('formula-bar').textContent='—';
  const mf=document.getElementById('mobile-formula');if(mf)mf.textContent='—';
  if(!silent){
    setResultHTML('<p class="res-empty">Build a molecule, then click Identify.</p>');
    setFunHTML('',false);
    document.getElementById('hint-bar').style.opacity='1';
  }
  draw();
}

// ── addA helper ──
function addA(sym,x,y){
  const el=ELEMENTS.find(e=>e.sym===sym)||{sym,col:'#ccc',tc:'#333'};
  const a={id:nextId++,sym:el.sym,col:el.col,tc:el.tc,x,y};atoms.push(a);return a;
}

function surpriseMe(){
  clearCanvas(true);
  EXAMPLES[Math.floor(Math.random()*EXAMPLES.length)]();
  updateFormula();draw();
  setTimeout(identify,80);
}

// ── keyboard shortcuts ──
document.addEventListener('keydown',e=>{
  const active=document.activeElement;
  if(active&&(active.tagName==='INPUT'||active.tagName==='SELECT'))return;
  if(e.key==='v'||e.key==='V')setTool('select');
  if(e.key==='b'||e.key==='B')setTool('bond');
  if(e.key==='e'||e.key==='E')setTool('erase');
  if(e.key==='Enter')identify();
  if(e.key==='Escape'){bondStart=null;dragging=null;draw();}
});

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');

}
