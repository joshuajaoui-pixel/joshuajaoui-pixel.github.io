<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AQA GCSE Science — Exam Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,400&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1a1a;
  --ink-muted: #555;
  --ink-faint: #999;
  --paper: #faf9f6;
  --paper-warm: #f3f1eb;
  --rule: #d4cfc4;
  --rule-dark: #b5ae9e;
  --accent: #1a3a5c;
  --accent-mid: #2d5f8a;
  --accent-light: #e8f0f7;
  --green: #1a5c35;
  --green-light: #e8f5ee;
  --red: #5c1a1a;
  --red-light: #f5e8e8;
  --serif: 'Source Serif 4', Georgia, serif;
  --sans: 'IBM Plex Sans', sans-serif;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--sans); background: var(--paper); color: var(--ink); min-height: 100vh; font-size: 15px; line-height: 1.6; }

/* SETUP */
#setup-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1rem; }
.setup-card { background: white; border: 1px solid var(--rule); border-radius: 4px; padding: 2.5rem; width: 100%; max-width: 560px; box-shadow: var(--shadow); }
.aqa-header { display: flex; align-items: center; gap: 14px; margin-bottom: 1.75rem; padding-bottom: 1.25rem; border-bottom: 2px solid var(--ink); }
.aqa-logo-box { background: var(--accent); color: white; font-family: var(--sans); font-weight: 600; font-size: 18px; letter-spacing: 0.05em; padding: 6px 14px; border-radius: 2px; flex-shrink: 0; }
.aqa-title-block h1 { font-family: var(--serif); font-size: 20px; font-weight: 600; line-height: 1.3; }
.aqa-title-block p { font-size: 12px; color: var(--ink-muted); letter-spacing: 0.04em; text-transform: uppercase; margin-top: 2px; }
.field-group { margin-bottom: 1.25rem; }
.field-label { display: block; font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 6px; }
.field-select { width: 100%; padding: 10px 36px 10px 14px; border: 1px solid var(--rule-dark); border-radius: 3px; background: var(--paper); font-family: var(--sans); font-size: 15px; color: var(--ink); appearance: none; -webkit-appearance: none; cursor: pointer; }
.field-select:focus { outline: none; border-color: var(--accent-mid); background: white; box-shadow: 0 0 0 3px rgba(45,95,138,0.12); }
.select-wrapper { position: relative; }
.select-wrapper::after { content: '▾'; position: absolute; right: 14px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--ink-muted); font-size: 12px; }
.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.generate-btn { width: 100%; padding: 13px; background: var(--accent); color: white; border: none; border-radius: 3px; font-family: var(--sans); font-size: 15px; font-weight: 600; cursor: pointer; letter-spacing: 0.02em; transition: background 0.15s; margin-top: 0.5rem; }
.generate-btn:hover { background: var(--accent-mid); }
.generate-btn:disabled { background: var(--ink-faint); cursor: not-allowed; }
.status-msg { margin-top: 1rem; font-size: 13px; color: #5c1a1a; text-align: center; min-height: 20px; }

/* LOADING */
#loading-overlay { display: none; position: fixed; inset: 0; background: rgba(250,249,246,0.96); z-index: 100; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem; }
#loading-overlay.visible { display: flex; }
.loading-spinner { width: 40px; height: 40px; border: 3px solid var(--rule); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-family: var(--serif); font-size: 18px; color: var(--ink-muted); }
.loading-sub { font-size: 13px; color: var(--ink-faint); }

/* EXAM SCREEN */
#exam-screen { display: none; padding: 2rem 1rem 4rem; }
.exam-wrapper { max-width: 720px; margin: 0 auto; }
.action-bar { display: flex; gap: 10px; margin-bottom: 1.5rem; align-items: center; flex-wrap: wrap; }
.btn-sm { padding: 7px 16px; border-radius: 3px; border: 1px solid var(--rule-dark); background: white; font-family: var(--sans); font-size: 13px; cursor: pointer; color: var(--ink); transition: background 0.1s; }
.btn-sm:hover { background: var(--paper-warm); }
.btn-sm.primary { background: var(--accent); color: white; border-color: var(--accent); }
.btn-sm.primary:hover { background: var(--accent-mid); }
.btn-sm.mark { background: var(--green-light); color: var(--green); border-color: #9ecfb2; }
.btn-sm.mark:hover { background: #d4ece0; }

/* PAPER */
.exam-paper { background: white; border: 1px solid var(--rule); border-radius: 2px; box-shadow: var(--shadow-lg); overflow: hidden; }
.paper-head { border-bottom: 4px solid var(--ink); padding: 2rem 2.5rem 1.5rem; }
.paper-board-line { display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; }
.paper-aqa-badge { background: var(--accent); color: white; font-weight: 700; font-size: 16px; letter-spacing: 0.1em; padding: 5px 12px; border-radius: 2px; }
.paper-board-text { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-muted); line-height: 1.4; }
.paper-title-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; }
.paper-subject { font-family: var(--serif); font-size: 26px; font-weight: 600; line-height: 1.2; }
.paper-subtitle { font-family: var(--serif); font-size: 16px; color: var(--ink-muted); margin-top: 4px; font-style: italic; }
.paper-meta-box { border: 1px solid var(--rule-dark); padding: 10px 14px; min-width: 160px; font-size: 12px; color: var(--ink-muted); line-height: 1.7; flex-shrink: 0; }
.paper-meta-box strong { color: var(--ink); display: block; }
.paper-info-strip { background: var(--paper-warm); border-bottom: 1px solid var(--rule); padding: 1rem 2.5rem; display: flex; gap: 2rem; font-size: 13px; color: var(--ink-muted); flex-wrap: wrap; }
.info-item strong { color: var(--ink); display: block; font-size: 14px; }
.paper-instructions { padding: 1.25rem 2.5rem; border-bottom: 2px solid var(--ink); }
.instructions-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; color: var(--ink-muted); margin-bottom: 8px; }
.instructions-list { list-style: none; font-size: 13px; color: var(--ink-muted); line-height: 1.8; }
.instructions-list li::before { content: '• '; }

/* QUESTIONS */
.questions-body { padding: 2rem 2.5rem; }
.question-block { margin-bottom: 2.5rem; padding-bottom: 2.5rem; border-bottom: 1px solid var(--rule); }
.question-block:last-child { border-bottom: none; margin-bottom: 0; }
.q-header { display: flex; gap: 14px; margin-bottom: 0.75rem; align-items: flex-start; }
.q-number { font-family: var(--serif); font-size: 20px; font-weight: 600; min-width: 28px; line-height: 1.3; flex-shrink: 0; }
.q-intro { font-family: var(--serif); font-size: 15px; color: var(--ink-muted); font-style: italic; line-height: 1.6; flex: 1; }
.q-context { background: var(--paper-warm); border-left: 3px solid var(--rule-dark); padding: 12px 16px; font-size: 14px; color: var(--ink-muted); margin: 0 0 1rem 42px; line-height: 1.6; font-style: italic; }
.sub-question { margin-bottom: 1.5rem; margin-left: 28px; }
.sq-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 0.75rem; }
.sq-label { font-weight: 600; color: var(--ink); font-size: 14px; min-width: 28px; flex-shrink: 0; }
.sq-text { font-family: var(--serif); font-size: 15px; color: var(--ink); line-height: 1.65; flex: 1; }
.sq-marks { font-size: 12px; color: var(--ink-muted); white-space: nowrap; border: 1px solid var(--rule); padding: 2px 8px; border-radius: 2px; flex-shrink: 0; align-self: flex-start; margin-top: 2px; }

/* MC */
.mc-options { margin: 0.75rem 0 0 28px; display: flex; flex-direction: column; gap: 8px; }
.mc-option { display: flex; align-items: center; gap: 12px; padding: 9px 14px; border: 1px solid var(--rule); border-radius: 3px; cursor: pointer; font-size: 14px; background: white; transition: border-color 0.1s, background 0.1s; font-family: var(--serif); user-select: none; }
.mc-option:hover { border-color: var(--accent-mid); background: var(--accent-light); }
.mc-option.selected { border-color: var(--accent); background: var(--accent-light); }
.mc-option.correct-reveal { border-color: var(--green) !important; background: var(--green-light) !important; }
.mc-option.wrong-reveal { border-color: var(--red) !important; background: var(--red-light) !important; }
.mc-option.show-correct { border-color: var(--green) !important; background: var(--green-light) !important; }
.mc-letter { width: 26px; height: 26px; border: 1px solid var(--rule-dark); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; font-family: var(--sans); flex-shrink: 0; color: var(--ink-muted); }
.mc-option.selected .mc-letter { background: var(--accent); color: white; border-color: var(--accent); }
.mc-option.correct-reveal .mc-letter,
.mc-option.show-correct .mc-letter { background: var(--green); color: white; border-color: var(--green); }
.mc-option.wrong-reveal .mc-letter { background: var(--red); color: white; border-color: var(--red); }

/* ANSWER AREA */
.answer-lines { margin: 0.75rem 0 0 28px; }
.answer-textarea { width: 100%; border: none; border-bottom: 1px solid var(--rule-dark); background: transparent; font-family: var(--serif); font-size: 15px; color: var(--ink); padding: 6px 4px; resize: vertical; outline: none; line-height: 1.8; }
.answer-textarea:focus { border-bottom-color: var(--accent-mid); }
.answer-line-blank { display: block; width: 100%; height: 1px; background: var(--rule-dark); margin-top: 1.6rem; }

/* MARK SCHEME */
.mark-scheme-box { display: none; margin: 0.75rem 0 0 28px; padding: 12px 16px; background: var(--green-light); border: 1px solid #9ecfb2; border-radius: 3px; font-size: 13px; color: var(--green); line-height: 1.7; }
.mark-scheme-box.visible { display: block; }
.ms-title { font-weight: 600; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; opacity: 0.7; }

/* SCORE BAR */
.score-bar { display: none; background: white; border: 1px solid var(--rule); border-radius: 3px; padding: 1rem 1.5rem; margin-bottom: 1.25rem; box-shadow: var(--shadow); }
.score-bar.visible { display: flex; align-items: center; gap: 2rem; flex-wrap: wrap; }
.score-num { font-family: var(--serif); font-size: 32px; font-weight: 600; line-height: 1; }
.score-label { font-size: 12px; color: var(--ink-muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.05em; }
.score-grade { font-family: var(--serif); font-size: 24px; font-weight: 600; }
.grade-9,.grade-8 { color: #1a5c35; } .grade-7 { color: #1a4a5c; }
.grade-6 { color: #2d5f8a; } .grade-5,.grade-4 { color: #5c3d1a; } .grade-U { color: #5c1a1a; }

/* FOOTER */
.paper-footer { border-top: 2px solid var(--ink); padding: 1rem 2.5rem; display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--ink-muted); background: var(--paper-warm); flex-wrap: wrap; gap: 8px; }

/* PRINT */
@media print {
  body { background: white; }
  .action-bar, .score-bar, #setup-screen, #loading-overlay { display: none !important; }
  #exam-screen { display: block !important; padding: 0; }
  .exam-wrapper { max-width: 100%; }
  .exam-paper { box-shadow: none; border: none; }
  .mc-option { page-break-inside: avoid; }
  .question-block { page-break-inside: avoid; }
  .mark-scheme-box { display: none !important; }
}
</style>
</head>
<body>

<div id="setup-screen">
  <div class="setup-card">
    <div class="aqa-header">
      <div class="aqa-logo-box">AQA</div>
      <div class="aqa-title-block">
        <h1>GCSE Science<br>Exam Generator</h1>
        <p>Combined Science: Trilogy (8464)</p>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label" for="sel-subject">Subject / Paper</label>
      <div class="select-wrapper">
        <select class="field-select" id="sel-subject">
          <optgroup label="Biology">
            <option value="Biology Paper 1 — Topics 1–4: Cell Biology, Organisation, Infection and Response, Bioenergetics">Biology — Paper 1 (Topics 1–4)</option>
            <option value="Biology Paper 2 — Topics 5–7: Homeostasis and Response, Inheritance Variation and Evolution, Ecology">Biology — Paper 2 (Topics 5–7)</option>
          </optgroup>
          <optgroup label="Chemistry">
            <option value="Chemistry Paper 1 — Topics 8–12: Atomic Structure and the Periodic Table, Bonding Structure and Properties, Quantitative Chemistry, Chemical Changes, Energy Changes">Chemistry — Paper 1 (Topics 8–12)</option>
            <option value="Chemistry Paper 2 — Topics 13–17: Rate and Extent of Chemical Change, Organic Chemistry, Chemical Analysis, Chemistry of the Atmosphere, Using Resources">Chemistry — Paper 2 (Topics 13–17)</option>
          </optgroup>
          <optgroup label="Physics">
            <option value="Physics Paper 1 — Topics 18–21: Energy, Electricity, Particle Model of Matter, Atomic Structure">Physics — Paper 1 (Topics 18–21)</option>
            <option value="Physics Paper 2 — Topics 22–24: Forces, Waves, Magnetism and Electromagnetism">Physics — Paper 2 (Topics 22–24)</option>
          </optgroup>
        </select>
      </div>
    </div>

    <div class="row-2">
      <div class="field-group">
        <label class="field-label" for="sel-tier">Tier</label>
        <div class="select-wrapper">
          <select class="field-select" id="sel-tier">
            <option value="Foundation">Foundation Tier</option>
            <option value="Higher" selected>Higher Tier</option>
          </select>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label" for="sel-length">Paper length</label>
        <div class="select-wrapper">
          <select class="field-select" id="sel-length">
            <option value="short">Short (~20 marks)</option>
            <option value="standard" selected>Standard (~45 marks)</option>
            <option value="full">Full paper (~70 marks)</option>
          </select>
        </div>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label" for="sel-mode">Mode</label>
      <div class="select-wrapper">
        <select class="field-select" id="sel-mode">
          <option value="practice">Practice (interactive — mark online)</option>
          <option value="print">Print-ready (blank lines for handwriting)</option>
        </select>
      </div>
    </div>

    <button class="generate-btn" id="gen-btn" onclick="generateExam()">Generate Exam Paper</button>
    <div class="status-msg" id="status-msg"></div>
  </div>
</div>

<div id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Generating your exam paper…</div>
  <div class="loading-sub" id="loading-sub">Sampling AQA curriculum…</div>
</div>

<div id="exam-screen">
  <div class="exam-wrapper">
    <div class="action-bar">
      <button class="btn-sm" onclick="backToSetup()">← New paper</button>
      <button class="btn-sm mark" id="mark-btn" onclick="markPaper()">Mark &amp; show answers</button>
      <button class="btn-sm primary" onclick="window.print()">Print / Save PDF</button>
      <span id="mark-progress" style="font-size:13px;color:var(--ink-muted);margin-left:auto;"></span>
    </div>
    <div class="score-bar" id="score-bar">
      <div><div class="score-num" id="score-num">—</div><div class="score-label">MC score</div></div>
      <div><div class="score-grade" id="score-grade">—</div><div class="score-label">Estimated grade</div></div>
      <div style="flex:1;font-size:13px;color:var(--ink-muted);" id="score-feedback"></div>
    </div>
    <div class="exam-paper" id="exam-paper"></div>
  </div>
</div>

<script>
const GEMINI_API_KEY = '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';
const GEMINI_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + GEMINI_API_KEY;

const LOADING_MSGS = [
  'Sampling AQA curriculum…',
  'Calibrating mark scheme…',
  'Applying tier weighting…',
  'Setting command words…',
  'Formatting question paper…',
  'Checking question validity…'
];

let examState = { questions: [], totalMarks: 0, mode: 'practice', marked: false };
let mcSelections = {};
let loadingInterval = null;

function backToSetup() {
  document.getElementById('exam-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
  examState = { questions: [], totalMarks: 0, mode: 'practice', marked: false };
  mcSelections = {};
  document.getElementById('score-bar').classList.remove('visible');
  document.getElementById('mark-btn').textContent = 'Mark & show answers';
  document.getElementById('status-msg').textContent = '';
}

async function generateExam() {
  const subject = document.getElementById('sel-subject').value;
  const tier = document.getElementById('sel-tier').value;
  const length = document.getElementById('sel-length').value;
  const mode = document.getElementById('sel-mode').value;
  examState.mode = mode;
  examState.marked = false;
  mcSelections = {};

  const markTarget = length === 'short' ? 20 : length === 'standard' ? 45 : 70;

  document.getElementById('gen-btn').disabled = true;
  document.getElementById('status-msg').textContent = '';
  showLoading(true);

  let msgIdx = 0;
  loadingInterval = setInterval(() => {
    document.getElementById('loading-sub').textContent = LOADING_MSGS[msgIdx % LOADING_MSGS.length];
    msgIdx++;
  }, 1800);

  const prompt = buildPrompt(subject, tier, length, markTarget);

  try {
    const response = await fetch(GEMINI_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: {
          temperature: 0.7,
          maxOutputTokens: 8192,
          responseMimeType: 'application/json'
        }
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'API error ' + response.status);
    }

    const data = await response.json();
    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!raw) throw new Error('Empty response from API');

    const clean = raw.replace(/^```json\s*/,'').replace(/```\s*$/,'').trim();
    const parsed = JSON.parse(clean);

    showLoading(false);
    renderExam(parsed, subject, tier, markTarget, mode);

  } catch (err) {
    showLoading(false);
    document.getElementById('status-msg').textContent = 'Error: ' + err.message + '. Please try again.';
    document.getElementById('gen-btn').disabled = false;
    console.error(err);
  }
}

function buildPrompt(subject, tier, length, markTarget) {
  const qStructure = length === 'short'
    ? 'Generate 4 questions totalling exactly 20 marks. Include: 2 multiple choice questions (1 mark each), 1 structured question with 2-3 sub-parts (6-8 marks total), 1 extended writing or calculation question (6 marks).'
    : length === 'standard'
    ? 'Generate 7 questions totalling exactly 45 marks. Include: 4 multiple choice questions (1 mark each, grouped as Question 1 with 4 parts a-d), 3 structured questions each with 3-4 sub-parts mixing short answer/calculation/extended writing (total ~41 marks).'
    : 'Generate 10 questions totalling exactly 70 marks. Include: 4 multiple choice (1 mark each, grouped as Question 1 parts a-d), 6 structured questions with sub-parts mixing short answer, calculations, and extended writing (6-mark extended writing question required).';

  return `You are a senior AQA GCSE examiner writing a mock exam paper. Generate a complete, realistic exam for:

Subject: ${subject}
Tier: ${tier} Tier
${qStructure}

STRICT RULES:
1. Use ONLY official AQA command words: State, Name, Give, Describe, Explain, Calculate, Show that, Suggest, Evaluate, Compare, Complete, Identify, Draw, Plot, Label.
2. ${tier === 'Higher' ? 'Include Higher Tier only (HT) questions marked in the text. Include 6-mark extended writing and multi-step calculations requiring rearrangement.' : 'Focus on core content only. Simple recall, describe, and explain questions. Basic calculations with given equations.'}
3. Each question MUST have a realistic context or scenario (e.g. a student investigating, a news story, an experiment).
4. Mark schemes must be detailed with specific creditworthy points, key words in bold, and how marks are awarded.
5. For calculation questions include the equation needed.
6. All marks must add up to exactly ${markTarget}.
7. Questions should increase in difficulty within each topic.
8. IMPORTANT: Keep all text concise. Do not write very long question texts.

Return ONLY a JSON object with this exact structure. No explanation, no markdown, just JSON:

{
  "paper_name": "GCSE Combined Science: Trilogy",
  "subject": "short subject name e.g. Biology",
  "paper": "Paper 1 or Paper 2",
  "tier": "${tier} Tier",
  "time": "1 hour 15 minutes",
  "total_marks": ${markTarget},
  "questions": [
    {
      "number": 1,
      "intro": "brief topic intro sentence or null",
      "context": "scenario/context paragraph or null",
      "parts": [
        {
          "label": "a",
          "type": "mc",
          "text": "question text",
          "marks": 1,
          "options": ["A option text", "B option text", "C option text", "D option text"],
          "answer_index": 0,
          "mark_scheme": "A — brief explanation of why A is correct"
        },
        {
          "label": "b",
          "type": "short",
          "text": "question text",
          "marks": 2,
          "answer_lines": 4,
          "mark_scheme": "Award 1 mark for point 1\\nAward 1 mark for point 2"
        },
        {
          "label": "c",
          "type": "calc",
          "text": "question text. Use the equation: equation here",
          "marks": 3,
          "answer_lines": 6,
          "mark_scheme": "Correct equation stated (1)\\nCorrect substitution (1)\\nCorrect answer with correct unit (1)"
        },
        {
          "label": "d",
          "type": "extended",
          "text": "question text",
          "marks": 6,
          "answer_lines": 12,
          "mark_scheme": "Level 3 (5-6 marks): Detailed, coherent explanation covering all key points...\\nLevel 2 (3-4 marks): Some correct points but lacks detail...\\nLevel 1 (1-2 marks): Basic points only..."
        }
      ]
    }
  ]
}`;
}

function showLoading(show) {
  const el = document.getElementById('loading-overlay');
  if (show) { el.classList.add('visible'); }
  else { el.classList.remove('visible'); clearInterval(loadingInterval); document.getElementById('gen-btn').disabled = false; }
}

function renderExam(data, subjectFull, tier, totalMarks, mode) {
  examState.questions = data.questions || [];
  examState.totalMarks = data.total_marks || totalMarks;
  const isPractice = mode === 'practice';
  const year = new Date().getFullYear();
  const subjShort = data.subject || 'Science';
  const paperNum = data.paper || (subjectFull.includes('Paper 1') ? 'Paper 1' : 'Paper 2');

  const grandTotal = examState.questions.reduce((s, q) => s + q.parts.reduce((ps, p) => ps + (p.marks || 0), 0), 0);

  let html = `
  <div class="paper-head">
    <div class="paper-board-line">
      <div class="paper-aqa-badge">AQA</div>
      <div class="paper-board-text">GCSE Combined Science: Trilogy (8464) &nbsp;|&nbsp; Mock Examination ${year}</div>
    </div>
    <div class="paper-title-row">
      <div>
        <div class="paper-subject">${subjShort}</div>
        <div class="paper-subtitle">${paperNum} &mdash; ${data.tier || tier + ' Tier'}</div>
      </div>
      <div class="paper-meta-box">
        <strong>Time allowed</strong>${data.time || '1 hour 15 minutes'}
        <strong style="margin-top:6px;">Total marks</strong>${grandTotal}
      </div>
    </div>
  </div>
  <div class="paper-info-strip">
    <div class="info-item"><strong>Specimen paper</strong>For practice use only</div>
    <div class="info-item"><strong>Specification</strong>AQA 8464</div>
    <div class="info-item"><strong>Tier</strong>${data.tier || tier + ' Tier'}</div>
  </div>
  <div class="paper-instructions">
    <div class="instructions-title">Instructions</div>
    <ul class="instructions-list">
      <li>Answer <strong>all</strong> questions in the spaces provided.</li>
      <li>Do all rough work in this book. Cross through any work you do not want to be marked.</li>
      <li>In calculations, show clearly how you work out your answer.</li>
      <li>The maximum mark for this paper is <strong>${grandTotal}</strong>.</li>
      <li>You may use a calculator.</li>
    </ul>
  </div>
  <div class="questions-body">`;

  examState.questions.forEach((q, qi) => {
    html += `<div class="question-block">
      <div class="q-header">
        <div class="q-number">${q.number}</div>
        ${q.intro ? `<div class="q-intro">${q.intro}</div>` : '<div></div>'}
      </div>`;
    if (q.context) html += `<div class="q-context">${q.context}</div>`;

    q.parts.forEach((p, pi) => {
      const msId = `ms-${qi}-${pi}`;
      html += `<div class="sub-question">
        <div class="sq-header">
          <span class="sq-label">(${p.label})</span>
          <span class="sq-text">${p.text}</span>
          <span class="sq-marks">[${p.marks} mark${p.marks !== 1 ? 's' : ''}]</span>
        </div>`;

      if (p.type === 'mc') {
        const letters = ['A','B','C','D'];
        html += `<div class="mc-options">`;
        (p.options || []).forEach((opt, oi) => {
          html += `<div class="mc-option" id="mc-${qi}-${pi}-${oi}" ${isPractice ? `onclick="selectMC(${qi},${pi},${oi},${p.answer_index})"` : ''}>
            <span class="mc-letter">${letters[oi]}</span><span>${opt}</span>
          </div>`;
        });
        html += `</div>`;
      } else {
        const lines = p.answer_lines || Math.max(3, (p.marks || 2) * 2);
        if (isPractice) {
          html += `<div class="answer-lines"><textarea class="answer-textarea" id="ans-${qi}-${pi}" rows="${lines}" style="min-height:${lines * 30}px;" oninput="updateMarkProgress()" placeholder="Write your answer here…"></textarea></div>`;
        } else {
          html += `<div class="answer-lines">`;
          for (let i = 0; i < lines; i++) html += `<span class="answer-line-blank"></span>`;
          html += `</div>`;
        }
      }

      if (isPractice && p.mark_scheme) {
        html += `<div class="mark-scheme-box" id="${msId}">
          <div class="ms-title">Mark Scheme</div>
          <div>${p.mark_scheme.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</div>
        </div>`;
      }

      html += `</div>`; // sub-question
    });

    html += `</div>`; // question-block
  });

  html += `</div>`; // questions-body

  html += `<div class="paper-footer">
    <span>End of questions</span>
    <span>Total marks available: <strong>${grandTotal}</strong></span>
    <span>AQA GCSE Combined Science: Trilogy &mdash; Specimen</span>
  </div>`;

  document.getElementById('exam-paper').innerHTML = html;
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('exam-screen').style.display = 'block';
  updateMarkProgress();
}

function selectMC(qi, pi, selected, correct) {
  if (examState.marked) return;
  mcSelections[`${qi}-${pi}`] = selected;
  for (let i = 0; i < 4; i++) {
    const el = document.getElementById(`mc-${qi}-${pi}-${i}`);
    if (el) { el.classList.remove('selected'); if (i === selected) el.classList.add('selected'); }
  }
  updateMarkProgress();
}

function updateMarkProgress() {
  let total = 0, answered = 0;
  examState.questions.forEach((q, qi) => {
    q.parts.forEach((p, pi) => {
      total++;
      if (p.type === 'mc') { if (mcSelections[`${qi}-${pi}`] !== undefined) answered++; }
      else { const el = document.getElementById(`ans-${qi}-${pi}`); if (el && el.value.trim()) answered++; }
    });
  });
  const prog = document.getElementById('mark-progress');
  if (prog) prog.textContent = answered + ' / ' + total + ' answered';
}

function markPaper() {
  if (examState.marked) {
    document.querySelectorAll('.mark-scheme-box').forEach(el => el.classList.remove('visible'));
    document.querySelectorAll('.mc-option').forEach(el => el.classList.remove('correct-reveal','wrong-reveal','show-correct'));
    document.getElementById('score-bar').classList.remove('visible');
    document.getElementById('mark-btn').textContent = 'Mark & show answers';
    examState.marked = false;
    return;
  }
  examState.marked = true;
  let earned = 0, mcTotal = 0;

  examState.questions.forEach((q, qi) => {
    q.parts.forEach((p, pi) => {
      if (p.type === 'mc') {
        mcTotal += p.marks || 1;
        const sel = mcSelections[`${qi}-${pi}`];
        const corrEl = document.getElementById(`mc-${qi}-${pi}-${p.answer_index}`);
        if (sel !== undefined) {
          const selEl = document.getElementById(`mc-${qi}-${pi}-${sel}`);
          if (sel === p.answer_index) { if (selEl) selEl.classList.add('correct-reveal'); earned += (p.marks || 1); }
          else { if (selEl) selEl.classList.add('wrong-reveal'); if (corrEl) corrEl.classList.add('show-correct'); }
        } else { if (corrEl) corrEl.classList.add('show-correct'); }
      }
      const msEl = document.getElementById(`ms-${qi}-${pi}`);
      if (msEl) msEl.classList.add('visible');
    });
  });

  document.getElementById('score-num').textContent = earned + ' / ' + mcTotal;
  const pct = mcTotal > 0 ? earned / mcTotal : 0;
  const grade = pct >= 0.85 ? '9' : pct >= 0.75 ? '8' : pct >= 0.65 ? '7' : pct >= 0.55 ? '6' : pct >= 0.45 ? '5' : pct >= 0.35 ? '4' : 'U';
  const gradeEl = document.getElementById('score-grade');
  gradeEl.textContent = 'Grade ' + grade;
  gradeEl.className = 'score-grade grade-' + grade;
  document.getElementById('score-feedback').textContent = 'Mark schemes are now shown. For written questions, self-mark against the criteria shown under each answer space.';
  document.getElementById('score-bar').classList.add('visible');
  document.getElementById('mark-btn').textContent = 'Hide answers';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
